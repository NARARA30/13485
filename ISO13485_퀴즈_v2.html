// 조항 문자열에서 장(4~8) 추출, 그 외는 '0'(기타)
function chapterOf(c){
  if(!c) return '0';
  const m=String(c).match(/(\d+)/);
  const n=m?m[1]:'0';
  return ['4','5','6','7','8'].includes(n)?n:'0';
}
// 현재 설정(유형/장/객관식만)에 맞는 문제 풀
function pool(){
  const cat=document.getElementById('fCat').value;
  const chap=document.getElementById('fChap').value;
  const onlyMC=document.getElementById('fOnlyMC').checked;
  return BANK.filter(q=>{
    if(levelOf(q)!==QLEVEL) return false;
    if(cat!=='all' && q.cat!==cat) return false;
    if(chap!=='all' && chapterOf(q.clause)!==chap) return false;
    if(onlyMC && q.type!=='mc') return false;
    return true;
  });
}
function updateCount(){
  const lvlTotal=BANK.filter(q=>levelOf(q)===QLEVEL).length;
  document.getElementById('fCount').textContent='선택된 문제: '+pool().length+'개 / LEVEL '+QLEVEL+' 전체 '+lvlTotal+'개';
}
// 레벨 전환(LEVEL 1 / LEVEL 2)
function setLevel(l){
  QLEVEL=l;
  document.querySelectorAll('#levelTabs .level-tab').forEach(b=>{
    const on=b.dataset.level===l;
    b.style.background=on?'var(--blue2)':'#fff';
    b.style.color=on?'#fff':'#475569';
  });
  const desc=document.getElementById('levelDesc');
  if(desc) desc.textContent = l==='2' ? '고난도 · 정답처럼 헷갈리는 보기 구성' : '기본 문제 세트';
  updateSetupProgress(); updateCount();
}
// 풀이 화면 상단 점수/진행 요약 (선택된 카테고리 항목만 표시)
function updateScore(){
  const mc={t:0,d:0}, ess={t:0,d:0}, scn={t:0,d:0}, term={t:0,d:0}, san={t:0,d:0}, cla={t:0,d:0};
  order.forEach(q=>{
    const done=answeredIds.has(q.id);
    if(q.cat==='3장 용어퀴즈'){ term.t++; if(done)term.d++; }
    else if(q.cat==='산출물퀴즈'){ san.t++; if(done)san.d++; }
    else if(q.cat==='조항/세부조항'){ cla.t++; if(done)cla.d++; }
    else if(q.type==='mc'||q.type==='short'){ mc.t++; if(done)mc.d++; }
    else if(q.type==='essay'){ ess.t++; if(done)ess.d++; }
    else { scn.t++; if(done)scn.d++; }
  });
  const parts=[];
  const showAll = activeCat==='all';
  if((showAll||activeCat==='객관식·단답형') && mc.t)
    parts.push('<b>객관식·단답형</b> 정답&nbsp;'+score+'/'+mc.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+(mc.t-mc.d)+'문</span>');
  if((showAll||activeCat==='서술형·논술형') && ess.t)
    parts.push('<b>서술형·논술형</b> 완료&nbsp;'+ess.d+'/'+ess.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+(ess.t-ess.d)+'문</span>');
  if((showAll||activeCat==='조항7-8 시나리오') && scn.t)
    parts.push('<b>시나리오</b> 완료&nbsp;'+scn.d+'/'+scn.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+(scn.t-scn.d)+'문</span>');
  if((showAll||activeCat==='3장 용어퀴즈') && term.t)
    parts.push('<b>3장 용어퀴즈</b> 완료&nbsp;'+term.d+'/'+term.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+(term.t-term.d)+'문</span>');
  if((showAll||activeCat==='산출물퀴즈') && san.t)
    parts.push('<b>산출물퀴즈</b> 완료&nbsp;'+san.d+'/'+san.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+(san.t-san.d)+'문</span>');
  if((showAll||activeCat==='조항/세부조항') && cla.t)
    parts.push('<b>조항/세부조항</b> 완료&nbsp;'+cla.d+'/'+cla.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+(cla.t-cla.d)+'문</span>');
  document.getElementById('qScore').innerHTML=parts.join('&ensp;|&ensp;');
}
// 퀴즈 시작(이전 진행 기록이 있으면 이어서)
function startQuiz(){
  wrongNoteMode=false;
  activeCat=document.getElementById('fCat').value;
  const prog=loadProgress();
  // 저장된 진행 기록이 현재 선택된 카테고리와 일치할 때만 이어서 풀기
  const hasMatchingProg = prog && prog.orderIds && (prog.cat||'all')===activeCat && (prog.level||'1')===QLEVEL;
  if(hasMatchingProg){
    const bankMap=new Map(BANK.map(q=>[q.id,q]));
    order=prog.orderIds.map(id=>bankMap.get(id)).filter(Boolean);
    if(!order.length){ clearProgress(); startQuiz(); return; }
    answeredIds=new Set(prog.answeredIds||[]);
    score=prog.score||0; answered=prog.answered||0;
    const resume=order.findIndex(q=>!answeredIds.has(q.id));
    idx=resume>=0?resume:order.length-1;
  } else {
    order=pool().slice();
    if(order.length===0){ alert('선택된 문제가 없습니다.'); return; }
    if(document.getElementById('fOrder').value==='rand') order.sort(()=>Math.random()-.5);
    idx=0; score=0; answered=0; answeredIds=new Set();
  }
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('studyBoxes').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQ();
}
// 처음부터 다시(진행 기록 삭제)
function restartQuiz(){
  wrongNoteMode=false;
  activeCat=document.getElementById('fCat').value;
  clearProgress();
  order=pool().slice();
  if(order.length===0){ alert('선택된 문제가 없습니다.'); return; }
  if(document.getElementById('fOrder').value==='rand') order.sort(()=>Math.random()-.5);
  idx=0; score=0; answered=0; answeredIds=new Set();
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('studyBoxes').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQ();
}
function updateWrongModeBadge(){
  const badge=document.getElementById('wrongModeBadge');
  if(badge) badge.style.display=wrongNoteMode?'':'none';
}
// 오답 노트 모드 시작(틀린 순서 = 최근 틀린 순)
function startWrongNote(){
  if(!WRONG.length){ toast('아직 틀린 문제가 없습니다.'); return; }
  const bankMap=new Map(BANK.map(q=>[q.id,q]));
  const sorted=[...WRONG].sort((a,b)=>a.ts-b.ts);
  order=sorted.map(w=>bankMap.get(w.id)).filter(Boolean);
  if(!order.length){ toast('오답 문제를 찾을 수 없습니다.'); return; }
  wrongNoteMode=true;
  idx=0; score=0; answered=0; answeredIds=new Set();
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('studyBoxes').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  updateWrongModeBadge();
  renderQ();
}
// 설정 화면의 진행/오답 버튼 갱신
function updateSetupProgress(){
  const prog=loadProgress();
  const btn=document.getElementById('btnRestart');
  const info=document.getElementById('progressInfo');
  const startBtn=document.getElementById('btnStart');
  const currentCat=document.getElementById('fCat').value;
  // 저장된 기록이 있고, 현재 선택한 카테고리와 일치할 때만 이어서 풀기 표시
  const hasMatchingProg = prog && prog.orderIds && (prog.cat||'all')===currentCat && (prog.level||'1')===QLEVEL;
  if(hasMatchingProg){
    const done=(prog.answeredIds||[]).length;
    const total=prog.orderIds.length;
    if(btn) btn.style.display='';
    if(info) info.textContent='이전 기록: '+done+' / '+total+' 완료';
    if(startBtn) startBtn.textContent='▶ 이어서 풀기 ('+(total-done)+'문 남음)';
  } else {
    if(btn) btn.style.display='none';
    if(info) info.textContent='';
    if(startBtn) startBtn.textContent='퀴즈 시작 ▶';
  }
  const wBtn=document.getElementById('btnWrong');
  const wCount=document.getElementById('wrongCount');
  if(wBtn){
    if(WRONG.length){ wBtn.style.display=''; if(wCount) wCount.textContent=WRONG.length; }
    else { wBtn.style.display='none'; }
  }
}
// 현재 문항 렌더링
function renderQ(){
  const q=order[idx]; revealed=false; sel=null;
  document.getElementById('qCat').textContent=q.cat;
  document.getElementById('qClause').textContent=q.clause?('조항 '+q.clause):'';
  document.getElementById('qJumpInput').value=idx+1;
  document.getElementById('qPosTotal').textContent=' / '+order.length;
  document.getElementById('qBar').style.width=(idx/order.length*100)+'%';
  document.getElementById('qType').textContent={mc:'객관식',short:'단답형',essay:'서술형',scenario:'시나리오',overview:'조항 개요'}[q.type]||'';
  updateScore();
  document.getElementById('qText').textContent=q.question;

  const ans=document.getElementById('qAns'); ans.classList.add('hidden'); ans.innerHTML='';
  const opts=document.getElementById('qOpts'); opts.innerHTML='';
  const mk=['①','②','③','④','⑤'];

  if(q.type==='mc'){
    // 객관식: 보기 클릭 즉시 자동 채점
    document.getElementById('btnReveal').classList.add('hidden');
    q.options.forEach((o,i)=>{
      const b=document.createElement('button');
      b.className='opt';
      b.innerHTML='<span class="mk">'+mk[i]+'</span>'+esc(o);
      b.onclick=()=>{
        if(revealed) return;
        sel=i;
        [...opts.children].forEach(c=>c.classList.remove('sel'));
        b.classList.add('sel');
        reveal();
      };
      opts.appendChild(b);
    });
  } else {
    // 단답/서술/시나리오: 직접 입력 후 [보기] 버튼
    const wrap=document.createElement('div');
    wrap.innerHTML='<div class="inlabel">✍ 직접 답을 입력한 뒤 아래 [정답/모범답안 보기] 버튼을 누르세요 (안 적어도 됩니다).</div>'+
      (q.type==='short'
        ? '<input id="userIn" class="answin" type="text" autocomplete="off" placeholder="답을 입력">'
        : '<textarea id="userIn" class="answin ta" placeholder="답안을 작성"></textarea>');
    opts.appendChild(wrap);
    const rev=document.getElementById('btnReveal');
    rev.classList.remove('hidden');
    rev.textContent=(q.type==='short'?'정답 보기':'모범답안 보기');
  }
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').textContent=idx===order.length-1?'결과 보기 ▶':'다음 ▶';
}
// 정답/모범답안 공개(+객관식 채점)
function reveal(){
  const q=order[idx];
  const ans=document.getElementById('qAns');
  const opts=document.getElementById('qOpts');
  const mk=['①','②','③','④','⑤'];
  if(q.type==='mc'){
    if(sel===null){ alert('보기를 먼저 선택하세요.'); return; }
    if(!revealed){
      answered++;
      if(sel===q.answerIndex){ score++; removeWrong(q.id); q._correct=true; }
      else { addWrong(q.id); q._correct=false; }
      answeredIds.add(q.id);
      saveProgress();
    }
    [...opts.children].forEach((c,i)=>{
      c.classList.remove('sel');
      if(i===q.answerIndex) c.classList.add('correct');
      else if(i===sel) c.classList.add('wrong');
    });
    ans.innerHTML='<span class="lbl">정답: '+mk[q.answerIndex]+' '+esc(q.options[q.answerIndex])+'</span>'+(q.explanation?('<br>'+esc(q.explanation)):'');
  } else {
    const ui=document.getElementById('userIn');
    const mine=ui?ui.value.trim():'';
    ans.innerHTML=(mine?('<span class="lbl">내 답안</span><br>'+esc(mine)+'<hr style="border:none;border-top:1px dashed #cbd5e1;margin:10px 0;">'):'')+
      '<span class="lbl">'+(q.type==='short'?'정답':'모범답안')+'</span><br>'+esc(q.answer)+(q.explanation?('<br><span class="note">'+esc(q.explanation)+'</span>'):'');
  }
  ans.innerHTML+=glossaryNote((q.explanation||'')+' '+(q.answer||''));
  ans.innerHTML+='<div class="ansacts"><button class="abtn" onclick="copyKeyword()">📋 정답 키워드 복사</button><button class="abtn gem" onclick="askGemini()">✨ Gemini에 물어보기</button><span class="hint">키워드/질문을 복사해 Gemini에 붙여넣기(Ctrl·⌘+V)</span></div>';
  ans.classList.remove('hidden');
  updateScore();
  answeredIds.add(order[idx].id);
  saveProgress();
  revealed=true;
}
function curKeyword(){ const q=order[idx]; return q.type==='mc'?q.options[q.answerIndex]:q.answer; }
function curPrompt(){
  const q=order[idx]; const kw=curKeyword();
  return 'ISO 13485 '+(q.clause?('('+q.clause+') '):'')+'관련 질문입니다. 아래 내용을 의료기기 품질경영 관점에서 쉽게 설명해 주세요.\n\n[문제]\n'+q.question+'\n\n[정답·핵심]\n'+kw;
}
function copyKeyword(){ copyText(curKeyword()); toast('정답 키워드를 복사했어요.'); }
function askGemini(){ copyText(curPrompt()); toast('질문을 복사했어요. Gemini 탭에서 붙여넣기(Ctrl·⌘+V) 하세요.'); window.open('https://gemini.google.com/app','_blank'); }
// 다음 문항(오답 노트 모드에서 맞힌 문제는 목록에서 제거)
function nextQ(){
  saveProgress();
  if(wrongNoteMode && order[idx] && order[idx]._correct){
    order.splice(idx,1);
    updateWrongModeBadge();
    if(!order.length){ toast('오답 노트 완료! 모든 문제를 맞혔습니다 🎉'); endQuiz(); return; }
    if(idx>=order.length) idx=order.length-1;
    renderQ(); return;
  }
  if(idx===order.length-1){ showResult(); return; }
  idx++; renderQ();
}
function prevQ(){ if(idx>0){ idx--; renderQ(); } }
// 결과 화면
function showResult(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('qBar').style.width='100%';
  document.getElementById('rScore').textContent=answered?(score+' / '+answered):(order.length+'문 완료');
  document.getElementById('rText').textContent=answered
    ?('객관식 정답률 '+Math.round(score/answered*100)+'% · 총 '+order.length+'문 풀이')
    :'서술형/시나리오는 모범답안으로 자가 채점하세요.';
  clearProgress();
  updateSetupProgress();
}

function endQuiz(){

  document.getElementById('wrongModeBadge').style.display='none';
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
  document.getElementById('studyBoxes').classList.remove('hidden');

}
// 문제 번호로 이동
function jumpGo(){
  const n=parseInt(document.getElementById('qJumpInput').value,10);
  if(isNaN(n)||n<1||n>order.length){
    jumpReset();
    toast('1 ~ '+order.length+' 사이의 번호를 입력하세요');
    return;
  }
  idx=n-1;
  renderQ();
}

  const inp=document.getElementById('qJumpInput');

}
// 키보드 단축키(←/→ 이동, Enter 정답, 1~5 보기 선택)
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').classList.contains('hidden')) return;
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA') return;
  if(e.key==='ArrowRight') nextQ();
  else if(e.key==='ArrowLeft') prevQ();
  else if(e.key==='Enter') reveal();
  else if(['1','2','3','4','5'].includes(e.key)){
    const b=document.getElementById('qOpts').children[+e.key-1];
    if(b && b.classList.contains('opt')) b.click();
  }
});

/* ============================================================
   BACK OFFICE — 문제 관리
   ============================================================ */

// 유형에 따라 입력 필드 표시 전환 + 분류 자동 선택
function toggleType(){
  const t=document.getElementById('eType').value;
  document.getElementById('mcFields').style.display = t==='mc'?'block':'none';
  document.getElementById('txtFields').style.display= t==='mc'?'none':'block';
  const catSel=document.getElementById('eCat');
  if(t==='mc'||t==='short') catSel.value='객관식·단답형';
  else if(t==='essay') catSel.value='서술형·논술형';
  else if(t==='scenario') catSel.value='조항7-8 시나리오';
}
function resetForm(){
  document.getElementById('eId').value='';
  document.getElementById('eQ').value='';
  document.getElementById('eOpts').value='';
  document.getElementById('eAnsIdx').value='';
  document.getElementById('eExpl').value='';
  document.getElementById('eAns').value='';
  document.getElementById('eClause').value='';
  document.getElementById('saveMsg').textContent='';
  toggleType();
}
// 문제 저장(신규 추가 또는 기존 수정)
function saveQ(){
  const t=document.getElementById('eType').value;
  const q=document.getElementById('eQ').value.trim();
  if(!q){ alert('문제를 입력하세요.'); return; }
  const obj={
    id:document.getElementById('eId').value||uid(),
    cat:document.getElementById('eCat').value,
    type:t,
    clause:document.getElementById('eClause').value.trim(),
    question:q, options:[], answerIndex:null, answer:'', explanation:''
  };
  if(t==='mc'){
    const opts=document.getElementById('eOpts').value.split('\n').map(s=>s.trim()).filter(Boolean);
    if(opts.length<2){ alert('보기를 2개 이상 입력하세요.'); return; }
    const ai=parseInt(document.getElementById('eAnsIdx').value,10);
    if(!(ai>=1&&ai<=opts.length)){ alert('정답 번호가 보기 범위를 벗어났습니다.'); return; }
    obj.options=opts;
    obj.answerIndex=ai-1;
    obj.answer=opts[ai-1];
    obj.explanation=document.getElementById('eExpl').value.trim();
  } else {
    const a=document.getElementById('eAns').value.trim();
    if(!a){ alert('정답/모범답안을 입력하세요.'); return; }
    obj.answer=a;
  }
  const ix=BANK.findIndex(x=>x.id===obj.id);
  if(ix>=0) BANK[ix]=obj; else BANK.unshift(obj);
  save(); sbSyncBank(); renderList(); resetForm();
  document.getElementById('saveMsg').textContent='저장되었습니다 ('+BANK.length+'문).';
}
// 기존 문제를 폼으로 불러오기
function editQ(id){
  const q=BANK.find(x=>x.id===id); if(!q) return;
  document.getElementById('eId').value=q.id;
  document.getElementById('eType').value=q.type; toggleType();
  document.getElementById('eCat').value=q.cat;
  document.getElementById('eClause').value=q.clause||'';
  document.getElementById('eQ').value=q.question;
  if(q.type==='mc'){
    document.getElementById('eOpts').value=(q.options||[]).join('\n');
    document.getElementById('eAnsIdx').value=(q.answerIndex!=null?q.answerIndex+1:'');
    document.getElementById('eExpl').value=q.explanation||'';
  } else {
    document.getElementById('eAns').value=q.answer||'';
  }
  window.scrollTo({top:0,behavior:'smooth'});
}
function delQ(id){
  if(!confirm('이 문제를 삭제할까요?')) return;
  BANK=BANK.filter(x=>x.id!==id);
  save(); sbSyncBank(); renderList();
}
// 문제 목록 렌더링(검색/유형 필터 적용)
function renderList(){
  document.getElementById('bCount').textContent=BANK.length;
  const rCountEl=document.getElementById('rCount'); if(rCountEl) rCountEl.textContent=REPORTS.length;
  const f=document.getElementById('bFilter').value;
  const kw=document.getElementById('bSearch').value.trim();
  const list=document.getElementById('bList'); list.innerHTML='';
  const tn={mc:'객관식',short:'단답형',essay:'서술형',scenario:'시나리오',overview:'개요'};
  BANK.filter(q=>(f==='all'||q.cat===f) && (!kw||(q.question+(q.clause||'')).includes(kw))).forEach(q=>{
    const rc=REPORTS.filter(r=>r.qid===q.id).length;
    const d=document.createElement('div'); d.className='qitem';
    d.innerHTML=
      '<div class="body"><div class="qq">'+esc(q.question.slice(0,90))+(q.question.length>90?'…':'')+'</div>'+
      '<div class="small"><span class="badge">'+(tn[q.type]||q.type)+'</span> '+(q.clause?('조항 '+esc(q.clause)+' · '):'')+esc(q.cat)+'</div></div>'+
      '<div class="acts">'+
        (rc?'<button class="rpt-badge" onclick="showReportDetail(\''+q.id+'\')">🚨 신고 '+rc+'건</button>':'')+
        '<button class="iconbtn" onclick="editQ(\''+q.id+'\')">수정</button>'+
        '<button class="iconbtn del" onclick="delQ(\''+q.id+'\')">삭제</button>'+
      '</div>';
    list.appendChild(d);
  });
  if(!list.children.length) list.innerHTML='<p class="note">(문제가 없습니다)</p>';
}

/* ── 데이터 백업 / 복원 (내보내기·가져오기·초기화) ────────── */
function exportJSON(){
  try{
    const blob=new Blob([JSON.stringify(BANK,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='iso13485_quiz_bank.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('문제은행('+BANK.length+'문)을 JSON으로 내보냈습니다.');
  }catch(e){ alert('내보내기 실패: '+e.message); }
}
function importJSON(event){
  const file=event.target.files && event.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(){
    try{
      const data=JSON.parse(reader.result);
      if(!Array.isArray(data)||!data.length) throw new Error('JSON 배열 형식이 아닙니다.');
      const ok=data.every(q=>q && typeof q.question==='string' && typeof q.type==='string');
      if(!ok) throw new Error('문제 형식(question/type)이 올바르지 않습니다.');
      if(!confirm('가져온 '+data.length+'문으로 현재 문제은행('+BANK.length+'문)을 교체할까요?')) return;
      BANK=data; save(); sbSyncBank(); clearProgress(); renderList();
      toast('가져오기 완료: 총 '+BANK.length+'문.');
    }catch(e){ alert('가져오기 실패: '+e.message); }
    finally{ event.target.value=''; }
  };
  reader.readAsText(file,'utf-8');
}
function resetSeed(){
  if(!confirm('기본 문제로 초기화하면 추가·수정·삭제한 내용이 모두 사라집니다. 계속할까요?')) return;
  BANK=JSON.parse(JSON.stringify(SEED));
  save(); sbSyncBank(); clearProgress(); renderList();
  toast('기본 문제('+BANK.length+'문)로 초기화했습니다.');
}

function openReport(){
  const q=order[idx];
  document.getElementById('rptQText').textContent=q.question.slice(0,120)+(q.question.length>120?'…':'');
  document.getElementById('rptQId').value=q.id;
  document.getElementById('rptContent').value='';
  document.getElementById('rptModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('rptContent').focus(),60);
}
function closeReport(){ document.getElementById('rptModal').classList.add('hidden'); }
function saveReport(){
  const qid=document.getElementById('rptQId').value;
  const text=document.getElementById('rptContent').value.trim();
  if(!text){ toast('신고 내용을 입력해주세요.'); return; }
  const now=new Date().toLocaleString('ko-KR');
  REPORTS.push({id:uid(),qid:qid,text:text,createdAt:now});
  saveR(); closeReport();
  toast('신고가 접수되었습니다.');
}
// 특정 문제의 신고 내역 모달
function showReportDetail(qid){
  const rs=REPORTS.filter(r=>r.qid===qid);
  if(!rs.length) return;
  const q=BANK.find(x=>x.id===qid);
  document.getElementById('rptDetailTitle').textContent=(q?q.question.slice(0,80)+(q.question.length>80?'…':''):'');
  document.getElementById('rptDetailBody').innerHTML=[...rs].reverse().map((r,i)=>`
    <div class="rpt-item">
      <div class="rpt-meta">#${i+1} &nbsp;·&nbsp; ${r.createdAt}
        <button onclick="deleteReport('${r.id}','${qid}')" style="float:right;font-size:11px;color:var(--ng);background:none;border:none;cursor:pointer;padding:0;">🗑 삭제</button>
      </div>
      <div class="rpt-body">${esc(r.text)}</div>
    </div>`).join('');
  document.getElementById('rptDetailModal').classList.remove('hidden');
}
function closeReportDetail(){ document.getElementById('rptDetailModal').classList.add('hidden'); }
function deleteReport(rid,qid){
  if(!confirm('이 신고를 삭제할까요?')) return;
  REPORTS=REPORTS.filter(r=>r.id!==rid);
  saveR();
  const remaining=REPORTS.filter(r=>r.qid===qid);
  if(remaining.length) showReportDetail(qid); else closeReportDetail();
  renderList(); renderReportList();
}
// BackOffice 내부 탭(문제 목록 / 신고 목록) 전환
function switchTab(tab){
  const qPanel=document.getElementById('qPanel');
  const rPanel=document.getElementById('rPanel');
  const qActions=document.getElementById('qActions');
  const tabQ=document.getElementById('tabQBtn');
  const tabR=document.getElementById('tabRBtn');
  if(tab==='q'){
    qPanel.style.display=''; rPanel.style.display='none'; qActions.style.display='';
    tabQ.classList.add('active'); tabR.classList.remove('active');
  } else {
    qPanel.style.display='none'; rPanel.style.display=''; qActions.style.display='none';
    tabQ.classList.remove('active'); tabR.classList.add('active');
    renderReportList();
  }
}
// 전체 신고 목록 렌더링
function renderReportList(){
  const el=document.getElementById('rptList');
  if(!el) return;
  const rCountEl=document.getElementById('rCount');
  if(rCountEl) rCountEl.textContent=REPORTS.length;
  if(!REPORTS.length){
    el.innerHTML='<p class="note" style="text-align:center;padding:24px 0;">신고된 문제가 없습니다.</p>';
    return;
  }
  el.innerHTML=[...REPORTS].reverse().map(r=>{
    const q=BANK.find(x=>x.id===r.qid);
    const qtxt=q?(q.question.slice(0,80)+(q.question.length>80?'…':'')):'(삭제된 문제)';
    return '<div class="rpl-item">'+
      '<div class="rpl-q">'+esc(qtxt)+'</div>'+
      '<div class="rpl-body">'+esc(r.text)+'</div>'+
      '<div class="rpl-meta">'+
        '<span class="rpl-date">'+r.createdAt+'</span>'+
        '<div style="display:flex;gap:6px;">'+
          '<button class="iconbtn" onclick="editQ(\''+r.qid+'\');switchTab(\'q\')" style="font-size:12px;">문제 보기</button>'+
          '<button class="iconbtn del" onclick="deleteReportFromList(\''+r.id+'\',\''+r.qid+'\')" style="font-size:12px;">🗑 삭제</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}
function deleteReportFromList(rid,qid){
  if(!confirm('이 신고를 삭제할까요?')) return;
  REPORTS=REPORTS.filter(r=>r.id!==rid);
  saveR(); renderReportList(); renderList();
}
