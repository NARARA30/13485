  {"id":"L2_e1023","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.1.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.1.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"4.1.5에 따라 제품 적합성에 영향을 주는 위탁 프로세스는 모니터링·관리되어야 하며, 고객·안전·규제 요구사항 충족 책임은 조직에 남는다. 관리는 위험과 외부 당사자의 능력에 비례해야 하고, 품질 관련 활동·책임을 정의한 서면 품질 합의서(Quality Agreement)를 포함해야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.1.5"},
  {"id":"L2_e1024","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.2.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.2.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"① 적용 제외·비적용 사항의 정당성을 포함한 QMS 적용 범위, ② 관련 QMS 절차의 목록 또는 참조, ③ QMS 프로세스 간 상호작용 기술, ④ 문서화 시스템의 구조 기술. 적용 제외는 명확히 정의·정당화되어야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.2.2"},
  {"id":"L2_e1025","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.2.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.2.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"4.2.5에 따라 기록은 의료기기 수명 이상 보관하되 시장 출시 후 최소 2년 이상 보관해야 한다. 적용 규제 요구사항이 더 긴 기간을 요구하면 그 기간을 적용한다. 따라서 단종되더라도 출시 후 2년(또는 규제 기간)을 보장해야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.2.5"},
  {"id":"L2_e1026","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.2.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.2.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"배포 전 검토·승인, 개정 상태·변경 이력 식별, 관련 버전만 사용 가능하도록 통제 배포, 읽기 쉽고 식별 가능 유지, 손상·분실 방지, 폐기(구판) 문서의 오사용 식별·방지. 외부 출처 문서에도 식별·배포 관리가 적용된다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.2.4"},
  {"id":"L2_e1027","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.1.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.1.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"4.1.6에 따라 QMS 활동을 지원하는 소프트웨어는 최초 사용 전 밸리데이션 절차에 따라 밸리데이션되어야 하고, 소프트웨어 또는 의도된 사용 변경 시 재밸리데이션이 필요할 수 있다. 노력의 정도는 위험에 비례하며 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.1.6"},
  {"id":"L2_e1028","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.1.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.1.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"역할은 문서화되어야 하며, 역할에 따라 조직이 실행할 활동과 관리가 결정된다. 조직은 역할에 근거해 QMS에 필요한 프로세스와 그 적용 방법을 결정하고 위험기반 접근을 적용한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.1.1"},
  {"id":"L2_e1029","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.2.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.2.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"제품 모델·유형·등급·카테고리별로 작성하며, 표준·규제 적합성을 입증해야 한다. 최소 내용: 일반 설명·의도된 사용·라벨링, 제품 사양, 제조·포장·보관·취급·유통 사양/절차, 측정·모니터링 절차, (해당 시) 설치·서비스 요구사항.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.2.3"},
  {"id":"L2_e1030","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.1.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.1.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"모든 프로세스 변경은 관리·평가되어야 하며, 평가는 그 변경이 품질시스템과 제품·서비스에 미치는 잠재적 위험에 근거해야 한다(위험기반 접근).\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.1.4"},
  {"id":"L2_e1031","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"① 고객·규제 요구사항 충족의 중요성을 조직에 전달, ② 품질방침·품질목표 문서화, ③ 경영검토 수행, ④ 자원 가용성 보장. 재무·마케팅 성과는 경영의지의 증거가 아니다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.1"},
  {"id":"L2_e1032","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"조직 목적에 부합, 적용 요구사항 준수와 QMS 효과성 유지 의지 명시, 품질목표 설정·검토의 틀 제공, 조직 내 전달·이해, 주기적 검토·갱신.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.3"},
  {"id":"L2_e1033","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.6.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.6.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"피드백, 불만 처리, 규제당국 보고, 심사 결과, 제품·프로세스 모니터링·측정 결과, CAPA, 이전 검토 후속조치 상태, 신규·개정 규제 등 QMS 영향 변경, 개선 권고, 조직이 정의한 기타 입력.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.6.2"},
  {"id":"L2_e1034","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.6.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.6.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"QMS의 적절성·충분성·효과성 유지를 위한 개선 또는 규제 변경에 따른 변경, 고객 요구 관련 제품·서비스 개선/변경, 해당 변경 실행에 필요한 자원. 검토 입력·결정·합의 조치를 기록·유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.6.3"},
  {"id":"L2_e1035","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.5.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.5.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"① QMS에 필요한 프로세스의 문서화·실행 보장, ② QMS 효과성·개선 기회의 최고경영진 보고, ③ 조직 전반의 규제·품질 요구사항 인식 증진. 최고경영진이 임명한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.5.2"},
  {"id":"L2_e1036","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.4.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.4.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"관련 규제·고객 요구사항을 충족하도록 수립, 적절한 기능·프로세스에 배정, 측정 가능, 품질방침과 일관성. 측정 가능성이 핵심이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.4.1"},
  {"id":"L2_e1037","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.4.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.4.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"적용 요구사항·품질목표를 충족하도록 기획되고, 변경이 계획·실행될 때 QMS의 완전성(integrity)이 영향받지 않도록 보장해야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.4.2"},
  {"id":"L2_e1038","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.5.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.5.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"권한·책임이 정의·문서화·전달되어야 하고, 품질에 영향을 미치는 업무를 관리·수행·검증하는 인원의 상호관계가 문서화되며, 해당 인원은 업무 수행에 필요한 독립성과 권한을 가져야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.5.1"},
  {"id":"L2_e1039","cat":"서술형·논술형","type":"essay","level":2,"clause":"6.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 6.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"필요 적격성 수준(학력·경험) 결정 → 교육훈련 제공 → 효과성 평가(위험에 비례) → 품질목표 달성에 대한 활동의 중요성 인식 → 학력·교육·숙련·경험 기록 유지.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 6.2"},
  {"id":"L2_e1040","cat":"서술형·논술형","type":"essay","level":2,"clause":"6.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 6.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"기반시설은 건물·작업공간·유틸리티, 공정 장비(HW/SW), 지원 서비스(운송·통신·정보시스템)를 포함한다. 제품 품질에 영향을 줄 수 있으면 유지보수 활동·주기를 정의·문서화하고 기록을 유지(예: 장비 교정·검사).\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 6.3"},
  {"id":"L2_e1041","cat":"서술형·논술형","type":"essay","level":2,"clause":"6.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 6.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"작업환경 조건의 모니터링·관리 절차를 문서화하고, 인원-제품 접촉이 품질에 영향을 줄 수 있으면 건강·청결·복장 요구사항을 문서화한다. 오염된(가능성 있는) 제품 관리, 멸균제품은 미생물·미립자 오염 관리 요구사항을 문서화한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 6.4"},
  {"id":"L2_e1042","cat":"서술형·논술형","type":"essay","level":2,"clause":"6.4.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 6.4.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"ISO 14644 및 ISO 14698을 참조한다. 입자 농도에 의한 공기청정도 분류와 생물학적 오염 관리에 관한 추가 정보를 제공하므로, 멸균·청정 제조 환경의 적절성 평가 근거가 된다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 6.4.2"},
  {"id":"L2_e1043","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"품질목표·제품 요구사항, 필요한 프로세스·문서·자원, 검증·밸리데이션·모니터링·측정·검사·시험·취급·보관·유통·추적성 활동과 합격 판정 기준, 위험관리 프로세스 적용 및 기록(예: pFMEA), 증거 기록을 정의하고 출력을 문서화한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.1"},
  {"id":"L2_e1044","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.2.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.2.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"고객이 정한 요구사항(인도·인도 후 포함), 의도된 사용에 필요한 추가 요구사항, 적용 규제 요구사항, 안전하고 효과적인 사용을 위한 사용자 교육 요구사항.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.2.1"},
  {"id":"L2_e1045","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.2.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.2.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"요구사항 정의·문서화, 고객 요구사항 불일치 해결, 규제 요구사항 충족, 사용자 교육 제공 가능, 조직의 충족 능력을 보장하고 검토·조치 기록을 유지한다. 변경 시 문서 갱신·인원 통보.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.2.2"},
  {"id":"L2_e1046","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.2.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.2.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"제품 정보, 문의·계약·주문, 고객 피드백 및 불만, 권고문(advisory notices). 규제당국과의 의사소통은 적용 규제 요구사항을 따른다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.2.3"},
  {"id":"L2_e1047","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"설계·개발 단계, 각 단계의 검토, 검증·밸리데이션·제조 이관 활동, 책임·권한, 입력-출력 추적성 방법, 필요한 자원과 인원의 적격성.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.2"},
  {"id":"L2_e1048","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"포함: 기능·성능·사용적합성·안전 요구사항, 적용 규제 요구사항·표준, 위험관리 출력(dFMEA 등), 유사제품 정보. 조건: 완전·명확, 시험 가능(검증/밸리데이션 가능), 상호 비상충. 입력의 충분성은 검토·승인되어야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.3"},
  {"id":"L2_e1049","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"입력 요구사항 충족, 구매·생산·서비스에 충분한 정보 제공, 제품 합격 판정 기준 포함, 안전하고 올바른 사용을 위한 제품 특성 규정. 사용 승인 전 문서화·승인되고 입력 대비 검증 가능해야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.4"},
  {"id":"L2_e1050","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"적절한 단계에서 결과가 요구사항을 충족하는 능력을 평가하고 필요한 조치를 식별한다. 관련 기능 대표·전문가가 참여하며, 검토된 설계 식별·결과·조치·참가자·일자를 포함한 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.5"},
  {"id":"L2_e1051","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.6/7.3.7","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.6/7.3.7의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"검증(7.3.6)은 설계 출력이 입력 요구사항을 충족하는지 확인하는 활동이고, 밸리데이션(7.3.7)은 결과 제품이 규정된 의도된 사용을 충족하는지 확인하는 활동이다. 밸리데이션은 초도 생산품/동등품으로 수행하고 출하 전 완료하며, 규제 요구 시 임상·성능평가를 포함한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.6/7.3.7"},
  {"id":"L2_e1052","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"검증 방법, 합격 판정 기준, (요구되는 경우 표본 크기 근거 포함) 통계적 기법. 타 기기와 인터페이스가 있으면 그 기능의 올바른 구현 확인을 포함한다. 결과·결론 기록 유지.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.6"},
  {"id":"L2_e1053","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.7","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.7의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"초도 생산 단위 또는 동등품인 대표 제품 샘플로 수행하고 사용 제품의 근거를 기록한다. 모든 밸리데이션은 고객 사용을 위한 출하 전에 완료한다. 평가 목적 제공은 출하로 간주하지 않는다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.7"},
  {"id":"L2_e1054","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.8","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.8의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"설계 출력이 최종 생산 사양이 되기 전에 제조에 적합한 것으로 검증되고, 생산능력이 제품 요구사항을 충족할 수 있음을 보장한다. 이관 결과·결론을 문서화·유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.8"},
  {"id":"L2_e1055","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.9","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.9의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"변경의 중요도(기능·성능·사용적합성·안전·규제)를 결정하고, 식별·검토·검증·(해당 시)밸리데이션·승인한다. 검토 시 구성 부품·기출하 제품, 위험관리 파일, 제품실현 프로세스에 미치는 영향을 평가하고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.9"},
  {"id":"L2_e1056","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.10","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.10의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"각 의료기기 유형·제품군별로 설계·개발 기록·문서를 보관하고, 관련 기록·객관적 증거 참조를 포함하여 설계 변경을 포함한 수명주기 전반에서 설계 요구사항에 대한 지속적 적합성을 입증한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.10"},
  {"id":"L2_e1057","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.4.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.4.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"기준은 의료기기 관련 위험에 비례해야 하며, 조직 요구사항을 충족하는 제품 공급 능력과 공급자 성과, 구매품이 제품 품질에 미치는 영향에 근거한다. 모니터링·재평가를 계획하고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.4.1"},
  {"id":"L2_e1058","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.4.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.4.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"제품 합격 판정·프로세스·절차·공구·장비 사용에 대한 사양·요구사항, 공급자 인원의 적격성 요구사항, QMS 요구사항. 변경 시 공급자가 사전 통보하도록 하는 서면 합의를 포함하고, 주문 전 충분성을 보장한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.4.2"},
  {"id":"L2_e1059","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.4.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.4.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"검사·검증 활동으로 구매품이 규정 요구사항을 충족함을 보장한다. 검증 범위는 공급자 평가 결과와 위험에 근거한다. 공급자가 검증을 수행하면 검사 방법·활동·합격기준을 구매 정보에 포함하고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.4.3"},
  {"id":"L2_e1060","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"절차·방법 문서화, 기반시설 적격성 확인, 공정 파라미터·제품 특성 모니터링·측정, 라벨링·포장 작업, 출하·인도·인도 후 활동을 포함한다. 기기/배치별 추적성·제조 수량·유통 승인 수량 기록을 유지·검증·승인한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.1"},
  {"id":"L2_e1061","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.2의 해당 조건(멸균·세척, 공정제 제거 등)에 따라 제품 청결 및 오염 관리 요구사항을 문서화한다. 제조 중 사용된 공정제가 제품에서 제거되어야 하는 경우를 포함한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.2"},
  {"id":"L2_e1062","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"설치 검증 합격 판정 기준을 포함한 설치 요구사항을 문서화하고, 외부 당사자에게 문서화된 설치·설치 검증 요구사항을 제공하며, 설치 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.3"},
  {"id":"L2_e1063","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"서비스 절차·자재·측정을 문서화하고, 서비스 기록을 분석하여 잠재적 불만을 식별하며 QMS 개선 프로세스의 입력으로 활용한다. 서비스 활동 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.4"},
  {"id":"L2_e1064","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"각 멸균 배치에 사용된 멸균 공정 파라미터 기록을 유지하고, 멸균 기록은 각 생산 배치까지 추적 가능해야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.5"},
  {"id":"L2_e1065","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"공정 검토·승인 기준, 장비·인원 적격성 확인, 방법·절차·합격 판정 기준, (해당 시 표본 크기 근거 포함) 통계적 기법, 밸리데이션 기록 요구사항, 재밸리데이션·기준, 공정 변경 승인. 생산용 소프트웨어도 최초 사용 전 밸리데이션한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.6"},
  {"id":"L2_e1066","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.7","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.7의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"멸균 및 멸균차단시스템에 대한 공정 밸리데이션 절차와, 적절한 경우 제품·공정 변경에 따른 재밸리데이션 절차를 문서화하고 관련 문서·기록을 유지한다(ISO 11607 참조).\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.7"},
  {"id":"L2_e1067","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.8","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.8의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"제품 실현 전반에 걸쳐 제품을 식별하고 모니터링·측정 요구사항에 대한 적합성 상태를 식별·유지한다. 검사·시험 통과 또는 승인된 특채 제품만 출고·사용·설치되며, 규제 적용 시 UDI 시스템을 구축하고 반품 제품을 적합 제품과 구별한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.8"},
  {"id":"L2_e1068","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.9","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.9의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"적용 규제에 따른 추적성 절차를 수립하고, 안전·성능에 영향을 줄 수 있는 부품·자재·작업환경 조건을 기록하며, 유통 서비스 공급자·판매업자는 수하인 이름·주소 등 추적 가능한 기록을 유지하고 검사에 대비한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.9"},
  {"id":"L2_e1069","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.10","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.10의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"조직 관리 하의 고객 자산은 식별·검증·보호·보호조치되어야 하며, 분실·손상되거나 사용 부적합으로 판명되면 고객과의 의사소통 기록을 보존한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.10"},
  {"id":"L2_e1070","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.11","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.11의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"가공·보관·취급·유통 중 변질·오염·손상을 방지하기 위해 적합한 포장·운송 용기를 사용하고, 포장만으로 부족하면 관리·기록을 포함한 특수 조건(예: 콜드체인) 요구사항을 문서화·실행한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.11"},
  {"id":"L2_e1071","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"최초 사용 전과 규정 주기로 국제·국가 측정표준에 소급 가능한 표준에 따라 교정·검증한다. 표준이 없으면 방법을 정의·정당화·기록한다. 장비는 교정 상태 식별, 무효화 조정 보호, 손상·열화 보호. 부적합 판명 시 이전 측정 결과의 유효성을 평가·기록하고 영향받은 장비·제품에 조치한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.6"},
  {"id":"L2_e1072","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"제품의 요구사항 적합성 입증, QMS 적합성 보장, QMS 효과성 유지를 위해 계획·실행하며, 통계적 기법을 포함한 적절한 방법과 그 사용 범위를 결정한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.1"},
  {"id":"L2_e1073","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"생산 및 생산 후 활동의 데이터에 기반한 피드백 프로세스를 수립한다. 피드백 정보는 제품 적합성과 QMS 지속 개선을 위해 위험관리 프로세스의 입력으로 사용된다. 규제가 정한 경우 생산 후 경험을 검토에 활용한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.1"},
  {"id":"L2_e1074","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"적용 규제에 따라 적시 처리하는 문서화 절차를 수립한다. 불만의 접수·기록·평가·조사 요구사항·책임, 규제당국 보고 방법, 관련 제품 처리, 수정·시정조치 착수 방법을 정의한다. 조사하지 않을 경우 정당성을 문서화하고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.2"},
  {"id":"L2_e1075","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"불만 통보(보고)에 관한 적용 규제 요구사항을 식별하고, 규제당국에 보고할 때 문서화된 절차를 따르며 보고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.3"},
  {"id":"L2_e1076","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"QMS가 표준·규제 요구사항에 적합하고 효과적으로 실행·유지되는지 계획된 주기로 확인한다. 프로그램은 프로세스 상태·중요성, 이전 결과, 기준·범위·주기·방법을 고려한다. 심사원은 객관성·공정성을 위해 자신의 업무를 심사할 수 없으며, 부적합은 지체 없이 수정·시정조치되고 후속 검증·보고가 이루어진다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.4"},
  {"id":"L2_e1077","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"QMS 프로세스의 계획된 결과 달성 능력을 확인하는 모니터링·측정 방법을 적용하고, 결과가 달성되지 않으면 적절히 수정 및 시정조치를 실행한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.5"},
  {"id":"L2_e1078","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"여러 실현 단계에서 제품 특성을 측정·모니터링하고 적합성 기록(시험 장비 정보 포함)을 유지한다. 계획·문서화된 모든 활동이 성공적으로 완료될 때까지 출하·인도를 진행하지 않으며, 이식형 기기는 검사·시험 인원의 신원을 기록한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.6"},
  {"id":"L2_e1079","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"부적합 제품이 의도되지 않게 사용·인도되지 않도록 식별·관리한다. 절차는 식별·문서화·격리·평가·처리(disposition)에 대한 관리와 관련 책임·권한을 정의하고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.1"},
  {"id":"L2_e1080","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"발견된 부적합 제거, 원래 의도된 사용·적용 방지, 또는 정당성이 제시·승인되고 규제 요구사항이 충족되는 경우 특채(concession)에 따른 사용·출하·수락 승인. 특채 기록은 승인자의 식별을 포함하여 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.2"},
  {"id":"L2_e1081","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"부적합의 영향 또는 잠재적 영향에 근거하여 요구되는 조치를 취하고, 규제가 명하는 경우 권고문(advisory notice) 발행에 관한 문서화된 절차를 따른다. 그 조치는 언제든 실행할 수 있어야 하며 취해진 조치의 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.3"},
  {"id":"L2_e1082","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"재작업의 잠재적 부정적 영향을 고려하여 문서화된 절차에 따라 수행한다. 재작업 절차는 원래 절차와 동일하게 검토·승인되어야 하고, 재작업 제품은 합격 판정 기준·규제 요구사항 충족이 검증되어야 하며 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.4"},
  {"id":"L2_e1083","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"피드백, 제품 요구사항 적합성, 프로세스·제품 특성과 경향, 개선 기회, 공급자·심사 데이터, 서비스 보고서를 분석한다. QMS가 부적절·불충분·비효과적이면 결과를 개선 활동의 입력으로 사용하고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.4"},
  {"id":"L2_e1084","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.5.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.5.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"부적합·불만 검토 → 근본 원인 결정 → 재발 방지 조치 필요성 평가 → 필요한 조치(문서 갱신 포함) 계획·문서화·실행 → 규제 충족 능력·기기 안전성능에 부정적 영향 없음 검증 → 효과성 검토. 조치는 부적합 영향에 비례하고 부당한 지연 없이 실행하며 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.5.2"},
  {"id":"L2_e1085","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.5.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.5.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"잠재적 부적합 및 그 원인 결정 → 발생 방지 조치 필요성 평가 → 필요한 조치(문서 갱신 포함) 계획·문서화·실행 → 규제·안전에 부정적 영향 없음 검증 → 효과성 검토. 조치는 잠재적 부적합 영향에 비례하고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.5.3"},
  {"id":"L2_e1086","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.5.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.5.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"품질방침·품질목표, 심사, 시판 후 감시, 데이터 분석, 시정·예방조치(CAPA), 경영검토를 통해 QMS의 적절성·충분성·효과성과 의료기기 안전·성능 유지를 위한 변경을 식별·실행한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.5.1"},
  {"id":"L2_e1087","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.1.2/7.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.1.2/7.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"프로세스 관리·변경·교육훈련·공급자관리·검증 범위 등에 위험을 비례 적용한다. 제품실현에서는 ISO 14971에 따라 위해요인 식별→위험 추정·평가→통제→생산 후 정보의 위험관리 프로세스를 적용하고, 그 출력(dFMEA/pFMEA 등)을 설계 입력·변경 평가에 반영한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.1.2/7.1"},
  {"id":"L2_e1088","cat":"서술형·논술형","type":"essay","level":2,"clause":"14971","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 14971의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"① 위험분석(의도된 사용·오사용 식별, 위해요인 식별, 위험 추정), ② 위험평가(계획서 기준과 비교해 감소 필요성 판정), ③ 위험통제(옵션 분석·실행·검증, 잔여위험·위험/이득 분석, 새 위해요인 검토), ④ 생산 및 생산 후 정보. 프로세스는 문서화되고 위험관리 파일로 확인된다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 14971"},
  {"id":"L2_e1089","cat":"서술형·논술형","type":"essay","level":2,"clause":"14971","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 14971의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"① 설계에 의한 본질적 안전(위해요인 제거), ② 기기 자체 또는 제조공정의 보호조치(알람·인터록 등), ③ 안전성 정보 제공(경고·사용설명서·교육). 통제수단은 위해의 심각성 또는 발생가능성(또는 둘 다)을 감소시키며 위험관리 파일에 기록한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 14971"},
  {"id":"L2_e1090","cat":"서술형·논술형","type":"essay","level":2,"clause":"14971","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 14971의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"통제 후 남는 잔여위험을 계획서 기준으로 평가하고, 기준 미충족 시 추가 통제하거나 위험/이득 분석으로 의료적 이득이 잔여위험을 능가함을 입증한다. 모든 통제 실행·검증 후 기기 전체의 포괄적 잔여위험이 허용 가능한지 평가하며, 추적성을 위험관리 보고서로 제공한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 14971"},
  {"id":"L2_e1091","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"제품 적합성 판정을 위한 모니터링·측정에 사용되는 경우를 포함하여 생산·서비스용 소프트웨어를 최초 사용 전, 그리고 소프트웨어·의도된 사용 변경 후 밸리데이션한다. 밸리데이션 노력은 의도된 사용의 위험 및 제품 품질 영향에 비례한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.6"},
  {"id":"L2_e1092","cat":"서술형·논술형","type":"essay","level":2,"clause":"0.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 0.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"ISO 13485는 규제 목적의 요구사항으로, 고객 만족보다 규제 요구사항 준수와 환자 안전·제품 유효성 보장에 초점을 둔다. 부적합 보고서는 발견 사실이 환자 안전·제품 유효성·규제 준수에 미치는 영향으로 결론을 맺어야 설득력이 있다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 0.1"},
  {"id":"L2_e1093","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.7","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.7의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.7은 멸균 및 멸균차단시스템 공정의 밸리데이션을 요구한다. 멸균공정 유효성 확인 없이 출하한 것은 무균성을 보증할 수 없어 7.5.7 위반이며, 환자 안전 직결로 중(Major) 부적합이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.7"},
  {"id":"L2_e1094","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.1은 생산을 관리된 조건(절차·방법 문서화 포함)에서 수행하도록 요구한다. SOP 부재는 관리된 조건을 충족하지 못하므로 부적합이며, 핵심 공정의 일관성에 직접 영향을 주어 중(Major)으로 분류할 수 있다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.1"},
  {"id":"L2_e1095","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.2.1/4.2.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.2.1/4.2.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.2.1은 적용 규제 요구사항 충족을, 의료기기 파일(4.2.3)은 허가 사양과의 일치를 전제로 한다. 허가사항과 다른 생산은 규제 요구사항 위반으로 중(Major) 부적합이며, 변경관리(7.3.9)·생산관리(7.5.1) 위반도 함께 검토한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.2.1/4.2.3"},
  {"id":"L2_e1096","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.5는 각 멸균 배치의 공정 파라미터 기록과 생산 배치까지의 추적성을 요구한다. 기록 누락·추적 불가는 7.5.5 위반이며 무균성 보증·회수 대응에 직결되어 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.5"},
  {"id":"L2_e1097","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.6은 측정장비를 규정 주기로 소급성 있게 교정하도록 요구한다. 교정 주기 경과 장비 사용은 측정 신뢰성을 보증할 수 없어 부적합이며, 부적합 판명 시 이전 결과 영향평가까지 필요하다. 다수 제품에 영향을 주므로 중(Major) 가능.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.6"},
  {"id":"L2_e1098","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.9","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.9의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.3.9는 변경의 식별·검토·검증·(해당 시)밸리데이션·승인과 위험관리 파일 영향 평가를 요구한다. 통제 없는 변경 적용은 명백한 위반으로 중(Major)이며, 시판 제품 안전에 직접 영향을 줄 수 있다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.9"},
  {"id":"L2_e1099","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.2.2는 불만의 평가·조사와, 조사하지 않을 경우 정당성 문서화를 요구한다. 정당성 없이 종결한 것은 위반이며, 규제보고 검토 누락 시 환자 안전·규제 준수에 직결되어 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.2"},
  {"id":"L2_e1100","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.2.4는 심사 객관성·공정성을 위해 심사원이 자신의 업무를 심사하지 못하도록 한다. 자기 부서 심사는 독립성 위반으로 부적합이며, QMS 자가검증 신뢰성을 훼손해 중(Major)으로 볼 수 있다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.4"},
  {"id":"L2_e1101","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.2.6은 계획·문서화된 모든 활동이 완료될 때까지 출하를 금지한다. 미완료 출하는 위반이며, 미검증 제품의 시장 유통으로 환자 안전에 직결되어 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.6"},
  {"id":"L2_e1102","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.5.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.5.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.5.2는 근본 원인 제거와 재발 방지, 효과성 검토를 요구한다. 폐기(수정)만 반복하고 시정조치를 하지 않은 것은 위반이며, 부적합이 재발하므로 중(Major)으로 분류할 수 있다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.5.2"},
  {"id":"L2_e1103","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.4.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.4.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.4.1은 위험에 비례한 공급자 평가·선정 기준 수립을 요구한다. 기준 없이 거래한 것은 위반이며, 핵심 자재·외주의 경우 제품 품질에 직접 영향을 주어 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.4.1"},
  {"id":"L2_e1104","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.4.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.4.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.4.3은 구매품 검증을 요구한다. 미검증 자재 투입은 위반이며 제품 적합성에 직접 영향을 주므로 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.4.3"},
  {"id":"L2_e1105","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.3.3은 설계 입력에 규제 요구사항·위험관리 출력 포함을 요구한다. 미반영은 위반이며, 안전·규제 요구사항이 설계 출발점에서 누락되어 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.3"},
  {"id":"L2_e1106","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.7","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.7의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.3.7은 밸리데이션을 출하 전 완료하도록 요구한다. 미완료 출하는 위반이며, 유효성 미확인 제품의 환자 사용으로 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.7"},
  {"id":"L2_e1107","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.3.2는 특채에 정당성 제시·승인, 규제 충족, 승인자 식별 기록을 요구한다. 이를 충족하지 않은 출하는 위반으로 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.2"},
  {"id":"L2_e1108","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.3.3은 인도 후 부적합에 대한 영향 평가와 (규제 시) 권고문 발행 절차를 요구한다. 무대응은 위반이며 시판 후 안전 조치 체계 결여로 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.3"},
  {"id":"L2_e1109","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.9","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.9의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.9는 이식형 기기의 추적 가능한 기록 유지를 요구한다. 추적성 결여는 위반이며 회수·환자 안전에 직결되어 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.9"},
  {"id":"L2_e1110","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.8","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.8의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.8은 적합성 상태 식별과 반품 제품의 구별을 요구한다. 미식별·혼재는 부적합품 혼입 위험으로 위반이며 중(Major) 가능. UDI 미적용 시 규제 위반도 함께 검토한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.8"},
  {"id":"L2_e1111","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.11","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.11의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.11은 특수 조건의 관리·기록을 요구한다. 콜드체인 미관리는 위반이며 변질로 제품 유효성에 직접 영향을 주어 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.11"},
  {"id":"L2_e1112","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.6은 후속 검증이 불가한 공정의 밸리데이션을 요구한다. 미실시는 위반이며 공정 일관성을 보증할 수 없어 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.6"},
  {"id":"L2_e1113","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.3.6은 검증 방법·합격기준·통계기법과 인터페이스 기능 검증을 요구한다. 누락은 검증 타당성을 보증할 수 없어 위반이며 중(Major) 가능.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.6"},
  {"id":"L2_e1114","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.8","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.8의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.3.8은 이관 시 제조 적합성·생산능력 확인을 요구한다. 미확인 확정은 위반이며 양산 품질 일관성 보증 실패로 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.8"},
  {"id":"L2_e1115","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.10","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.10의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.10은 고객자산의 식별·검증·보호와 손상 시 보고를 요구한다. 미관리·미보고는 위반이며 통상 경(Minor)으로 분류한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.10"},
  {"id":"L2_e1116","cat":"서술형·논술형","type":"essay","level":2,"clause":"6.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 6.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"6.2는 교육훈련 효과성 평가를 요구한다. 효과성 평가 미실시는 위반이며 통상 경(Minor), 단 위험이 높은 업무라면 중(Major)으로 상향될 수 있다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 6.2"},
  {"id":"L2_e1117","cat":"서술형·논술형","type":"essay","level":2,"clause":"6.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 6.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"6.3은 제품 품질에 영향을 주는 유지보수 활동·주기 정의·문서화·기록을 요구한다. 미정의로 교정 누락이 발생한 것은 위반이며, 제품 품질 영향 정도에 따라 경/중으로 분류한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 6.3"},
  {"id":"L2_e1118","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"5.6은 정해진 주기의 경영검토와 규정된 입력(피드백·심사·CAPA·규제변경 등)을 요구한다. 비정기·입력 누락은 위반이며 통상 경(Minor), 다만 효과성 검토가 사실상 부재하면 중(Major)으로 볼 수 있다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.6"},
  {"id":"L2_e1119","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.2.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.2.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"4.2.2는 적용 제외·비적용의 정당성 포함을 요구한다. 정당성 미기재는 위반이며 통상 경(Minor)으로 분류한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.2.2"},
  {"id":"L2_e1120","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.2.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.2.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"4.2.4는 외부 출처 문서의 식별·배포 관리와 구판 오사용 방지를 요구한다. 구버전 사용은 위반이며 제품에 미친 영향에 따라 경/중으로 분류한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.2.4"},
  {"id":"L2_e1121","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.3.1은 부적합품의 식별·격리·평가·처리 관리와 책임·권한 정의를 요구한다. 절차 부재는 부적합품 혼입 방지 체계의 결여로 위반이며 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.1"},
  {"id":"L2_e1122","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.3.4는 재작업 절차의 검토·승인과 재작업 후 합격기준 검증을 요구한다. 검토·검증 생략은 위반이며 통상 경(Minor), 안전 영향이 크면 중(Major)으로 상향한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.4"},
  {"id":"L2_e1123","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.5.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.5.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.5.3은 잠재적 부적합 원인 제거·발생 방지를 위한 예방조치를 요구한다. 신호 식별에도 예방조치가 없는 것은 위반이며 통상 경(Minor)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.5.3"},
  {"id":"L2_e1124","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.2.3은 규제 보고 요구사항 식별·문서화 절차·보고 기록을 요구한다. 미수립·미보고는 규제 의무 미이행으로 위반이며 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.3"},
  {"id":"L2_e1125","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.4는 데이터 분석 절차와 통계기법, 다출처 데이터 분석을 요구한다. 미정의는 위반이며 통상 경(Minor)으로 분류한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.4"},
  {"id":"L2_e1126","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.2.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.2.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.2.2는 약정 전 요구사항 검토와 불일치 해결을 요구한다. 미검토·미해결 진입은 위반이며 사양 불일치로 중(Major)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.2.2"},
  {"id":"L2_e1127","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.3.5는 검토 기록(설계 식별·결과·조치·참가자·일자)과 관련 기능 대표 참여를 요구한다. 기록 부재·불참은 위반이며 통상 경(Minor)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.5"},
  {"id":"L2_e1128","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.3.4는 출력에 합격 판정 기준 포함과 사용 승인 전 승인을 요구한다. 누락·미승인은 위반이며 통상 경(Minor), 생산에 미친 영향에 따라 중(Major) 가능.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.4"},
  {"id":"L2_e1129","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.4.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.4.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.4.2는 구매 정보에 합격기준·QMS 요구사항·변경 통보 합의 포함을 요구한다. 누락은 위반이며 통상 경(Minor)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.4.2"},
  {"id":"L2_e1130","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.3은 설치 검증 합격기준 문서화와 외부 설치자에 대한 요구사항 제공을 요구한다. 미정의·미제공은 위반이며 통상 경(Minor)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.3"},
  {"id":"L2_e1131","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.4는 서비스 기록 분석으로 잠재적 불만 식별·개선 입력 활용을 요구한다. 분석·활용 부재는 위반이며 통상 경(Minor)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.4"},
  {"id":"L2_e1132","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.5.2는 해당 조건에서 청결·오염 관리 요구사항(공정제 제거 포함) 문서화를 요구한다. 미문서화는 위반이며 통상 경(Minor), 감염 위험 시 중(Major)으로 상향.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.2"},
  {"id":"L2_e1133","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.1은 통계적 기법을 포함한 방법과 적용 범위 결정을 요구한다. 미결정은 위반이며 통상 경(Minor)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.1"},
  {"id":"L2_e1134","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.2.1은 생산+생산 후 데이터 기반 피드백과 위험관리 입력 연계를 요구한다. 범위 한정·미연계는 위반이며 통상 경(Minor)이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.1"},
  {"id":"L2_e1135","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.2.5는 계획된 결과 미달 시 수정·시정조치를 요구한다. 무조치는 위반이며 통상 경(Minor), 제품 영향이 크면 중(Major).\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.5"},
  {"id":"L2_e1136","cat":"서술형·논술형","type":"essay","level":2,"clause":"14971 3.4","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 14971 3.4의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"위험관리 임무 수행 인원은 의료기기·그 사용·위험관리 기법에 대한 적절한 지식과 경험을 갖추어야 하며, 자격 요건에 대한 기록을 유지해야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 14971 3.4"},
  {"id":"L2_e1137","cat":"서술형·논술형","type":"essay","level":2,"clause":"14971 3.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 14971 3.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"경영진은 수용 가능한 위험 결정 정책 수립, 적합한 자원 제공, 훈련된 인력 배정, 정해진 주기의 위험관리 활동 결과 검토를 보장해야 하며, 이를 위험관리 파일에 문서화한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 14971 3.3"},
  {"id":"L2_e1138","cat":"서술형·논술형","type":"essay","level":2,"clause":"14971 3.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 14971 3.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"특정 기기·부속품에 대해 위험관리 프로세스에 따른 계획서를 준비하며, 계획서는 위험관리 파일의 일부이다. 적합 여부는 위험관리 파일 검사로 확인한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 14971 3.5"},
  {"id":"L2_e1139","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3/IEC 62304","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3/IEC 62304의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"설계기획↔SW 개발 기획, 설계입력↔SW 요구사항 분석, 설계검증↔SW 통합·통합시험, 설계밸리데이션↔SW 시스템 시험(현장시험), 설계변경↔SW 변경관리로 대응된다. 위험관리(ISO 14971)와 SW 안전성 분류가 연계된다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3/IEC 62304"},
  {"id":"L2_e1140","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.4/일반","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.4/일반의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"① 요구사항: 해당 ISO 13485:2016 조항과 규격 요구 내용 명시, ② 객관적 증거: 발견 사실을 육하원칙으로 기록, ③ 부적합 진술: 요구사항과 사실의 차이를 기술하고 중(Major)/경(Minor) 분류. 결론은 환자 안전·유효성·규제 준수 관점으로 맺는다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.4/일반"},
  {"id":"L2_e1141","cat":"서술형·논술형","type":"essay","level":2,"clause":"일반(심사)","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 일반(심사)의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"중(Major): 시스템의 전반적 실패, 안전·유효성 직결, 규제 위반, 요구 프로세스의 전면 부재. 경(Minor): 시스템은 작동하나 일부 이행 미흡·단발성 누락. 등급은 발견의 중대성과 영향에 따라 결정한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 일반(심사)"},
  {"id":"L2_e1142","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.5.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.5.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"수정은 발견된 부적합을 즉각 제거하는 조치(예: 폐기·재작업)이고, 시정조치는 부적합의 근본 원인을 제거하여 재발을 방지하는 조치이다. 시정조치는 원인 분석·효과성 검토를 포함한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.5.2"},
  {"id":"L2_e1143","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.2.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.2.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.2.6은 계획·문서화된 모든 활동이 성공적으로 완료될 때까지 출하·인도를 금지한다. 이는 미검증·부적합 제품의 시장 유통을 차단하여 환자 안전과 제품 유효성을 보장하기 위한 핵심 통제이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.2.6"},
  {"id":"L2_e1144","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.3.2","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.3.2의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"일반 출하는 모든 요구사항을 충족한 제품의 출하이고, 특채는 부적합이 있으나 정당성이 제시·승인되고 규제 요구사항이 충족되는 경우에 한해 사용·출하·수락을 승인하는 것이다. 특채 기록은 승인자 식별을 포함한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.3.2"},
  {"id":"L2_e1145","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.5/7.3.6/7.3.7","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.5/7.3.6/7.3.7의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"검토는 결과가 요구사항을 충족하는 능력을 평가하고 조치를 식별하는 활동, 검증은 출력이 입력 요구사항을 충족하는지 확인, 밸리데이션은 제품이 의도된 사용을 충족하는지 확인하는 활동이다. 세 활동은 단계별로 구분되어 수행·기록된다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.5/7.3.6/7.3.7"},
  {"id":"L2_e1146","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.8","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.8의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"규제가 적용되는 경우 의료기기에 UDI를 부여하여 제품 실현·유통 전반에서 식별·추적을 가능하게 한다. 이는 부적합·회수 대응과 환자 안전을 강화한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.8"},
  {"id":"L2_e1147","cat":"서술형·논술형","type":"essay","level":2,"clause":"3.1/8.3.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 3.1/8.3.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"권고문은 인도 후 추가 정보 제공 또는 필요한 조치를 권고하기 위해 조직이 발행하는 통지이다. 규제가 명하는 경우 문서화된 절차에 따라 발행하며, 조치는 언제든 실행 가능해야 하고 기록을 유지한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 3.1/8.3.3"},
  {"id":"L2_e1148","cat":"서술형·논술형","type":"essay","level":2,"clause":"4.1.5","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 4.1.5의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"품질 관련 활동과 책임 소재(멸균 공정 파라미터 관리, 기록 제공, 변경 통보, 부적합 처리 등)를 정의해야 한다. 관리는 위험과 공급자 능력에 비례하며, 요구사항 충족 책임은 조직에 있다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 4.1.5"},
  {"id":"L2_e1149","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.4/8.5.1","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.4/8.5.1의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"8.4의 데이터 분석에서 QMS가 부적절·불충분·비효과적임이 드러나면 결과는 개선 입력이 되고, 8.5.1에 따라 품질방침·목표·심사·PMS·CAPA·경영검토를 통해 변경을 식별·실행한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.4/8.5.1"},
  {"id":"L2_e1150","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.1/7.3.3/7.3.9","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.1/7.3.3/7.3.9의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"7.1에서 위험관리 프로세스를 적용해 pFMEA 등 기록을 생성하고, 7.3.3 설계 입력에 dFMEA 출력을 반영하며, 7.3.9 설계 변경 검토 시 위험관리 파일의 입력·출력 영향을 평가한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.1/7.3.3/7.3.9"},
  {"id":"L2_e1151","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.5.7","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.5.7의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"ISO 11607-1/-2를 참조한다. 멸균방벽시스템의 설계·성능과 포장 공정 밸리데이션 요구사항을 제공하므로 무균성 유지의 적절성을 평가하는 근거가 된다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.5.7"},
  {"id":"L2_e1152","cat":"서술형·논술형","type":"essay","level":2,"clause":"5.6.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 5.6.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"5.6.3은 출력에 개선·변경 실행에 필요한 자원을 포함하도록 한다. 개선·변경이 실효를 거두려면 인력·설비·예산 등 자원이 뒷받침되어야 하므로 자원 배정은 경영검토의 필수 출력이다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 5.6.3"},
  {"id":"L2_e1153","cat":"서술형·논술형","type":"essay","level":2,"clause":"7.3.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 7.3.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"입력이 시험 가능해야 후속 검증·밸리데이션에서 충족 여부를 객관적으로 확인할 수 있다. 모호하거나 시험 불가한 입력은 적합성 입증을 불가능하게 하므로 7.3.3은 이를 요구한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 7.3.3"},
  {"id":"L2_e1154","cat":"서술형·논술형","type":"essay","level":2,"clause":"8.5.2/8.5.3","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 8.5.2/8.5.3의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"조치가 실제로 근본 원인을 제거하고 재발/발생을 방지했는지 확인하기 위해 효과성 검토가 필요하다. 검토 없이 종결하면 부적합이 재발할 수 있으므로 규격은 효과성 검토를 의무화한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 8.5.2/8.5.3"},
  {"id":"L2_e1155","cat":"서술형·논술형","type":"essay","level":2,"clause":"6.3/7.6","question":"[심화 적용] 심사 현장에서 ISO 13485 조항 6.3/7.6의 적합성을 확인할 때, 충족되어야 할 핵심 요구사항과 확인해야 할 객관적 증거를 연계하여 서술하시오.","answer":"장비의 정확성·신뢰성이 제품 합부 판정과 공정 관리에 직접 영향을 주므로, 6.3의 유지보수 활동과 7.6의 교정·검증을 통해 측정 신뢰성을 유지해야 한다.\n\n[확인 가능한 객관적 증거(예)] 해당 조항의 관련 절차서·계획서·기록(검토·승인·배포 이력 포함)을 통해 요구사항 충족 여부를 입증한다.","explanation":"근거 조항: ISO 13485:2016 6.3/7.6"},
  {"id":"L2_s1156","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.1","question":"[7.1 제품 실현의 기획] (시나리오) 심사 중 조항 7.1 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.1 (제품 실현의 기획)\n■ 요구사항: ■ 객관적 증거: 인슐린 주입펌프(고위험 기기) 제품실현 기획서(문서번호 PRP-018, rev.0)에 위험관리 활동 계획 및 합격 판정 기준이 정의되어 있지 않음.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.1를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.1"},
  {"id":"L2_s1157","cat":"조항7-8 시나리오","type":"overview","level":2,"clause":"7.2","question":"[7.2 고객 관련 프로세스] (조항 개요) 조항 7.2가 요구하는 활동 전반을 요약하여 서술하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.2 (고객 관련 프로세스)\n■ 요구사항 개요: 제품 관련 요구사항을 결정(7.2.1: 고객·의도된 사용·규제·사용자 교육 요구사항)하고, 공급 약정 전 요구사항을 검토(7.2.2: 정의·불일치 해결·규제 충족·충족 능력 확인, 기록 유지)하며, 제품 정보·문의·계약·피드백·불만·권고문에 관한 고객 의사소통을 계획·실행(7.2.3)하여야 한다.","explanation":""},
  {"id":"L2_s1158","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.2.1","question":"[7.2.1 제품 관련 요구사항 결정] (시나리오) 심사 중 조항 7.2.1 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.2.1 (제품 관련 요구사항 결정)\n■ 요구사항: ■ 객관적 증거: 수출용 IVD 제품 요구사항 명세서(REQ-204)에 수출 대상국에 적용되는 규제 요구사항이 식별·반영되어 있지 않음.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.2.1를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.2.1"},
  {"id":"L2_s1159","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.2.2","question":"[7.2.2 제품 관련 요구사항 검토] (시나리오) 심사 중 조항 7.2.2 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.2.2 (제품 관련 요구사항 검토)\n■ 요구사항: ■ 객관적 증거: 계약 사양과 주문 사양의 멸균 방식 불일치가 공급 약정 전 검토·해결되지 않았고 검토 기록이 없음.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.2.2를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.2.2"},
  {"id":"L2_s1160","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.2.3","question":"[7.2.3 고객 의사소통] (시나리오) 심사 중 조항 7.2.3 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.2.3 (고객 의사소통)\n■ 요구사항: ■ 객관적 증거: 고객 의사소통(불만·권고문 포함)에 대한 문서화된 절차가 수립되어 있지 않고 관행으로 운영됨.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.2.3를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.2.3"},
  {"id":"L2_s1161","cat":"조항7-8 시나리오","type":"overview","level":2,"clause":"7.3","question":"[7.3 설계 및 개발] (조항 개요) 조항 7.3가 요구하는 활동 전반을 요약하여 서술하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.3 (설계 및 개발)\n■ 요구사항 개요: 문서화된 절차(7.3.1) 하에 기획(7.3.2) → 입력(7.3.3, 위험관리 출력·규제 포함) → 출력(7.3.4, 합격기준 포함) → 검토(7.3.5) → 검증(7.3.6, 출력↔입력) → 유효성 확인(7.3.7, 의도된 사용·출하 전 완료) → 이관(7.3.8) → 변경관리(7.3.9, 위험 영향 평가) → 설계·개발 파일(7.3.10) 유지로 구성된다.","explanation":""},
  {"id":"L2_s1162","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.3.1","question":"[7.3.1 일반사항(설계 및 개발)] (시나리오) 심사 중 조항 7.3.1 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.3.1 (일반사항(설계 및 개발))\n■ 요구사항: ■ 객관적 증거: 설계·개발 활동을 규정한 문서화된 절차서가 부재함.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.3.1를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.3.1"},

  {"id":"L2_s1170","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.3.9","question":"[7.3.9 설계 및 개발 변경 관리] (시나리오) 심사 중 조항 7.3.9 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.3.9 (설계 및 개발 변경 관리)\n■ 요구사항: ■ 객관적 증거: A 제품 재질 변경에 대해 중요도 평가, 검토·검증·밸리데이션·승인, 위험관리 파일 영향 평가가 수행되지 않음.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.3.9를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.3.9"},
  {"id":"L2_s1171","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.3.10","question":"[7.3.10 설계 및 개발 파일] (시나리오) 심사 중 조항 7.3.10 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.3.10 (설계 및 개발 파일)\n■ 요구사항: ■ 객관적 증거: 제품군별 설계·개발 파일(DHF)이 구성되어 있지 않고 기록이 산재함.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.3.10를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.3.10"},
  {"id":"L2_s1172","cat":"조항7-8 시나리오","type":"overview","level":2,"clause":"7.4","question":"[7.4 구매] (조항 개요) 조항 7.4가 요구하는 활동 전반을 요약하여 서술하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.4 (구매)\n■ 요구사항 개요: 위험에 비례한 공급자 평가·선정·모니터링·재평가(7.4.1), 구매 정보의 명확한 기술(7.4.2: 사양·QMS 요구사항·변경 통보 합의), 구매품 검증(7.4.3: 위험·평가 결과 기반)을 수행하고 기록을 유지하여야 한다.","explanation":""},
  {"id":"L2_s1173","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.4.1","question":"[7.4.1 구매 프로세스] (시나리오) 심사 중 조항 7.4.1 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.4.1 (구매 프로세스)\n■ 요구사항: ■ 객관적 증거: 멸균 위탁업체에 대한 평가·선정 기준이 없고 모니터링·재평가 기록이 부재함.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.4.1를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.4.1"},
  {"id":"L2_s1174","cat":"조항7-8 시나리오","type":"scenario","level":2,"clause":"7.4.2","question":"[7.4.2 구매 정보] (시나리오) 심사 중 조항 7.4.2 관련 활동을 점검한 결과, 규격이 요구하는 산출물·기록 또는 활동의 일부가 누락되거나 합격 판정 기준이 정의되지 않은 정황이 확인되었다. 심사원으로서 관련 규격 요구사항, 예상되는 부적합 진술, 부적합 등급을 논하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.4.2 (구매 정보)\n■ 요구사항: ■ 객관적 증거: 발주서에 합격 판정·QMS 요구사항 및 변경 통보 합의가 누락됨.\n■ 부적합 진술(예): 위 요구사항을 입증할 산출물·기록 또는 합격 판정 기준이 확인되지 않아 조항 7.4.2를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 누락 범위·환자 안전 영향에 따라 경(Minor)~중(Major)으로 판정한다.","explanation":"근거 조항: ISO 13485:2016 7.4.2"},

  {"id":"L2_s1176","cat":"조항7-8 시나리오","type":"overview","level":2,"clause":"7.5","question":"[7.5 생산 및 서비스 제공] (조항 개요) 조항 7.5가 요구하는 활동 전반을 요약하여 서술하시오.","answer":"■ 관련 규격 조항: ISO 13485:2016 7.5 (생산 및 서비스 제공)\n■ 요구사항 개요: 관리된 조건의 생산(7.5.1), 제품 청결(7.5.2), 설치(7.5.3), 서비스(7.5.4), 멸균 특별 요구(7.5.5), 공정 밸리데이션(7.5.6)·멸균공정 밸리데이션(7.5.7), 식별(7.5.8)·추적성(7.5.9), 고객자산(7.5.10), 제품 보존(7.5.11)을 포함한다.","explanation":""},

// 기기 고유 ID (로그인 전에도 진행 기록 저장용)
function getDeviceId(){
  let id = localStorage.getItem('quiz_device_id');
  if(!id){ id = crypto.randomUUID(); localStorage.setItem('quiz_device_id', id); }
  // 카카오 로그인 사용자면 카카오 ID 우선 사용
  try{
    const auth = JSON.parse(sessionStorage.getItem('quiz_auth'));
    if(auth && auth.nickname && !auth.testMode) return 'kakao_' + auth.nickname;

function load(){
  try{ const s=localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){}
  return JSON.parse(JSON.stringify(SEED));

}

}

function loadWrong(){
  try{ const s=localStorage.getItem(WKEY); return s?JSON.parse(s):[]; }catch(e){ return []; }
}
function saveW(){
  try{ localStorage.setItem(WKEY, JSON.stringify(WRONG)); }catch(e){}
}
function addWrong(id){
  const now=Date.now();
  const ex=WRONG.findIndex(w=>w.id===id);
  if(ex>=0) WRONG[ex].ts=now; else WRONG.push({id:id, ts:now});
  saveW();
}
function removeWrong(id){
  WRONG=WRONG.filter(w=>w.id!==id);
  saveW();
}
function saveProgress(){
  const data = {
    owner:getDeviceId(),           // 계정별 분리: 다른 계정 기록이 섞이지 않도록
    orderIds:order.map(q=>q.id),
    answeredIds:[...answeredIds],
    score:score,
    answered:answered,
    cat:activeCat,
    level:QLEVEL
  };
  // 1) 로컬 즉시 저장
  try{ localStorage.setItem(PKEY, JSON.stringify(data)); }catch(e){}
  // 2) Supabase 비동기 저장
  SB.from('quiz_progress').upsert({
    user_id: getDeviceId(),
    category: activeCat,
    order_ids: data.orderIds,
    answered_ids: data.answeredIds,
    score: score,
    answered: answered,
    updated_at: new Date().toISOString()
  }, { onConflict: 'user_id,category' })
  .then(({error})=>{ if(error) console.warn('Supabase 저장 실패:', error.message); });
}
function loadProgress(){
  try{
    const s=localStorage.getItem(PKEY); if(!s) return null;
    const p=JSON.parse(s);
    if(!p || !p.orderIds || !p.orderIds.length) return null;
    if(p.owner !== getDeviceId()) return null;   // 다른 계정 기록이면 무시

    const bids=new Set(BANK.map(q=>q.id));
    if(!p.orderIds.every(id=>bids.has(id))) return null;
    return p;
  }catch(e){ return null; }
}
function clearProgress(){
  try{ localStorage.removeItem(PKEY); }catch(e){}
  // Supabase에서도 해당 카테고리 기록 삭제
  SB.from('quiz_progress')
    .delete()
    .eq('user_id', getDeviceId())
    .eq('category', activeCat)
    .then(({error})=>{ if(error) console.warn('Supabase 삭제 실패:', error.message); });
}
// Supabase에서 진행 기록 불러와 로컬과 병합
async function syncFromSupabase(){
  try{
    const { data, error } = await SB.from('quiz_progress')
      .select('*').eq('user_id', getDeviceId());
    if(error || !data?.length) return;
    // 가장 최근 기록 찾기
    const latest = data.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at))[0];
    const local = loadProgress();
    const remoteMore = (latest.answered_ids||[]).length >= ((local?.answeredIds)||[]).length;
    if(!local || remoteMore){
      const bids = new Set(BANK.map(q=>q.id));
      if((latest.order_ids||[]).every(id=>bids.has(id))){
        localStorage.setItem(PKEY, JSON.stringify({
          owner: getDeviceId(),
          orderIds: latest.order_ids,
          answeredIds: latest.answered_ids,
          score: latest.score,
          answered: latest.answered,
          cat: latest.category
        }));
        updateSetupProgress();
        toast('☁️ 이전 진행 기록을 불러왔습니다.');
      }
    }
  }catch(e){ console.warn('Supabase 동기화 실패:', e); }
}

function bankRow(q, i){
  return {
    id:q.id, ord:(i==null?Date.now():i), cat:q.cat, type:q.type, clause:q.clause||'',
    question:q.question, options:q.options||[],
    answer_index:(q.answerIndex==null?null:q.answerIndex),
    answer:q.answer||'', explanation:q.explanation||'',
    updated_at:new Date().toISOString()
  };
}
function rowToQ(r){
  return {
    id:r.id, cat:r.cat, type:r.type, clause:r.clause||'',
    question:r.question, options:r.options||[],
    answerIndex:(r.answer_index==null?null:r.answer_index),
    answer:r.answer||'', explanation:r.explanation||''
  };
}

// 현재 BANK 전체를 서버에 반영(관리자 전용). 데이터 손실 방지: 먼저 upsert 후 BANK에 없는 id만 삭제
async function sbSyncBank(){
  if(!BANK.length) return;
  const email = await sbUserEmail();
  if(email !== 'makne0@nate.com') return;  // 관리자만 (서버 RLS도 동일하게 강제)
  try{
    const { error } = await SB.from('questions').upsert(BANK.map(bankRow));
    if(error){ console.warn('문제 저장 실패:', error.message); toast('⚠️ 서버 저장 실패: '+error.message); return; }
    const ids = BANK.map(q=>q.id);
    await SB.from('questions').delete().not('id','in','('+ids.join(',')+')');
    toast('☁️ 문제은행을 서버에 반영했습니다 ('+BANK.length+'문).');
  }catch(e){ console.warn('문제 동기화 실패:', e); }
}
// 서버에서 문제은행 로드 → 모든 사용자에게 최신 반영 (없으면 관리자가 기본문제 1회 업로드)
async function syncBankFromSupabase(){
  try{
    const { data, error } = await SB.from('questions').select('*').order('ord');
    if(error){ console.warn('문제은행 로드 실패:', error.message); return; }
    if(data && data.length){
      // ponytail: 서버 문제 + SEED 신규(LEVEL 2 등) 보강 병합 → 서버에 없는 SEED id를 추가
      const srv = data.map(rowToQ);
      const have = new Set(srv.map(q=>q.id));
      const missing = SEED.filter(q=>!have.has(q.id));
      BANK = srv.concat(missing);
      try{ localStorage.setItem(KEY, JSON.stringify(BANK)); }catch(e){}
      if(typeof renderList==='function' && document.getElementById('bList')) renderList();
      updateSetupProgress(); updateCount();
    } else {
      await sbSyncBank();  // 서버가 비어있으면, 내부에서 관리자 여부 확인 후 업로드
    }
  }catch(e){ console.warn('문제은행 동기화 실패:', e); }
}

  '능동형 의료기기':'전기 에너지 등 (인체·중력이 직접 생성하지 않는) 동력원에 의존해 작동하는 의료기기 (3.2)',
  '구매품':'조직의 품질경영시스템 외부의 당사자가 제공한 제품 (3.16)'
};
function glossaryNote(text){
  if(!text) return '';
  const found=[];
  for(const ab in GLOSSARY_ABBR){
    if(new RegExp('(^|[^A-Za-z])'+ab+'([^A-Za-z]|$)').test(text)){
      const v=GLOSSARY_ABBR[ab];
      found.push('<b>'+ab+'</b> = '+esc(v[0])+' ('+esc(v[1])+')');
    }
  }
  for(const t in GLOSSARY_TERM){
    if(text.indexOf(t)>=0) found.push('<b>'+esc(t)+'</b> : '+esc(GLOSSARY_TERM[t]));
  }
  if(!found.length) return '';
  return '<div style="margin-top:10px;padding:10px 12px;background:#f1f5f9;border-radius:8px;font-size:13px;line-height:1.7;color:#334155;">'+
    '<div style="font-weight:700;color:#475569;margin-bottom:4px;">📖 용어</div>'+
    found.map(f=>'<div>· '+f+'</div>').join('')+'</div>';
}
function fallbackCopy(s){
  try{
    const ta=document.createElement('textarea');
    ta.value=s; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    return true;
  }catch(e){ return false; }
}
function copyText(s){
  if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(s).catch(()=>fallbackCopy(s)); }
  else { fallbackCopy(s); }
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}
