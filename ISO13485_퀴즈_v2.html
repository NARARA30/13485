  {"id":"q292","cat":"조항7-8 시나리오","type":"scenario","clause":"8.5.3","question":"[8.5.3 예방조치] (시나리오) 경향 데이터 분석에서 특정 공정의 부적합 발생 가능성이 증가하는 신호가 관찰되었음에도, 잠재적 부적합의 원인을 제거하여 발생을 방지하기 위한 예방조치 절차나 실행 기록이 존재하지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.5.3 (예방조치)\n■ 요구사항: 조직은 잠재적 부적합의 원인을 제거하여 발생을 방지하기 위한, 영향에 비례한 예방조치를 실행하여야 하며, 잠재적 부적합·원인 결정, 조치 필요성 평가, 계획·실행, 규제·안전 영향 없음 검증, 효과성 검토를 수행하고 기록하여야 한다.\n■ 객관적 증거: 잠재적 부적합 신호가 식별되었음에도 예방조치 절차·실행 기록이 부재함.\n■ 부적합 진술: 잠재적 부적합에 대한 예방조치가 수행되지 않아 8.5.3을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 예방조치 체계의 이행이 미흡.\n■ 작성 포인트: 시정조치(8.5.2)는 발생한 부적합, 예방조치(8.5.3)는 잠재적 부적합 대상임을 명확히 구별한다.","explanation":""},
  {"id": "t1", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.1", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.\"", "options": ["권고문(권고통지)", "위험관리", "멸균 의료기기", "멸균방벽시스템"], "answerIndex": 0, "answer": "권고문(권고통지)", "explanation": "[3.1] 권고문(권고통지) (advisory notice) [SOURCE: GHTF/SG1/N055:2009, 5.2]"},
  {"id": "t2", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.1", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.\"", "options": [], "answerIndex": null, "answer": "권고문(권고통지) (advisory notice)", "explanation": "[3.1] 핵심: 적용 규제 요구사항 준수를 위해 발행이 요구될 수 있다."},
  {"id": "t3", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.1", "question": "'권고문(권고통지) (advisory notice)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.\n[핵심] 적용 규제 요구사항 준수를 위해 발행이 요구될 수 있다.\n[SOURCE: GHTF/SG1/N055:2009, 5.2]", "explanation": "[3.1]"},
  {"id": "t4", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.2", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인.\"", "options": ["위험관리", "멸균 의료기기", "멸균방벽시스템", "위임대리인(지정 대리인)"], "answerIndex": 3, "answer": "위임대리인(지정 대리인)", "explanation": "[3.2] 위임대리인(지정 대리인) (authorized representative) [SOURCE: GHTF/SG1/N055:2009, 5.2]"},
  {"id": "t5", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.2", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인.\"", "options": [], "answerIndex": null, "answer": "위임대리인(지정 대리인) (authorized representative)", "explanation": "[3.2]"},
  {"id": "t6", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.2", "question": "'위임대리인(지정 대리인) (authorized representative)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인.\n[SOURCE: GHTF/SG1/N055:2009, 5.2]", "explanation": "[3.2]"},
  {"id": "t7", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.3", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"제조자가 의도한 대로 사용될 때 의료기기의 임상적 안전과 성능을 검증하기 위해, 그 기기와 관련된 임상 데이터를 사정(assess)·분석하는 것.\"", "options": ["위험관리", "멸균 의료기기", "임상평가", "멸균방벽시스템"], "answerIndex": 2, "answer": "임상평가", "explanation": "[3.3] 임상평가 (clinical evaluation) [SOURCE: GHTF/SG5/N4:2010, Clause 4]"},
  {"id": "t8", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.3", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"제조자가 의도한 대로 사용될 때 의료기기의 임상적 안전과 성능을 검증하기 위해, 그 기기와 관련된 임상 데이터를 사정(assess)·분석하는 것.\"", "options": [], "answerIndex": null, "answer": "임상평가 (clinical evaluation)", "explanation": "[3.3]"},
  {"id": "t9", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.3", "question": "'임상평가 (clinical evaluation)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "제조자가 의도한 대로 사용될 때 의료기기의 임상적 안전과 성능을 검증하기 위해, 그 기기와 관련된 임상 데이터를 사정(assess)·분석하는 것.\n[SOURCE: GHTF/SG5/N4:2010, Clause 4]", "explanation": "[3.3]"},
  {"id": "t10", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.4", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"조직의 관리 하에 출하된 의료기기의 식별·품질·내구성·신뢰성·사용적합성·안전·성능 관련 결함, 또는 그러한 기기의 성능에 영향을 미치는 서비스 관련 결함을 주장하는 서면·전자·구두 의사소통.\"", "options": ["위험관리", "불만", "멸균 의료기기", "멸균방벽시스템"], "answerIndex": 1, "answer": "불만", "explanation": "[3.4] 불만 (complaint)"},
  {"id": "t11", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.4", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"조직의 관리 하에 출하된 의료기기의 식별·품질·내구성·신뢰성·사용적합성·안전·성능 관련 결함, 또는 그러한 기기의 성능에 영향을 미치는 서비스 관련 결함을 주장하는 서면·전자·구두 의사소통.\"", "options": [], "answerIndex": null, "answer": "불만 (complaint)", "explanation": "[3.4] 핵심: 이 정의는 ISO 9000:2015의 불만 정의와 다르다."},
  {"id": "t12", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.4", "question": "'불만 (complaint)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "조직의 관리 하에 출하된 의료기기의 식별·품질·내구성·신뢰성·사용적합성·안전·성능 관련 결함, 또는 그러한 기기의 성능에 영향을 미치는 서비스 관련 결함을 주장하는 서면·전자·구두 의사소통.\n[핵심] 이 정의는 ISO 9000:2015의 불만 정의와 다르다.", "explanation": "[3.4]"},
  {"id": "t13", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.5", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"공급사슬에서 자신의 명의로 최종 사용자에게 의료기기의 가용성을 촉진하는 자연인 또는 법인.\"", "options": ["유통업자(판매업자)", "위험관리", "멸균 의료기기", "멸균방벽시스템"], "answerIndex": 0, "answer": "유통업자(판매업자)", "explanation": "[3.5] 유통업자(판매업자) (distributor) [SOURCE: GHTF/SG1/N055:2009, 5.3]"},
  {"id": "t14", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.5", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"공급사슬에서 자신의 명의로 최종 사용자에게 의료기기의 가용성을 촉진하는 자연인 또는 법인.\"", "options": [], "answerIndex": null, "answer": "유통업자(판매업자) (distributor)", "explanation": "[3.5] 핵심: 공급사슬에 둘 이상 존재 가능. 제조자·수입자·유통업자를 대신해 보관·운송만 수행하는 자는 유통업자가 아니다."},
  {"id": "t15", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.5", "question": "'유통업자(판매업자) (distributor)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "공급사슬에서 자신의 명의로 최종 사용자에게 의료기기의 가용성을 촉진하는 자연인 또는 법인.\n[핵심] 공급사슬에 둘 이상 존재 가능. 제조자·수입자·유통업자를 대신해 보관·운송만 수행하는 자는 유통업자가 아니다.\n[SOURCE: GHTF/SG1/N055:2009, 5.3]", "explanation": "[3.5]"},
  {"id": "t16", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.6", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기.\"", "options": ["위험관리", "멸균 의료기기", "멸균방벽시스템", "이식형 의료기기"], "answerIndex": 3, "answer": "이식형 의료기기", "explanation": "[3.6] 이식형 의료기기 (implantable medical device)"},
  {"id": "t17", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.6", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기.\"", "options": [], "answerIndex": null, "answer": "이식형 의료기기 (implantable medical device)", "explanation": "[3.6] 핵심: 능동 이식형 의료기기를 포함한다."},
  {"id": "t18", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.6", "question": "'이식형 의료기기 (implantable medical device)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기.\n[핵심] 능동 이식형 의료기기를 포함한다.", "explanation": "[3.6]"},
  {"id": "t19", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.7", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"다른 국가·관할권에서 제조된 의료기기를, 그 기기가 판매될 국가·관할권에서 가용하게 만드는 공급사슬상 최초의 자연인 또는 법인.\"", "options": ["위험관리", "멸균 의료기기", "수입업자(수입자)", "멸균방벽시스템"], "answerIndex": 2, "answer": "수입업자(수입자)", "explanation": "[3.7] 수입업자(수입자) (importer) [SOURCE: GHTF/SG1/N055:2009, 5.4]"},
  {"id": "t20", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.7", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"다른 국가·관할권에서 제조된 의료기기를, 그 기기가 판매될 국가·관할권에서 가용하게 만드는 공급사슬상 최초의 자연인 또는 법인.\"", "options": [], "answerIndex": null, "answer": "수입업자(수입자) (importer)", "explanation": "[3.7]"},
  {"id": "t21", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.7", "question": "'수입업자(수입자) (importer)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "다른 국가·관할권에서 제조된 의료기기를, 그 기기가 판매될 국가·관할권에서 가용하게 만드는 공급사슬상 최초의 자연인 또는 법인.\n[SOURCE: GHTF/SG1/N055:2009, 5.4]", "explanation": "[3.7]"},
  {"id": "t22", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.8", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"라벨, 사용설명서, 그리고 의료기기의 식별·기술 설명·의도된 목적·적절한 사용에 관련된 기타 정보(운송 문서는 제외).\"", "options": ["위험관리", "라벨링", "멸균 의료기기", "멸균방벽시스템"], "answerIndex": 1, "answer": "라벨링", "explanation": "[3.8] 라벨링 (labeling) [SOURCE: GHTF/SG1/N70:2011, Clause 4]"},
  {"id": "t23", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.8", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"라벨, 사용설명서, 그리고 의료기기의 식별·기술 설명·의도된 목적·적절한 사용에 관련된 기타 정보(운송 문서는 제외).\"", "options": [], "answerIndex": null, "answer": "라벨링 (labeling)", "explanation": "[3.8]"},
  {"id": "t24", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.8", "question": "'라벨링 (labeling)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "라벨, 사용설명서, 그리고 의료기기의 식별·기술 설명·의도된 목적·적절한 사용에 관련된 기타 정보(운송 문서는 제외).\n[SOURCE: GHTF/SG1/N70:2011, Clause 4]", "explanation": "[3.8]"},
  {"id": "t25", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.9", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계.\"", "options": ["수명주기", "위험관리", "멸균 의료기기", "멸균방벽시스템"], "answerIndex": 0, "answer": "수명주기", "explanation": "[3.9] 수명주기 (life-cycle) [SOURCE: ISO 14971:2007, 2.7]"},
  {"id": "t26", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.9", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계.\"", "options": [], "answerIndex": null, "answer": "수명주기 (life-cycle)", "explanation": "[3.9]"},
  {"id": "t27", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.9", "question": "'수명주기 (life-cycle)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계.\n[SOURCE: ISO 14971:2007, 2.7]", "explanation": "[3.9]"},
  {"id": "t28", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.10", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).\"", "options": ["위험관리", "멸균 의료기기", "멸균방벽시스템", "제조자"], "answerIndex": 3, "answer": "제조자", "explanation": "[3.10] 제조자 (manufacturer)"},
  {"id": "t29", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.10", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).\"", "options": [], "answerIndex": null, "answer": "제조자 (manufacturer)", "explanation": "[3.10] 핵심: 적용 규제 요구사항 준수에 대한 궁극적 법적 책임을 가진다. 사용설명서에 따라 단순 조립·적용하는 자는 제조자가 아니다."},
  {"id": "t30", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.10", "question": "'제조자 (manufacturer)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).\n[핵심] 적용 규제 요구사항 준수에 대한 궁극적 법적 책임을 가진다. 사용설명서에 따라 단순 조립·적용하는 자는 제조자가 아니다.", "explanation": "[3.10]"},
  {"id": "t31", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.11", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"제조자가 인간에 대해 의료 목적(질병·부상의 진단·예방·모니터링·치료·완화, 손상·장애의 보정, 해부·생리·병리 과정/상태의 검사·대체·변경·지원, 생명 유지, 임신 조절, 의료기기의 소독, 인체 시료의 체외 검사를 통한 정보 제공 등)으로 단독 또는 조합으로 사용하도록 의도한 기구·장치·기계·소프트웨어·재료 등. 단, 약리·면역·대사 수단으로 주된 작용을 달성하지 않는다(그 수단의 보조는 가능).\"", "options": ["위험관리", "멸균 의료기기", "의료기기", "멸균방벽시스템"], "answerIndex": 2, "answer": "의료기기", "explanation": "[3.11] 의료기기 (medical device)"},
  {"id": "t32", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.11", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"제조자가 인간에 대해 의료 목적(질병·부상의 진단·예방·모니터링·치료·완화, 손상·장애의 보정, 해부·생리·병리 과정/상태의 검사·대체·변경·지원, 생명 유지, 임신 조절, 의료기기의 소독, 인체 시료의 체외 검사를 통한 정보 제공 등)으로 단독 또는 조합으로 사용하도록 의도한 기구·장치·기계·소프트웨어·재료 등. 단, 약리·면역·대사 수단으로 주된 작용을 달성하지 않는다(그 수단의 보조는 가능).\"", "options": [], "answerIndex": null, "answer": "의료기기 (medical device)", "explanation": "[3.11] 핵심: 체외진단(IVD) 의료기기, 부속품을 포함할 수 있다."},
  {"id": "t33", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.11", "question": "'의료기기 (medical device)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "제조자가 인간에 대해 의료 목적(질병·부상의 진단·예방·모니터링·치료·완화, 손상·장애의 보정, 해부·생리·병리 과정/상태의 검사·대체·변경·지원, 생명 유지, 임신 조절, 의료기기의 소독, 인체 시료의 체외 검사를 통한 정보 제공 등)으로 단독 또는 조합으로 사용하도록 의도한 기구·장치·기계·소프트웨어·재료 등. 단, 약리·면역·대사 수단으로 주된 작용을 달성하지 않는다(그 수단의 보조는 가능).\n[핵심] 체외진단(IVD) 의료기기, 부속품을 포함할 수 있다.", "explanation": "[3.11]"},
  {"id": "t34", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.12", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"동일 조직이(또는 동일 조직을 위해) 제조하고, 안전·의도된 사용·기능에 관련된 동일한 기본 설계 및 성능 특성을 갖는 의료기기 그룹.\"", "options": ["위험관리", "의료기기군", "멸균 의료기기", "멸균방벽시스템"], "answerIndex": 1, "answer": "의료기기군", "explanation": "[3.12] 의료기기군 (medical device family)"},
  {"id": "t35", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.12", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"동일 조직이(또는 동일 조직을 위해) 제조하고, 안전·의도된 사용·기능에 관련된 동일한 기본 설계 및 성능 특성을 갖는 의료기기 그룹.\"", "options": [], "answerIndex": null, "answer": "의료기기군 (medical device family)", "explanation": "[3.12]"},
  {"id": "t36", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.12", "question": "'의료기기군 (medical device family)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "동일 조직이(또는 동일 조직을 위해) 제조하고, 안전·의도된 사용·기능에 관련된 동일한 기본 설계 및 성능 특성을 갖는 의료기기 그룹.", "explanation": "[3.12]"},
  {"id": "t37", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.13", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"체외진단(IVD) 의료기기가 의도된 사용을 달성할 수 있는 능력을 수립하거나 검증하기 위한 데이터의 사정·분석.\"", "options": ["성능평가", "위험관리", "멸균 의료기기", "멸균방벽시스템"], "answerIndex": 0, "answer": "성능평가", "explanation": "[3.13] 성능평가 (performance evaluation)"},
  {"id": "t38", "cat": "3장 용어퀴즈", "type": "short", "clause": "3.13", "question": "다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"체외진단(IVD) 의료기기가 의도된 사용을 달성할 수 있는 능력을 수립하거나 검증하기 위한 데이터의 사정·분석.\"", "options": [], "answerIndex": null, "answer": "성능평가 (performance evaluation)", "explanation": "[3.13]"},
  {"id": "t39", "cat": "3장 용어퀴즈", "type": "essay", "clause": "3.13", "question": "'성능평가 (performance evaluation)'의 정의를 서술하시오.", "options": [], "answerIndex": null, "answer": "체외진단(IVD) 의료기기가 의도된 사용을 달성할 수 있는 능력을 수립하거나 검증하기 위한 데이터의 사정·분석.", "explanation": "[3.13]"},
  {"id": "t40", "cat": "3장 용어퀴즈", "type": "mc", "clause": "3.14", "question": "다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"이미 시장에 출시된 의료기기로부터 얻은 경험을 수집하고 분석하는 체계적 프로세스.\"", "options": ["위험관리", "멸균 의료기기", "멸균방벽시스템", "시판 후 감시(사후 감시)"], "answerIndex": 3, "answer": "시판 후 감시(사후 감시)", "explanation": "[3.14] 시판 후 감시(사후 감시) (post-market surveillance)"},

  {"id":"L2_t333","cat":"3장 용어퀴즈","type":"mc","level":2,"clause":"3.1","question":"ISO 13485 3장 용어 '권고문(권고통지) (advisory notice)'의 정의로 가장 옳은 것은?","options":["공급사슬에서 자신의 명의로 최종 사용자에게 의료기기의 가용성을 촉진하는 자연인 또는 법인.","의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.","자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).","이미 시장에 출시된 의료기기로부터 얻은 경험을 수집하고 분석하는 체계적 프로세스."],"answerIndex":1,"answer":"의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.","explanation":"[3.1] 권고문(권고통지) (advisory notice): 의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지."},
  {"id":"L2_t334","cat":"3장 용어퀴즈","type":"short","level":2,"clause":"3.1","question":"다음 정의에 해당하는 ISO 13485 3장 용어를 국문·영문으로 쓰시오.\n\n\"의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.\"","answer":"권고문(권고통지) (advisory notice)","explanation":"[3.1] 권고문(권고통지) (advisory notice)"},
  {"id":"L2_t335","cat":"3장 용어퀴즈","type":"essay","level":2,"clause":"3.1","question":"ISO 13485 3장 '권고문(권고통지) (advisory notice)' 용어의 정의를 서술하고, 유사 용어와 구분되는 핵심 포인트를 기술하시오.","answer":"의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.\n[조항 3.1]","explanation":"[3.1] 권고문(권고통지) (advisory notice)"},
  {"id":"L2_t336","cat":"3장 용어퀴즈","type":"mc","level":2,"clause":"3.2","question":"ISO 13485 3장 용어 '위임대리인(지정 대리인) (authorized representative)'의 정의로 가장 옳은 것은?","options":["최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계.","위해(harm)의 발생 가능성과 그 위해의 심각성(severity)의 조합.","멸균에 대한 요구사항을 충족하도록 의도된 의료기기.","특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인."],"answerIndex":3,"answer":"특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인.","explanation":"[3.2] 위임대리인(지정 대리인) (authorized representative): 특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인."},

  {"id":"L2_t357","cat":"3장 용어퀴즈","type":"mc","level":2,"clause":"3.9","question":"ISO 13485 3장 용어 '수명주기 (life-cycle)'의 정의로 가장 옳은 것은?","options":["동일 조직이(또는 동일 조직을 위해) 제조하고, 안전·의도된 사용·기능에 관련된 동일한 기본 설계 및 성능 특성을 갖는 의료기기 그룹.","공급사슬에서 자신의 명의로 최종 사용자에게 의료기기의 가용성을 촉진하는 자연인 또는 법인.","내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기.","최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계."],"answerIndex":3,"answer":"최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계.","explanation":"[3.9] 수명주기 (life-cycle): 최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계."},

  {"id":"L2_t360","cat":"3장 용어퀴즈","type":"mc","level":2,"clause":"3.10","question":"ISO 13485 3장 용어 '제조자 (manufacturer)'의 정의로 가장 옳은 것은?","options":["제조자가 인간에 대해 의료 목적(질병·부상의 진단·예방·모니터링·치료·완화, 손상·장애의 보정, 해부·생리·병리 과정/상태의 검사·대체·변경·지원, 생명 유지, 임신 조절, 의료기기의 소독, 인체 시료의 체외 검사를 통한 정보 제공 등)으로 단독 또는 조합으로 사용하도록 의도한 기구·장치·기계·소프트웨어·재료 등. 단, 약리·면역·대사 수단으로 주된 작용을 달성하지 않는다(그 수단의 보조는 가능).","내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기.","자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).","미생물의 침입을 막고 사용 시점에 제품의 무균 상태 제시를 가능하게 하는 최소 포장."],"answerIndex":2,"answer":"자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).","explanation":"[3.10] 제조자 (manufacturer): 자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관)."},

  {"id":"L2_t378","cat":"3장 용어퀴즈","type":"mc","level":2,"clause":"3.16","question":"ISO 13485 3장 용어 '구매품 (purchased product)'의 정의로 가장 옳은 것은?","options":["조직의 관리 하에 출하된 의료기기의 식별·품질·내구성·신뢰성·사용적합성·안전·성능 관련 결함, 또는 그러한 기기의 성능에 영향을 미치는 서비스 관련 결함을 주장하는 서면·전자·구두 의사소통.","조직의 품질경영시스템 외부의 당사자가 제공한 제품.","제조자가 의도한 대로 사용될 때 의료기기의 임상적 안전과 성능을 검증하기 위해, 그 기기와 관련된 임상 데이터를 사정(assess)·분석하는 것.","자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관)."],"answerIndex":1,"answer":"조직의 품질경영시스템 외부의 당사자가 제공한 제품.","explanation":"[3.16] 구매품 (purchased product): 조직의 품질경영시스템 외부의 당사자가 제공한 제품."},

  {"id":"L2_t381","cat":"3장 용어퀴즈","type":"mc","level":2,"clause":"3.17","question":"ISO 13485 3장 용어 '위험(리스크) (risk)'의 정의로 가장 옳은 것은?","options":["의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.","위해(harm)의 발생 가능성과 그 위해의 심각성(severity)의 조합.","제조자가 의도한 대로 사용될 때 의료기기의 임상적 안전과 성능을 검증하기 위해, 그 기기와 관련된 임상 데이터를 사정(assess)·분석하는 것.","제조자가 인간에 대해 의료 목적(질병·부상의 진단·예방·모니터링·치료·완화, 손상·장애의 보정, 해부·생리·병리 과정/상태의 검사·대체·변경·지원, 생명 유지, 임신 조절, 의료기기의 소독, 인체 시료의 체외 검사를 통한 정보 제공 등)으로 단독 또는 조합으로 사용하도록 의도한 기구·장치·기계·소프트웨어·재료 등. 단, 약리·면역·대사 수단으로 주된 작용을 달성하지 않는다(그 수단의 보조는 가능)."],"answerIndex":1,"answer":"위해(harm)의 발생 가능성과 그 위해의 심각성(severity)의 조합.","explanation":"[3.17] 위험(리스크) (risk): 위해(harm)의 발생 가능성과 그 위해의 심각성(severity)의 조합."},

  {"id":"L2_t387","cat":"3장 용어퀴즈","type":"mc","level":2,"clause":"3.19","question":"ISO 13485 3장 용어 '멸균방벽시스템 (sterile barrier system)'의 정의로 가장 옳은 것은?","options":["조직의 관리 하에 출하된 의료기기의 식별·품질·내구성·신뢰성·사용적합성·안전·성능 관련 결함, 또는 그러한 기기의 성능에 영향을 미치는 서비스 관련 결함을 주장하는 서면·전자·구두 의사소통.","체외진단(IVD) 의료기기가 의도된 사용을 달성할 수 있는 능력을 수립하거나 검증하기 위한 데이터의 사정·분석.","미생물의 침입을 막고 사용 시점에 제품의 무균 상태 제시를 가능하게 하는 최소 포장.","다른 국가·관할권에서 제조된 의료기기를, 그 기기가 판매될 국가·관할권에서 가용하게 만드는 공급사슬상 최초의 자연인 또는 법인."],"answerIndex":2,"answer":"미생물의 침입을 막고 사용 시점에 제품의 무균 상태 제시를 가능하게 하는 최소 포장.","explanation":"[3.19] 멸균방벽시스템 (sterile barrier system): 미생물의 침입을 막고 사용 시점에 제품의 무균 상태 제시를 가능하게 하는 최소 포장."},

  {"id":"L2_t390","cat":"3장 용어퀴즈","type":"mc","level":2,"clause":"3.20","question":"ISO 13485 3장 용어 '멸균 의료기기 (sterile medical device)'의 정의로 가장 옳은 것은?","options":["위해(harm)의 발생 가능성과 그 위해의 심각성(severity)의 조합.","미생물의 침입을 막고 사용 시점에 제품의 무균 상태 제시를 가능하게 하는 최소 포장.","멸균에 대한 요구사항을 충족하도록 의도된 의료기기.","내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기."],"answerIndex":2,"answer":"멸균에 대한 요구사항을 충족하도록 의도된 의료기기.","explanation":"[3.20] 멸균 의료기기 (sterile medical device): 멸균에 대한 요구사항을 충족하도록 의도된 의료기기."},
