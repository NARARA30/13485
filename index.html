<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자격증 학습 센터</title>
  <!-- ✅ 카카오 JavaScript SDK -->
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
  <!-- ✅ Supabase JS (CDN — 단일 HTML이라 npm 대신 CDN 사용) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f5f7fa;
      min-height: 100vh;
    }

    /* ── 상단 사용자 바 ── */
    #userBar {
      display: none;
      background: #fff;
      border-bottom: 1px solid #e6eaf0;
      padding: 10px 20px;
      align-items: center;
      gap: 10px;
    }
    #userBar.visible { display: flex; }
    #userAvatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #e6eaf0;
      object-fit: cover;
      flex-shrink: 0;
    }
    #userName { font-size: 14px; font-weight: 600; color: #1e293b; flex: 1; }
    #btnLogout {
      font-size: 12px; color: #64748b;
      background: none; border: 1px solid #e6eaf0;
      border-radius: 6px; padding: 4px 10px;
      cursor: pointer;
    }
    #btnLogout:hover { background: #f5f7fa; }

    /* ── 메인 ── */
    .main-wrap {
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .section-header { margin-bottom: 24px; }
    .section-header h1 { font-size: 22px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
    .section-header p { font-size: 14px; color: #64748b; }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .cert-item {
      display: flex;
      align-items: center;
      padding: 20px 24px;
      border: none;
      border-bottom: 1px solid #eef2f9;
      outline: none;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      cursor: pointer;
      background: none;
      width: 100%;
      text-align: left;
      -webkit-appearance: none;
    }
    .cert-item:last-child { border-bottom: none; }
    .cert-item:hover { background: #f5f7fa; }
    .cert-item.disabled { cursor: default; opacity: 0.5; pointer-events: none; }

    .icon-wrap {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: #fdeee1;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-right: 16px;
    }
    .icon-wrap svg { width: 22px; height: 22px; color: #f47b20; }

    .cert-info { flex: 1; }
    .cert-tag { font-size: 12px; color: #94a3b8; margin-bottom: 2px; }
    .cert-name { font-size: 16px; font-weight: 600; color: #1e293b; }

    .cert-action {
      font-size: 14px; color: #64748b;
      display: flex; align-items: center; gap: 2px; flex-shrink: 0;
    }
    .cert-action .arrow { font-size: 16px; }
    .badge-soon {
      font-size: 11px; background: #eef2f9; color: #94a3b8;
      border-radius: 20px; padding: 2px 10px;
    }

    /* ── 로그인 모달 ── */
    #loginOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #loginOverlay.visible { display: flex; }

    .login-box {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%; max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }

    .login-icon {
      width: 64px; height: 64px;
      background: #e8f1fb;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }

    .login-box h2 { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #64748b; margin-bottom: 24px; line-height: 1.6; }

    /* 카카오 버튼 공식 스타일 */
    .btn-kakao {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      background: #FEE500;
      color: #000000d9;
      border: none; border-radius: 12px;
      padding: 14px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: filter .15s;
    }
    .btn-kakao:hover { filter: brightness(.95); }
    .btn-kakao svg { flex-shrink: 0; }

    .login-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 16px 0;
      font-size: 12px; color: #94a3b8;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: #e6eaf0;
    }

    .btn-test {
      width: 100%; background: none;
      border: 1px solid #e6eaf0; border-radius: 12px;
      padding: 12px; font-size: 13px; color: #64748b;
      cursor: pointer; transition: background .15s;
    }
    .btn-test:hover { background: #f5f7fa; }

    .login-close {
      margin-top: 16px;
      font-size: 12px; color: #94a3b8;
      background: none; border: none;
      cursor: pointer; text-decoration: underline;
    }

    .login-note {
      margin-top: 20px;
      font-size: 11px; color: #cbd5e1;
      line-height: 1.6;
    }

    /* ── 이메일/비밀번호 입력 ── */
    .auth-field { text-align: left; margin-bottom: 10px; }
    .auth-field label { display: block; font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 4px; }
    .auth-field input {
      width: 100%; padding: 11px 12px;
      border: 1px solid #e6eaf0; border-radius: 10px;
      font-size: 14px; color: #1e293b; outline: none;
      transition: border-color .15s;
    }
    .auth-field input:focus { border-color: #2f6fb3; }
    .btn-primary {
      width: 100%; background: #2f6fb3; color: #fff;
      border: none; border-radius: 12px; padding: 13px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: filter .15s;
    }
    .btn-primary:hover { filter: brightness(.95); }
    .btn-primary:disabled { opacity: .6; cursor: default; }
    .signup-title { font-size: 15px; font-weight: 700; color: #1e293b; margin: 4px 0 12px; text-align: left; }
    .auth-hint { font-size: 11px; color: #94a3b8; margin: -4px 0 0; }
    .auth-msg { font-size: 12px; margin-top: 10px; min-height: 16px; }
    .auth-msg.err { color: #dc2626; }
    .auth-msg.ok { color: #16a34a; }
    #signupForm { display: none; margin-top: 8px; }
    #signupForm.visible { display: block; }
  </style>

<script>
/* ============================================================
   ✅ 카카오 앱 키 설정
   developers.kakao.com → 내 앱 → 앱 설정 → 앱 키 → JavaScript 키
   ============================================================ */
const KAKAO_JS_KEY = 'YOUR_KAKAO_JS_KEY'; // ← 여기에 JavaScript 키 입력

/* ============================================================
   ✅ Supabase 설정 (anon key는 공개용이라 노출 안전)
   ============================================================ */
const SUPABASE_URL = 'https://ovtaktewwiwmegwldlyj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92dGFrdGV3d2l3bWVnd2xkbHlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjI0NjgsImV4cCI6MjA5NzY5ODQ2OH0.WQYbU-G7cVdbJeIm9Hxx-Dg9jzkArTDz_ehK--zarjo';
// ponytail: CDN 로드 실패 시 전체 스크립트가 죽지 않도록 가드
const sb = (typeof supabase !== 'undefined') ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;

/* ============================================================
   인증 상태 관리 (sessionStorage)
   ============================================================ */
const AUTH_KEY = 'quiz_auth';
let pendingUrl = null;

function getAuth() {
  try { return JSON.parse(sessionStorage.getItem(AUTH_KEY)); } catch(e) { return null; }
}
function setAuth(data) {
  sessionStorage.setItem(AUTH_KEY, JSON.stringify(data));
}
function clearAuth() {
  sessionStorage.removeItem(AUTH_KEY);
}

/* ============================================================
   카카오 SDK 초기화
   ============================================================ */
try {
  if (KAKAO_JS_KEY !== 'YOUR_KAKAO_JS_KEY') {
    Kakao.init(KAKAO_JS_KEY);
  }
} catch(e) {
  console.warn('Kakao SDK 초기화 실패:', e);
}

/* ============================================================
   UI 갱신
   ============================================================ */
function updateHeaderUI() {
  const auth = getAuth();
  const bar = document.getElementById('userBar');
  if (auth) {
    bar.classList.add('visible');
    document.getElementById('userName').textContent = auth.nickname + ' 님';
    if (auth.profileImage) {
      document.getElementById('userAvatar').src = auth.profileImage;
    }
  } else {
    bar.classList.remove('visible');
  }
}

/* ============================================================
   학습하기 클릭 처리
   ============================================================ */
function handleStudyClick(url) {
  if (getAuth()) {
    window.location.href = url;
  } else {
    pendingUrl = url;
    showLoginModal();
  }
}

/* ============================================================
   로그인 모달
   ============================================================ */
function showLoginModal() {
  document.getElementById('loginOverlay').classList.add('visible');
}
function closeLoginModal() {
  document.getElementById('loginOverlay').classList.remove('visible');
}
function overlayClose(e) {
  if (e.target === document.getElementById('loginOverlay')) closeLoginModal();
}

/* ============================================================
   카카오 로그인
   ============================================================ */
function doKakaoLogin() {
  if (KAKAO_JS_KEY === 'YOUR_KAKAO_JS_KEY' || !Kakao.isInitialized()) {
    alert('앱 키가 설정되지 않았습니다.\nindex.html의 KAKAO_JS_KEY를 입력하거나 테스트 모드를 이용하세요.');
    return;
  }
  Kakao.Auth.login({
    success: function(authObj) {
      Kakao.API.request({
        url: '/v2/user/me',
        success: function(res) {
          const profile = res.kakao_account?.profile || {};
          setAuth({
            nickname: profile.nickname || '카카오 사용자',
            profileImage: profile.profile_image_url || '',
            timestamp: Date.now()
          });
          closeLoginModal();
          updateHeaderUI();
          if (pendingUrl) window.location.href = pendingUrl;
        },
        fail: function(err) {
          console.error('사용자 정보 요청 실패', err);
          alert('사용자 정보를 가져오는 데 실패했습니다.');
        }
      });
    },
    fail: function(err) {
      console.error('로그인 실패', err);
      alert('카카오 로그인에 실패했습니다.\n도메인이 등록되지 않았을 수 있습니다.\n테스트 모드를 이용해 주세요.');
    }
  });
}

/* ============================================================
   이메일/비밀번호 인증 (Supabase Auth — 비밀번호는 자동 해싱 저장)
   ============================================================ */
// ponytail: 비밀번호 규칙(영어[대소문자 무관]+숫자+특수문자 !@#$% / 8~13자리)을 정규식 한 줄로 검증
const PW_RULE = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%])[A-Za-z\d!@#$%]{8,13}$/;

function showMsg(id, text, ok) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'auth-msg ' + (ok ? 'ok' : 'err');
}

function loginSuccess(email) {
  setAuth({ nickname: email, profileImage: '', timestamp: Date.now() });
  closeLoginModal();
  updateHeaderUI();
  window.location.href = pendingUrl || 'ISO13485_퀴즈_v2.html';
}

function toggleSignup() {
  document.getElementById('signupForm').classList.toggle('visible');
}

async function doEmailLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  if (!email || !pw) { showMsg('loginMsg', 'ID와 PW를 입력해 주세요.'); return; }
  if (!sb) { showMsg('loginMsg', '네트워크 오류로 로그인 모듈을 불러오지 못했습니다.'); return; }
  showMsg('loginMsg', '로그인 중...', true);
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { showMsg('loginMsg', 'ID 또는 PW가 올바르지 않습니다.'); return; }
  loginSuccess(email);
}

async function doSignup() {
  const email = document.getElementById('signupEmail').value.trim();
  const pw = document.getElementById('signupPw').value;
  if (!email) { showMsg('signupMsg', '이메일을 입력해 주세요.'); return; }
  if (!PW_RULE.test(pw)) {
    showMsg('signupMsg', '비밀번호는 숫자·영어·특수문자(!@#$%) 조합 8~13자리여야 합니다.');
    return;
  }
  if (!sb) { showMsg('signupMsg', '네트워크 오류로 회원가입 모듈을 불러오지 못했습니다.'); return; }
  showMsg('signupMsg', '가입 중...', true);
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if (error) { showMsg('signupMsg', error.message || '회원가입에 실패했습니다.'); return; }
  // 이메일 확인이 꺼져 있으면 즉시 세션 발급 → 바로 입장
  if (data.session) { loginSuccess(email); return; }
  showMsg('signupMsg', '가입 완료! 메일로 받은 인증 링크를 누른 뒤 로그인해 주세요.', true);
}

/* ============================================================
   로그아웃
   ============================================================ */
function doLogout() {
  clearAuth();
  updateHeaderUI();
  // 카카오 로그아웃 (SDK 초기화된 경우)
  try {
    if (Kakao.isInitialized() && Kakao.Auth.getAccessToken()) {
      Kakao.Auth.logout();
    }
  } catch(e) {}
}

/* ── 초기화 ── */
updateHeaderUI();
</script>
