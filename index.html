<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>자격증 학습 센터</title>
  <!-- ✅ 카카오 JavaScript SDK -->
  <script src="https://developers.kakao.com/sdk/js/kakao.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
    }

    /* ── 상단 사용자 바 ── */
    #userBar {
      display: none;
      background: #fff;
      border-bottom: 1px solid #eee;
      padding: 10px 20px;
      align-items: center;
      gap: 10px;
    }
    #userBar.visible { display: flex; }
    #userAvatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #ddd;
      object-fit: cover;
      flex-shrink: 0;
    }
    #userName { font-size: 14px; font-weight: 600; color: #111; flex: 1; }
    #btnLogout {
      font-size: 12px; color: #888;
      background: none; border: 1px solid #ddd;
      border-radius: 6px; padding: 4px 10px;
      cursor: pointer;
    }
    #btnLogout:hover { background: #f5f5f5; }

    /* ── 메인 ── */
    .main-wrap {
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    .section-header { margin-bottom: 24px; }
    .section-header h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .section-header p { font-size: 14px; color: #888; }

    .card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .cert-item {
      display: flex;
      align-items: center;
      padding: 20px 24px;
      border: none;
      border-bottom: 1px solid #f0f0f0;
      outline: none;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      cursor: pointer;
      background: none;
      width: 100%;
      text-align: left;
      -webkit-appearance: none;
    }
    .cert-item:last-child { border-bottom: none; }
    .cert-item:hover { background: #fafafa; }
    .cert-item.disabled { cursor: default; opacity: 0.5; pointer-events: none; }

    .icon-wrap {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: #fff0f0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-right: 16px;
    }
    .icon-wrap svg { width: 22px; height: 22px; color: #e84646; }

    .cert-info { flex: 1; }
    .cert-tag { font-size: 12px; color: #999; margin-bottom: 2px; }
    .cert-name { font-size: 16px; font-weight: 600; color: #111; }

    .cert-action {
      font-size: 14px; color: #888;
      display: flex; align-items: center; gap: 2px; flex-shrink: 0;
    }
    .cert-action .arrow { font-size: 16px; }
    .badge-soon {
      font-size: 11px; background: #f0f0f0; color: #aaa;
      border-radius: 20px; padding: 2px 10px;
    }

    /* ── 로그인 모달 ── */
    #loginOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 100;
      align-items: center; justify-content: center;
      padding: 20px;
    }
    #loginOverlay.visible { display: flex; }

    .login-box {
      background: #fff;
      border-radius: 20px;
      padding: 36px 28px;
      width: 100%; max-width: 360px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }

    .login-icon {
      width: 64px; height: 64px;
      background: #eaf2fb;
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
    }

    .login-box h2 { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 24px; line-height: 1.6; }

    /* 카카오 버튼 공식 스타일 */
    .btn-kakao {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%;
      background: #FEE500;
      color: #000000d9;
      border: none; border-radius: 12px;
      padding: 14px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: filter .15s;
    }
    .btn-kakao:hover { filter: brightness(.95); }
    .btn-kakao svg { flex-shrink: 0; }

    .login-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 16px 0;
      font-size: 12px; color: #bbb;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: #eee;
    }

    .btn-test {
      width: 100%; background: none;
      border: 1px solid #ddd; border-radius: 12px;
      padding: 12px; font-size: 13px; color: #888;
      cursor: pointer; transition: background .15s;
    }
    .btn-test:hover { background: #f5f5f5; }

    .login-close {
      margin-top: 16px;
      font-size: 12px; color: #bbb;
      background: none; border: none;
      cursor: pointer; text-decoration: underline;
    }

    .login-note {
      margin-top: 20px;
      font-size: 11px; color: #ccc;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- 로그인된 사용자 상단 바 -->
  <div id="userBar">
    <img id="userAvatar" src="" alt="프로필" onerror="this.style.display='none'">
    <span id="userName"></span>
    <button id="btnLogout" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="main-wrap">
    <div class="container">
      <div class="section-header">
        <h1>자격증 학습</h1>
        <p>다양한 자격증을 학습해보세요.</p>
      </div>

      <div class="card">

        <!-- ISO 13485 — 로그인 필요 -->
        <button class="cert-item" onclick="handleStudyClick('ISO13485_퀴즈_v2.html')">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>
          <div class="cert-info">
            <div class="cert-tag">심사원</div>
            <div class="cert-name">ISO 13485</div>
          </div>
          <div class="cert-action">학습하기 <span class="arrow">›</span></div>
        </button>

        <!-- GMP 2급 필기 -->
        <div class="cert-item disabled">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>
          <div class="cert-info">
            <div class="cert-tag">필기</div>
            <div class="cert-name">GMP 2급</div>
          </div>
          <div class="cert-action"><span class="badge-soon">준비중</span></div>
        </div>

        <!-- GMP 2급 실기 -->
        <div class="cert-item disabled">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>
          <div class="cert-info">
            <div class="cert-tag">실기</div>
            <div class="cert-name">GMP 2급</div>
          </div>
          <div class="cert-action"><span class="badge-soon">준비중</span></div>
        </div>

        <!-- GMP 1급 필기 -->
        <div class="cert-item disabled">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>
          <div class="cert-info">
            <div class="cert-tag">필기</div>
            <div class="cert-name">GMP 1급</div>
          </div>
          <div class="cert-action"><span class="badge-soon">준비중</span></div>
        </div>

        <!-- GMP 1급 실기 -->
        <div class="cert-item disabled">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>
          <div class="cert-info">
            <div class="cert-tag">실기</div>
            <div class="cert-name">GMP 1급</div>
          </div>
          <div class="cert-action"><span class="badge-soon">준비중</span></div>
        </div>

        <!-- CPMAI -->
        <div class="cert-item disabled">
          <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
            </svg>
          </div>
          <div class="cert-info">
            <div class="cert-tag">자격증</div>
            <div class="cert-name">CPMAI</div>
          </div>
          <div class="cert-action"><span class="badge-soon">준비중</span></div>
        </div>

      </div>
    </div>
  </div>

  <!-- 카카오 로그인 모달 -->
  <div id="loginOverlay" onclick="overlayClose(event)">
    <div class="login-box">
      <div class="login-icon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#2e75b6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <h2>로그인이 필요해요</h2>
      <p>학습 콘텐츠 이용을 위해<br>카카오 계정으로 로그인해 주세요.</p>

      <!-- 카카오 로그인 버튼 -->
      <button class="btn-kakao" onclick="doKakaoLogin()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#000000d9">
          <path d="M12 3C6.477 3 2 6.477 2 10.909c0 2.803 1.67 5.27 4.207 6.745l-1.07 3.91c-.094.344.302.617.607.408L10.1 19.5A11.1 11.1 0 0 0 12 19.636c5.523 0 10-3.477 10-7.727S17.523 3 12 3z"/>
        </svg>
        카카오로 계속하기
      </button>

      <div class="login-divider">또는</div>

      <!-- 테스트 모드 (로컬/도메인 미등록 시) -->
      <button class="btn-test" onclick="doTestLogin()">
        🖥️ 테스트 모드로 입장 (도메인 미등록 시)
      </button>

      <button class="login-close" onclick="closeLoginModal()">닫기</button>

      <p class="login-note">
        * 카카오 로그인은 도메인 등록 후 정상 작동합니다.<br>
        * 개발 중에는 테스트 모드를 이용하세요.
      </p>
    </div>
  </div>

<script>
/* ============================================================
   ✅ 카카오 앱 키 설정
   developers.kakao.com → 내 앱 → 앱 설정 → 앱 키 → JavaScript 키
   ============================================================ */
const KAKAO_JS_KEY = 'YOUR_KAKAO_JS_KEY'; // ← 여기에 JavaScript 키 입력

/* ============================================================
   인증 상태 관리 (sessionStorage)
   ============================================================ */
const AUTH_KEY = 'quiz_auth';
let pendingUrl = null;

function getAuth() {
  try { return JSON.parse(sessionStorage.getItem(AUTH_KEY)); } catch(e) { return null; }
}
function setAuth(data) {
  sessionStorage.setItem(AUTH_KEY, JSON.stringify(data));
}
function clearAuth() {
  sessionStorage.removeItem(AUTH_KEY);
}

/* ============================================================
   카카오 SDK 초기화
   ============================================================ */
try {
  if (KAKAO_JS_KEY !== 'YOUR_KAKAO_JS_KEY') {
    Kakao.init(KAKAO_JS_KEY);
  }
} catch(e) {
  console.warn('Kakao SDK 초기화 실패:', e);
}

/* ============================================================
   UI 갱신
   ============================================================ */
function updateHeaderUI() {
  const auth = getAuth();
  const bar = document.getElementById('userBar');
  if (auth) {
    bar.classList.add('visible');
    document.getElementById('userName').textContent = auth.nickname + ' 님';
    if (auth.profileImage) {
      document.getElementById('userAvatar').src = auth.profileImage;
    }
  } else {
    bar.classList.remove('visible');
  }
}

/* ============================================================
   학습하기 클릭 처리
   ============================================================ */
function handleStudyClick(url) {
  if (getAuth()) {
    window.location.href = url;
  } else {
    pendingUrl = url;
    showLoginModal();
  }
}

/* ============================================================
   로그인 모달
   ============================================================ */
function showLoginModal() {
  document.getElementById('loginOverlay').classList.add('visible');
}
function closeLoginModal() {
  document.getElementById('loginOverlay').classList.remove('visible');
}
function overlayClose(e) {
  if (e.target === document.getElementById('loginOverlay')) closeLoginModal();
}

/* ============================================================
   카카오 로그인
   ============================================================ */
function doKakaoLogin() {
  if (KAKAO_JS_KEY === 'YOUR_KAKAO_JS_KEY' || !Kakao.isInitialized()) {
    alert('앱 키가 설정되지 않았습니다.\nindex.html의 KAKAO_JS_KEY를 입력하거나 테스트 모드를 이용하세요.');
    return;
  }
  Kakao.Auth.login({
    success: function(authObj) {
      Kakao.API.request({
        url: '/v2/user/me',
        success: function(res) {
          const profile = res.kakao_account?.profile || {};
          setAuth({
            nickname: profile.nickname || '카카오 사용자',
            profileImage: profile.profile_image_url || '',
            timestamp: Date.now()
          });
          closeLoginModal();
          updateHeaderUI();
          if (pendingUrl) window.location.href = pendingUrl;
        },
        fail: function(err) {
          console.error('사용자 정보 요청 실패', err);
          alert('사용자 정보를 가져오는 데 실패했습니다.');
        }
      });
    },
    fail: function(err) {
      console.error('로그인 실패', err);
      alert('카카오 로그인에 실패했습니다.\n도메인이 등록되지 않았을 수 있습니다.\n테스트 모드를 이용해 주세요.');
    }
  });
}

/* ============================================================
   테스트 모드 (로컬 / 도메인 미등록 시)
   ============================================================ */
function doTestLogin() {
  setAuth({
    nickname: '테스트 사용자',
    profileImage: '',
    timestamp: Date.now(),
    testMode: true
  });
  closeLoginModal();
  updateHeaderUI();
  if (pendingUrl) window.location.href = pendingUrl;
}

/* ============================================================
   로그아웃
   ============================================================ */
function doLogout() {
  clearAuth();
  updateHeaderUI();
  // 카카오 로그아웃 (SDK 초기화된 경우)
  try {
    if (Kakao.isInitialized() && Kakao.Auth.getAccessToken()) {
      Kakao.Auth.logout();
    }
  } catch(e) {}
}

/* ── 초기화 ── */
updateHeaderUI();
</script>
</body>
</html>
