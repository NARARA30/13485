<head>

<title>ISO 13485 산출물별 5W1H</title>
<style>
:root{--blue:#1f5a99;--blue2:#2f6fb3;--bg:#f5f7fa;--card:#fff;--line:#e6eaf0;--muted:#64748b;
--why:#fdefe3;--what:#fff6e0;--who:#e6f4ee;--when:#e8f1fb;--where:#eef2f9;--how:#fbeae3;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif;background:var(--bg);color:#1e293b;line-height:1.6;}
header{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;padding:16px 20px;}
header h1{font-size:19px;margin:0;font-weight:800;}
header .sub{font-size:12.5px;opacity:.9;margin-top:3px;}
.bar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.bar input{flex:1;min-width:180px;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;}
.chipbtn{background:#eef2f9;color:#334155;border:1px solid var(--line);border-radius:20px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;}
.chipbtn.active{background:var(--blue2);color:#fff;border-color:var(--blue2);}
.legend{font-size:12px;color:var(--muted);margin-left:auto;}
.legend b{color:#334155;}
.wrap{max-width:1000px;margin:16px auto;padding:0 14px;}
.count{font-size:13px;color:var(--muted);margin:6px 2px 14px;}
.chapter{font-size:17px;font-weight:800;color:#fff;background:#1f5a99;border-radius:10px;padding:10px 16px;margin:22px 0 12px;}
.clause{font-size:14.5px;font-weight:700;color:var(--blue);margin:18px 0 8px;padding-left:4px;border-left:4px solid var(--blue2);padding:4px 0 4px 10px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.card h3{margin:0 0 10px;font-size:15.5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.mk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;font-size:13px;font-weight:800;flex-shrink:0;}
.mk.star{background:#fce6c8;color:#a85a0c;}
.mk.dot{background:#e6f4ee;color:#338468;}
.mk.circle{background:#e8f1fb;color:#2f6fb3;}
.cchip{font-size:11.5px;font-weight:700;color:var(--blue);background:#e8f1fb;border-radius:14px;padding:2px 9px;}
table{width:100%;border-collapse:collapse;}
td{border:1px solid var(--line);padding:8px 11px;font-size:13.5px;vertical-align:top;}
td.k{width:92px;font-weight:700;text-align:center;white-space:nowrap;}
td.k .en{display:block;font-size:10.5px;color:var(--muted);font-weight:500;}
tr.why td.k{background:var(--why);} tr.what td.k{background:var(--what);} tr.who td.k{background:var(--who);}
tr.when td.k{background:var(--when);} tr.where td.k{background:var(--where);} tr.how td.k{background:var(--how);}
.hide{display:none!important;}
.empty{text-align:center;color:var(--muted);padding:40px;}
@media(max-width:600px){td.k{width:72px;font-size:12px;}td{font-size:12.5px;}}
@media print{.bar{display:none;}header{background:#1f5a99;}}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"><style>body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif}</style>

const ckey=c=>String(c).split('/')[0].split('.').map(n=>parseInt(n,10)||0);
DATA.sort((a,b)=>{const x=ckey(a.clause),y=ckey(b.clause);for(let i=0;i<Math.max(x.length,y.length);i++){const p=x[i]||0,q=y[i]||0;if(p!==q)return p-q;}return 0;});
let chap='all';
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setChap(btn){ chap=btn.getAttribute('data-ch'); document.querySelectorAll('.chipbtn').forEach(b=>b.classList.toggle('active',b===btn)); render(); }
function mkClass(m){ return m==='★'?'star':(m==='●'?'dot':'circle'); }
function row(cls,k,en,v){ return '<tr class="'+cls+'"><td class="k">'+k+'<span class="en">'+en+'</span></td><td>'+esc(v)+'</td></tr>'; }
function card(d){
  return '<div class="card"><h3><span class="mk '+mkClass(d.marker)+'">'+(d.marker||'·')+'</span>'+esc(d.deliverable)+' <span class="cchip">조항 '+esc(d.clause)+'</span></h3>'+
    '<table>'+
    row('why','왜','Why',d.why)+
    row('what','무엇을','What','['+d.clause+' '+d.clauseTitle+'] 산출물: '+d.what)+
    row('who','누가','Who',d.who)+
    row('when','언제','When',d.when)+
    row('where','어디서','Where',d.where)+
    row('how','어떻게','How',d.how)+
    '</table></div>';
}
function render(){
  const kw=document.getElementById('q').value.trim().toLowerCase();
  let list=DATA.filter(d=>{
    if(chap!=='all' && d.chapter!==chap) return false;
    if(kw){ const hay=(d.deliverable+' '+d.clause+' '+d.clauseTitle+' '+d.how+' '+d.why).toLowerCase(); if(!hay.includes(kw)) return false; }
    return true;
  });
  document.getElementById('count').textContent='표시 중인 산출물: '+list.length+'개 / 전체 '+DATA.length+'개';
  const cont=document.getElementById('content'); cont.innerHTML='';
  if(!list.length){ cont.innerHTML='<div class="empty">검색 결과가 없습니다.</div>'; return; }
  let html='', curCh='', curCl='';
  list.forEach(d=>{
    if(d.chapterName!==curCh){ curCh=d.chapterName; curCl=''; html+='<div class="chapter">'+esc(curCh)+'</div>'; }
    const clk=d.clause+' '+d.clauseTitle;
    if(clk!==curCl){ curCl=clk; html+='<div class="clause">'+esc(clk)+'</div>'; }
    html+=card(d);
  });
  cont.innerHTML=html;
}
render();
</script>
