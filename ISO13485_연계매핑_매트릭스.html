<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 13485 연계 매핑 매트릭스</title>
<style>
:root{--blue:#1f5a99;--blue2:#2f6fb3;--bg:#f5f7fa;--card:#fff;--line:#e6eaf0;--muted:#64748b;
--c9:#e8f1fb;--c14:#e6f4ee;--c81:#eef2f9;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif;background:var(--bg);color:#1e293b;line-height:1.6;}
header{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;padding:16px 20px;}
header h1{font-size:19px;margin:0;font-weight:800;}
header .sub{font-size:12.5px;opacity:.9;margin-top:3px;}
.bar{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);padding:10px 16px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.bar input{flex:1;min-width:160px;font-size:14px;padding:9px 12px;border:1px solid var(--line);border-radius:9px;font-family:inherit;}
.chipbtn{background:#eef2f9;color:#334155;border:1px solid var(--line);border-radius:20px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;}
.chipbtn.active{background:var(--blue2);color:#fff;border-color:var(--blue2);}
.viewtog{margin-left:auto;display:flex;gap:6px;}
.wrap{max-width:1180px;margin:14px auto;padding:0 12px;}
.count{font-size:13px;color:var(--muted);margin:6px 2px 12px;}
.legend{font-size:11.5px;color:var(--muted);margin:2px 2px 14px;}
.badge{display:inline-block;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:800;color:#fff;}
.b-cite{background:#c53a1b;}.b-strong{background:#338468;}.b-concept{background:#9a7a0a;}.b-none{background:#94a3b8;}
.chapter{font-size:16px;font-weight:800;color:#fff;background:#1f5a99;border-radius:10px;padding:9px 15px;margin:20px 0 10px;}
/* card view */
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:11px;box-shadow:0 1px 2px rgba(0,0,0,.03);}
.card .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px;}
.cl{font-size:14px;font-weight:800;color:#fff;background:var(--blue2);border-radius:7px;padding:2px 9px;}
.cl.sub{background:#8fb4dc;}
.ti{font-size:14.5px;font-weight:700;color:#1f5a99;}
.prod{font-size:13px;background:#fff8ec;border:1px solid #f5e4c8;border-radius:8px;padding:8px 11px;white-space:pre-wrap;margin-bottom:9px;}
.maps{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.map{border-radius:8px;padding:8px 10px;font-size:12.5px;}
.map.m9{background:var(--c9);}.map.m14{background:var(--c14);}.map.m81{background:var(--c81);}
.map .h{font-weight:800;font-size:11.5px;color:#334155;display:block;margin-bottom:3px;}
.map .cc{font-weight:700;}
.note{font-size:12px;color:#9a7a0a;background:#fff6e0;border-radius:7px;padding:6px 10px;margin-top:9px;}
/* table view */
table{width:100%;border-collapse:collapse;background:#fff;font-size:12px;}
th,td{border:1px solid var(--line);padding:6px 8px;vertical-align:top;text-align:left;}
th{background:#2f6fb3;color:#fff;position:sticky;top:52px;font-size:11.5px;}
tr.secrow td{background:#1f5a99;color:#fff;font-weight:800;}
td.prodcell{white-space:pre-wrap;}
.tablewrap{overflow-x:auto;}
.empty{text-align:center;color:var(--muted);padding:40px;}
@media(max-width:760px){.maps{grid-template-columns:1fr;}}
@media print{.bar{display:none;}}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"><style>body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif}</style>
</head>
<body>
<header>
  <div style="text-align:right;margin-bottom:12px;"><button onclick="location.href='ISO13485_퀴즈_v2.html'" style="display:inline-flex;align-items:center;gap:6px;padding:12px 22px;border:1px solid #E6EAF0;border-radius:12px;background:#fff;color:#2F6FB3;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;">← ISO 13485 목록이동</button></div>
  <h1>ISO 13485:2016 연계 규격 매핑 매트릭스</h1>
  <div class="sub">조항·하위조항별 필수 산출물 + ISO 9001:2015 · ISO 14971:2019 · IEC 81001-5-1:2021 연계</div>
</header>
<div class="bar">
  <input id="q" type="text" placeholder="🔍 조항·산출물·연계내용 검색 (예: 7.3, 위험관리, SBOM, 밸리데이션)" oninput="render()">
  <button class="chipbtn active" data-ch="all" onclick="setChap(this)">전체</button>
  <button class="chipbtn" data-ch="4" onclick="setChap(this)">4장</button>
  <button class="chipbtn" data-ch="5" onclick="setChap(this)">5장</button>
  <button class="chipbtn" data-ch="6" onclick="setChap(this)">6장</button>
  <button class="chipbtn" data-ch="7" onclick="setChap(this)">7장</button>
  <button class="chipbtn" data-ch="8" onclick="setChap(this)">8장</button>
  <div class="viewtog"><button class="chipbtn active" id="vCard" onclick="setView('card')">카드</button><button class="chipbtn" id="vTable" onclick="setView('table')">표</button></div>
</div>
<div class="wrap">
  <div class="legend">필수 산출물: <b>★</b> 문서화된 절차 · <b>●</b> 기록 · <b>○</b> 권고  |  연계 강도: <span class="badge b-cite">직접인용</span> <span class="badge b-strong">강한연계</span> <span class="badge b-concept">개념적연계</span> <span class="badge b-none">해당없음</span></div>
  <div class="count" id="count"></div>
  <div id="content"></div>
</div>
<script>
const DATA = [{"type":"section","label":"4. 품질경영시스템 (Quality Management System)"},{"type":"row","section":"4. 품질경영시스템 (Quality Management System)","clause":"4.1","title":"일반 요구사항 / General requirements","product":"○ 품질매뉴얼\n○ 프로세스 맵(순서·상호작용)\n● QMS 프로세스 운영 기준·기록","c9":"§4.4","t9":"QMS 수립·문서화·이행·유지·개선의 기본 요건. 9001은 '리스크 기반 사고', 13485는 위험관리(ISO 14971) 명시.","c14":"§4 (위험관리 프로세스 전반)","t14":"13485 §4.1은 위험기반 접근법 적용을 명시 — 14971 §4와 직접 연계.","c81":"§5.1 (보안 활동 계획)","t81":"소프트웨어 포함 QMS 범위 제품에 보안 활동 계획 수립 요구.","strength":"강한연계","note":"하위 4.1.1~4.1.6 참조"},{"type":"row","section":"4. 품질경영시스템 (Quality Management System)","clause":"4.1.1","title":"QMS 수립·역할 식별 / Establish QMS & roles","product":"○ 품질매뉴얼\n● 조직 역할(제조자·대리인·수입자·판매자) 문서\n○ QMS 프로세스 목록","c9":"§4.4.1","t9":"QMS에 필요한 프로세스와 적용을 결정. 조직 역할 개념은 13485 고유.","c14":"§4 (위험관리 적용)","t14":"역할·프로세스 결정 시 위험기반 접근 적용.","c81":"§5.1","t81":"QMS 범위 내 소프트웨어 제품의 보안 활동 식별.","strength":"강한연계","note":"조직 역할 문서화는 13485 고유 요구"},{"type":"row","section":"4. 품질경영시스템 (Quality Management System)","clause":"4.1.2","title":"프로세스 결정·위험기반 접근 / Process & risk-based approach","product":"○ 프로세스 맵\n● 위험기반 접근 적용 근거\n● 프로세스 순서·상호작용 정의","c9":"§4.4.1","t9":"프로세스 순서·상호작용 결정 요건 유사.","c14":"§4 (위험관리 프로세스)","t14":"프로세스 관리에 위험기반 접근 적용 — 14971 연계.","c81":"§5.1","t81":"보안 프로세스의 순서·상호작용 정의.","strength":"강한연계","note":"'위험기반 접근법' 13485 명시 문구"},{"type":"row","section":"4. 품질경영시스템 (Quality Management System)","clause":"4.1.3","title":"프로세스 운영·관리 / Process operation & control","product":"● 프로세스 기준·방법 정의\n● 자원·정보 가용성 근거\n● 모니터링·측정·분석 기록","c9":"§4.4.1","t9":"운영·관리 기준·방법, 모니터링·측정 요건 유사.","c14":"해당 없음","t14":"—","c81":"해당 없음","t81":"—","strength":"개념적연계","note":"계획된 결과·효과성 유지 조치 실행"},{"type":"row","section":"4. 품질경영시스템 (Quality Management System)","clause":"4.1.4","title":"프로세스 변경 관리 / Control of process changes","product":"● 프로세스 변경 관리·평가 기록\n (QMS·제품 위험 영향 평가)","c9":"§6.3 (변경 기획)","t9":"변경의 계획적 실행 요건 유사.","c14":"§10 (변경의 위험 영향)","t14":"프로세스 변경의 위험 영향 평가 — 14971 연계.","c81":"§6. "t9":"재작업 관리 요건 유사.","c14":"해당 없음","t14":"—","c81":"해당 없음","t81":"—","strength":"개념적연계","note":"재작업 부정적 영향 고려"},{"type":"row","section":"8. 측정·분석·개선 (Measurement, Analysis and Improvement)","clause":"8.4","title":"데이터 분석 / Analysis of data","product":"★ 데이터 분석 절차서\n● 분석 보고서·추이 기록\n (피드백·공정·제품·공급자 데이터)","c9":"§9.1.3","t9":"데이터 분석 요건 유사.","c14":"§10.3 (위험관리 경향 분석)","t14":"잠재 위험 신호 통계 경향 분석 — 데이터 분석 연계.","c81":"§7.4.6 (취약점 경향 분석)","t81":"취약점 발생 빈도·심각도 경향 분석 포함.","strength":"강한연계","note":""},{"type":"row","section":"8. 측정·분석·개선 (Measurement, Analysis and Improvement)","clause":"8.5","title":"개선 / Improvement","product":"★ 시정·예방조치 절차서 / ● 개선·CAPA 기록","c9":"§10","t9":"지속적 개선·시정조치 요건 유사(9001은 예방조치 조항 삭제).","c14":"§10.4 (CAPA·위험관리 환류)","t14":"CAPA 후 위험관리 파일 갱신.","c81":"§6.1·§7.4.9","t81":"Security by Design·취약점 패치 CAPA.","strength":"강한연계","note":"하위 8.5.1~8.5.3 참조"},{"type":"row","section":"8. 측정·분석·개선 (Measurement, Analysis and Improvement)","clause":"8.5.1","title":"개선 – 일반 / Improvement – General","product":"● 개선 활동 근거\n (방침·목표·심사·PMS·CAPA·경영검토 통한 변경)","c9":"§10.1, §10.3","t9":"지속적 개선 요건 유사.","c14":"해당 없음","t14":"—","c81":"해당 없음","t81":"—","strength":"개념적연계","note":""},{"type":"row","section":"8. 측정·분석·개선 (Measurement, Analysis and Improvement)","clause":"8.5.2","title":"시정조치 / Corrective action","product":"★ 시정조치 절차서\n● CAPA 기록\n - 부적합·원인분석\n - 조치·효과성 검증","c9":"§10.2","t9":"원인분석·조치·효과성 검증 요건 동일.","c14":"§10.4 (CAPA·위험관리 환류)","t14":"CAPA 실행 후 위험관리 파일 갱신 필수.","c81":"§7.4.9 (보안 패치 CAPA)","t81":"취약점 패치를 시정조치로 처리·효과성 검증.","strength":"강한연계","note":""},{"type":"row","section":"8. 측정·분석·개선 (Measurement, Analysis and Improvement)","clause":"8.5.3","title":"예방조치 / Preventive action","product":"★ 예방조치 절차서\n● 예방조치 기록\n - 잠재 부적합 평가·조치\n - 효과성 검증","c9":"§6.1 (注: 9001은 PA 별도 조항 삭제)","t9":"9001:2015는 예방조치 단독 조항 삭제(리스크 기반 사고로 통합).","c14":"§5 (위험분석 예방 관점)","t14":"위험분석(FMEA·FTA)은 예방조치의 핵심 도구.","c81":"§6.1 (보안 위협 예방 설계)","t81":"Security by Design으로 취약점 사전 제거.","strength":"강한연계","note":"9001과의 구조적 차이 주목"}];
let chap='all', view='card';
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function chapter(c){ const m=String(c||'').match(/(\d+)/); const n=m?m[1]:'0'; return ['4','5','6','7','8'].includes(n)?n:'0'; }
function setChap(b){ chap=b.getAttribute('data-ch'); document.querySelectorAll('.bar .chipbtn[data-ch]').forEach(x=>x.classList.toggle('active',x===b)); render(); }
function setView(v){ view=v; document.getElementById('vCard').classList.toggle('active',v==='card'); document.getElementById('vTable').classList.toggle('active',v==='table'); render(); }
function bcls(s){ return s==='직접인용'?'b-cite':(s==='강한연계'?'b-strong':(s==='개념적연계'?'b-concept':'b-none')); }
function rowsData(){ return DATA.filter(d=>d.type==='row'); }
function pass(d){
  if(chap!=='all' && chapter(d.clause)!==chap) return false;
  const kw=document.getElementById('q').value.trim().toLowerCase();
  if(kw){ const hay=(d.clause+' '+d.title+' '+d.product+' '+d.t9+' '+d.t14+' '+d.t81+' '+d.note+' '+d.strength).toLowerCase(); if(!hay.includes(kw)) return false; }
  return true;
}
function mapBox(cls,label,code,txt){
  if((!code||code==='해당 없음')&&(!txt||txt==='—')) return '<div class="map '+cls+'"><span class="h">'+label+'</span><span class="cc">해당 없음</span></div>';
  return '<div class="map '+cls+'"><span class="h">'+label+'</span><span class="cc">'+esc(code)+'</span><br>'+esc(txt)+'</div>';
}
function card(d){
  const sub=(d.clause.match(/\./g)||[]).length>=2;
  return '<div class="card"><div class="top"><span class="cl'+(sub?' sub':'')+'">'+esc(d.clause)+'</span><span class="ti">'+esc(d.title)+'</span><span class="badge '+bcls(d.strength)+'">'+esc(d.strength)+'</span></div>'+
    '<div class="prod">'+esc(d.product)+'</div>'+
    '<div class="maps">'+
      mapBox('m9','ISO 9001:2015',d.c9,d.t9)+
      mapBox('m14','ISO 14971:2019',d.c14,d.t14)+
      mapBox('m81','IEC 81001-5-1:2021',d.c81,d.t81)+
    '</div>'+
    (d.note?('<div class="note"><b>비고</b> '+esc(d.note)+'</div>'):'')+
    '</div>';
}
function render(){
  const cont=document.getElementById('content');
  const list=rowsData().filter(pass);
  document.getElementById('count').textContent='표시 중인 조항: '+list.length+'개 / 전체 '+rowsData().length+'개';
  if(!list.length){ cont.innerHTML='<div class="empty">검색 결과가 없습니다.</div>'; return; }
  if(view==='table'){ renderTable(list); return; }
  let html='', curCh='';
  list.forEach(d=>{ const ch=chapter(d.clause); if(ch!==curCh){ curCh=ch; const sec=DATA.find(x=>x.type==='section'&&x.label.startsWith(ch+'.')); html+='<div class="chapter">'+esc(sec?sec.label:(ch+'장'))+'</div>'; } html+=card(d); });
  cont.innerHTML=html;
}
function renderTable(list){
  let h='<div class="tablewrap"><table><thead><tr>'+
    '<th>조항</th><th>타이틀</th><th>필수 산출물</th><th>9001 조항</th><th>9001 연계</th><th>14971 조항</th><th>14971 연계</th><th>81001 조항</th><th>81001 연계</th><th>강도</th><th>비고</th>'+
    '</tr></thead><tbody>';
  let curCh='';
  list.forEach(d=>{ const ch=chapter(d.clause); if(ch!==curCh){curCh=ch; const sec=DATA.find(x=>x.type==='section'&&x.label.startsWith(ch+'.')); h+='<tr class="secrow"><td colspan="11">'+esc(sec?sec.label:ch+'장')+'</td></tr>';}
    h+='<tr><td><b>'+esc(d.clause)+'</b></td><td>'+esc(d.title)+'</td><td class="prodcell">'+esc(d.product)+'</td>'+
      '<td>'+esc(d.c9)+'</td><td>'+esc(d.t9)+'</td><td>'+esc(d.c14)+'</td><td>'+esc(d.t14)+'</td><td>'+esc(d.c81)+'</td><td>'+esc(d.t81)+'</td>'+
      '<td><span class="badge '+bcls(d.strength)+'">'+esc(d.strength)+'</span></td><td>'+esc(d.note)+'</td></tr>';
  });
  h+='</tbody></table></div>';
  document.getElementById('content').innerHTML=h;
}
render();
</script>
