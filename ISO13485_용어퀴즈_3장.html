<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISO 13485 3장 용어 퀴즈</title>
<style>
:root{--blue:#1f5a99;--blue2:#2f6fb3;--bg:#f5f7fa;--card:#fff;--line:#e6eaf0;--ok:#3e9d7c;--ng:#e4572e;--muted:#64748b;}
*{box-sizing:border-box;}
body{margin:0;font-family:'Malgun Gothic','맑은 고딕',system-ui,sans-serif;background:var(--bg);color:#1e293b;line-height:1.6;}
header{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;padding:15px 18px;}
header h1{font-size:18px;margin:0;font-weight:800;}
header .sub{font-size:12px;opacity:.9;margin-top:3px;}
.wrap{max-width:820px;margin:18px auto;padding:0 14px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.hidden{display:none!important;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
label{font-size:13px;font-weight:600;color:#334155;}
select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;}
.btn{background:var(--blue2);color:#fff;border:none;padding:10px 18px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:700;}
.btn.sec{background:#eef2f9;color:var(--blue);border:1px solid var(--line);}
.btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.chip{display:inline-block;background:#e8f1fb;color:var(--blue);border-radius:20px;padding:3px 11px;font-size:12px;font-weight:700;margin-right:6px;}
.chip.cat{background:#f1f4f8;color:#c8690f;}
.progress{height:8px;background:#e8f1fb;border-radius:6px;overflow:hidden;margin:10px 0 4px;}
.progress>div{height:100%;background:linear-gradient(90deg,var(--blue),var(--blue2));width:0;transition:width .25s;}
.qtext{font-size:16.5px;font-weight:600;margin:14px 0;white-space:pre-wrap;}
.opt{display:block;width:100%;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:12px 14px;margin:8px 0;cursor:pointer;font-size:15px;transition:.12s;}
.opt:hover{border-color:var(--blue2);background:#f5f7fa;}
.opt.sel{border-color:var(--blue2);background:#e8f1fb;}
.opt.correct{border-color:var(--ok);background:#e6f4ee;}
.opt.wrong{border-color:var(--ng);background:#fbeae3;}
.opt .mk{font-weight:800;margin-right:8px;}
.ansbox{margin-top:14px;border-left:5px solid var(--blue2);background:#f5f7fa;border-radius:8px;padding:14px 16px;white-space:pre-wrap;font-size:14.5px;}
.ansbox .lbl{font-weight:800;color:var(--blue);}
.answin{width:100%;font-family:inherit;font-size:15px;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;margin:6px 0 2px;}
.answin:focus{border-color:var(--blue2);outline:none;}
.answin.ta{min-height:96px;resize:vertical;line-height:1.5;}
.inlabel{font-size:12.5px;color:var(--muted);margin-top:4px;}
.ansacts{margin-top:13px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.abtn{background:#eef2f9;color:var(--blue);border:1px solid var(--line);border-radius:8px;padding:8px 13px;font-size:13px;font-weight:700;cursor:pointer;}
.abtn.gem{background:linear-gradient(135deg,#2f6fb3,#f47b20);color:#fff;border:none;}
.ansacts .hint{font-size:11.5px;color:var(--muted);}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#1e293b;color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:60;max-width:90%;text-align:center;}
.toast.show{opacity:.96;}
.nav{display:flex;justify-content:space-between;margin-top:18px;gap:10px;}
.meta{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);}
.score{font-weight:700;color:var(--blue);}
.summary{text-align:center;padding:30px 10px;}
.summary .big{font-size:40px;font-weight:800;color:var(--blue);}
@media(max-width:560px){.qtext{font-size:15.5px;}header h1{font-size:16px;}}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"><style>body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif}</style>
</head>
<body>
<header>
  <h1>ISO 13485:2016 3장 용어 퀴즈</h1>
  <div class="sub">3장 의료기기 고유 용어 20개 · 객관식·단답형·서술형 (총 60문항)</div>
</header>
<div class="wrap">
  <div id="setup" class="card">
    <h2 style="margin:0 0 12px;font-size:18px;">퀴즈 설정</h2>
    <div class="row" style="margin-bottom:14px;">
      <label>유형</label>
      <select id="fType"><option value="all">전체(객관식+단답형+서술형)</option><option value="mc">객관식만</option><option value="short">단답형만</option><option value="essay">서술형만</option></select>
      <label>순서</label>
      <select id="fOrder"><option value="seq">조항 순서</option><option value="rand">무작위</option></select>
      <span class="meta" id="fCount"></span>
    </div>
    <button class="btn" onclick="startQuiz()">퀴즈 시작 ▶</button>
  </div>

  <div id="quiz" class="card hidden">
    <div class="meta"><span><span class="chip cat" id="qCat"></span><span class="chip" id="qClause"></span></span><span id="qPos"></span></div>
    <div class="progress"><div id="qBar"></div></div>
    <div class="meta"><span class="score" id="qScore"></span></div>
    <div class="qtext" id="qText"></div>
    <div id="qOpts"></div>
    <div id="qAns" class="ansbox hidden"></div>
    <div class="nav">
      <button class="btn ghost" onclick="prevQ()" id="btnPrev">◀ 이전</button>
      <button class="btn sec" onclick="reveal()" id="btnReveal">모범답안 보기</button>
      <button class="btn" onclick="nextQ()" id="btnNext">다음 ▶</button>
    </div>
    <hr>
    <button class="btn ghost" onclick="endQuiz()">■ 종료하고 설정으로</button>
  </div>

  <div id="result" class="card hidden">
    <div class="summary"><div class="big" id="rScore"></div><p id="rText" class="meta" style="justify-content:center;"></p><button class="btn" onclick="endQuiz()">설정으로</button></div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
const SEED = [{"id":"t1","cat":"객관식","type":"mc","clause":"3.1","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.\"","options":["권고문(권고통지)","위험관리","멸균 의료기기","멸균방벽시스템"],"answerIndex":0,"answer":"권고문(권고통지)","explanation":"[3.1] 권고문(권고통지) (advisory notice) [SOURCE: GHTF/SG1/N055:2009, 5.2]"},{"id":"t2","cat":"단답형","type":"short","clause":"3.1","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.\"","options":[],"answerIndex":null,"answer":"권고문(권고통지) (advisory notice)","explanation":"[3.1] 핵심: 적용 규제 요구사항 준수를 위해 발행이 요구될 수 있다."},{"id":"t3","cat":"서술형","type":"essay","clause":"3.1","question":"'권고문(권고통지) (advisory notice)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"의료기기 인도 후, 그 기기의 사용·변경·반품·폐기에 관해 추가 정보를 제공하거나 취해야 할 조치를 권고하기 위해 조직이 발행하는 통지.\n[핵심] 적용 규제 요구사항 준수를 위해 발행이 요구될 수 있다.\n[SOURCE: GHTF/SG1/N055:2009, 5.2]","explanation":"[3.1]"},{"id":"t4","cat":"객관식","type":"mc","clause":"3.2","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인.\"","options":["위험관리","멸균 의료기기","멸균방벽시스템","위임대리인(지정 대리인)"],"answerIndex":3,"answer":"위임대리인(지정 대리인)","explanation":"[3.2] 위임대리인(지정 대리인) (authorized representative) [SOURCE: GHTF/SG1/N055:2009, 5.2]"},{"id":"t5","cat":"단답형","type":"short","clause":"3.2","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인.\"","options":[],"answerIndex":null,"answer":"위임대리인(지정 대리인) (authorized representative)","explanation":"[3.2]"},{"id":"t6","cat":"서술형","type":"essay","clause":"3.2","question":"'위임대리인(지정 대리인) (authorized representative)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"특정 국가·관할권의 법률에 따른 제조자의 의무와 관련하여, 제조자를 대신해 명시된 업무를 수행하도록 제조자로부터 서면 위임(mandate)을 받아 그 국가·관할권 내에 설립된 자연인 또는 법인.\n[SOURCE: GHTF/SG1/N055:2009, 5.2]","explanation":"[3.2]"},{"id":"t7","cat":"객관식","type":"mc","clause":"3.3","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"제조자가 의도한 대로 사용될 때 의료기기의 임상적 안전과 성능을 검증하기 위해, 그 기기와 관련된 임상 데이터를 사정(assess)·분석하는 것.\"","options":["위험관리","멸균 의료기기","임상평가","멸균방벽시스템"],"answerIndex":2,"answer":"임상평가","explanation":"[3.3] 임상평가 (clinical evaluation) [SOURCE: GHTF/SG5/N4:2010, Clause 4]"},{"id":"t8","cat":"단답형","type":"short","clause":"3.3","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"제조자가 의도한 대로 사용될 때 의료기기의 임상적 안전과 성능을 검증하기 위해, 그 기기와 관련된 임상 데이터를 사정(assess)·분석하는 것.\"","options":[],"answerIndex":null,"answer":"임상평가 (clinical evaluation)","explanation":"[3.3]"},{"id":"t9","cat":"서술형","type":"essay","clause":"3.3","question":"'임상평가 (clinical evaluation)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"제조자가 의도한 대로 사용될 때 의료기기의 임상적 안전과 성능을 검증하기 위해, 그 기기와 관련된 임상 데이터를 사정(assess)·분석하는 것.\n[SOURCE: GHTF/SG5/N4:2010, Clause 4]","explanation":"[3.3]"},{"id":"t10","cat":"객관식","type":"mc","clause":"3.4","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"조직의 관리 하에 출하된 의료기기의 식별·품질·내구성·신뢰성·사용적합성·안전·성능 관련 결함, 또는 그러한 기기의 성능에 영향을 미치는 서비스 관련 결함을 주장하는 서면·전자·구두 의사소통.\"","options":["위험관리","불만","멸균 의료기기","멸균방벽시스템"],"answerIndex":1,"answer":"불만","explanation":"[3.4] 불만 (complaint)"},{"id":"t11","cat":"단답형","type":"short","clause":"3.4","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"조직의 관리 하에 출하된 의료기기의 식별·품질·내구성·신뢰성·사용적합성·안전·성능 관련 결함, 또는 그러한 기기의 성능에 영향을 미치는 서비스 관련 결함을 주장하는 서면·전자·구두 의사소통.\"","options":[],"answerIndex":null,"answer":"불만 (complaint)","explanation":"[3.4] 핵심: 이 정의는 ISO 9000:2015의 불만 정의와 다르다."},{"id":"t12","cat":"서술형","type":"essay","clause":"3.4","question":"'불만 (complaint)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"조직의 관리 하에 출하된 의료기기의 식별·품질·내구성·신뢰성·사용적합성·안전·성능 관련 결함, 또는 그러한 기기의 성능에 영향을 미치는 서비스 관련 결함을 주장하는 서면·전자·구두 의사소통.\n[핵심] 이 정의는 ISO 9000:2015의 불만 정의와 다르다.","explanation":"[3.4]"},{"id":"t13","cat":"객관식","type":"mc","clause":"3.5","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"공급사슬에서 자신의 명의로 최종 사용자에게 의료기기의 가용성을 촉진하는 자연인 또는 법인.\"","options":["유통업자(판매업자)","위험관리","멸균 의료기기","멸균방벽시스템"],"answerIndex":0,"answer":"유통업자(판매업자)","explanation":"[3.5] 유통업자(판매업자) (distributor) [SOURCE: GHTF/SG1/N055:2009, 5.3]"},{"id":"t14","cat":"단답형","type":"short","clause":"3.5","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"공급사슬에서 자신의 명의로 최종 사용자에게 의료기기의 가용성을 촉진하는 자연인 또는 법인.\"","options":[],"answerIndex":null,"answer":"유통업자(판매업자) (distributor)","explanation":"[3.5] 핵심: 공급사슬에 둘 이상 존재 가능. 제조자·수입자·유통업자를 대신해 보관·운송만 수행하는 자는 유통업자가 아니다."},{"id":"t15","cat":"서술형","type":"essay","clause":"3.5","question":"'유통업자(판매업자) (distributor)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"공급사슬에서 자신의 명의로 최종 사용자에게 의료기기의 가용성을 촉진하는 자연인 또는 법인.\n[핵심] 공급사슬에 둘 이상 존재 가능. 제조자·수입자·유통업자를 대신해 보관·운송만 수행하는 자는 유통업자가 아니다.\n[SOURCE: GHTF/SG1/N055:2009, 5.3]","explanation":"[3.5]"},{"id":"t16","cat":"객관식","type":"mc","clause":"3.6","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기.\"","options":["위험관리","멸균 의료기기","멸균방벽시스템","이식형 의료기기"],"answerIndex":3,"answer":"이식형 의료기기","explanation":"[3.6] 이식형 의료기기 (implantable medical device)"},{"id":"t17","cat":"단답형","type":"short","clause":"3.6","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기.\"","options":[],"answerIndex":null,"answer":"이식형 의료기기 (implantable medical device)","explanation":"[3.6] 핵심: 능동 이식형 의료기기를 포함한다."},{"id":"t18","cat":"서술형","type":"essay","clause":"3.6","question":"'이식형 의료기기 (implantable medical device)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"내과적·외과적 시술로만 제거할 수 있으며, 인체나 자연 개구부에 전체/부분 삽입되거나 상피·안구 표면을 대체하고, 시술 후 최소 30일 이상 체내에 남도록 의도된 의료기기.\n[핵심] 능동 이식형 의료기기를 포함한다.","explanation":"[3.6]"},{"id":"t19","cat":"객관식","type":"mc","clause":"3.7","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"다른 국가·관할권에서 제조된 의료기기를, 그 기기가 판매될 국가·관할권에서 가용하게 만드는 공급사슬상 최초의 자연인 또는 법인.\"","options":["위험관리","멸균 의료기기","수입업자(수입자)","멸균방벽시스템"],"answerIndex":2,"answer":"수입업자(수입자)","explanation":"[3.7] 수입업자(수입자) (importer) [SOURCE: GHTF/SG1/N055:2009, 5.4]"},{"id":"t20","cat":"단답형","type":"short","clause":"3.7","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"다른 국가·관할권에서 제조된 의료기기를, 그 기기가 판매될 국가·관할권에서 가용하게 만드는 공급사슬상 최초의 자연인 또는 법인.\"","options":[],"answerIndex":null,"answer":"수입업자(수입자) (importer)","explanation":"[3.7]"},{"id":"t21","cat":"서술형","type":"essay","clause":"3.7","question":"'수입업자(수입자) (importer)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"다른 국가·관할권에서 제조된 의료기기를, 그 기기가 판매될 국가·관할권에서 가용하게 만드는 공급사슬상 최초의 자연인 또는 법인.\n[SOURCE: GHTF/SG1/N055:2009, 5.4]","explanation":"[3.7]"},{"id":"t22","cat":"객관식","type":"mc","clause":"3.8","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"라벨, 사용설명서, 그리고 의료기기의 식별·기술 설명·의도된 목적·적절한 사용에 관련된 기타 정보(운송 문서는 제외).\"","options":["위험관리","라벨링","멸균 의료기기","멸균방벽시스템"],"answerIndex":1,"answer":"라벨링","explanation":"[3.8] 라벨링 (labeling) [SOURCE: GHTF/SG1/N70:2011, Clause 4]"},{"id":"t23","cat":"단답형","type":"short","clause":"3.8","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"라벨, 사용설명서, 그리고 의료기기의 식별·기술 설명·의도된 목적·적절한 사용에 관련된 기타 정보(운송 문서는 제외).\"","options":[],"answerIndex":null,"answer":"라벨링 (labeling)","explanation":"[3.8]"},{"id":"t24","cat":"서술형","type":"essay","clause":"3.8","question":"'라벨링 (labeling)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"라벨, 사용설명서, 그리고 의료기기의 식별·기술 설명·의도된 목적·적절한 사용에 관련된 기타 정보(운송 문서는 제외).\n[SOURCE: GHTF/SG1/N70:2011, Clause 4]","explanation":"[3.8]"},{"id":"t25","cat":"객관식","type":"mc","clause":"3.9","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계.\"","options":["수명주기","위험관리","멸균 의료기기","멸균방벽시스템"],"answerIndex":0,"answer":"수명주기","explanation":"[3.9] 수명주기 (life-cycle) [SOURCE: ISO 14971:2007, 2.7]"},{"id":"t26","cat":"단답형","type":"short","clause":"3.9","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계.\"","options":[],"answerIndex":null,"answer":"수명주기 (life-cycle)","explanation":"[3.9]"},{"id":"t27","cat":"서술형","type":"essay","clause":"3.9","question":"'수명주기 (life-cycle)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"최초 개념(개발)부터 최종 사용 중지 및 폐기까지 의료기기 수명의 모든 단계.\n[SOURCE: ISO 14971:2007, 2.7]","explanation":"[3.9]"},{"id":"t28","cat":"객관식","type":"mc","clause":"3.10","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).\"","options":["위험관리","멸균 의료기기","멸균방벽시스템","제조자"],"answerIndex":3,"answer":"제조자","explanation":"[3.10] 제조자 (manufacturer)"},{"id":"t29","cat":"단답형","type":"short","clause":"3.10","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).\"","options":[],"answerIndex":null,"answer":"제조자 (manufacturer)","explanation":"[3.10] 핵심: 적용 규제 요구사항 준수에 대한 궁극적 법적 책임을 가진다. 사용설명서에 따라 단순 조립·적용하는 자는 제조자가 아니다."},{"id":"t30","cat":"서술형","type":"essay","clause":"3.10","question":"'제조자 (manufacturer)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"자기 명의로 의료기기를 사용 가능하게 할 목적으로 그 설계 및/또는 제조에 책임을 지는 자연인 또는 법인(직접 또는 타인을 통해 설계·제조하는지 여부는 무관).\n[핵심] 적용 규제 요구사항 준수에 대한 궁극적 법적 책임을 가진다. 사용설명서에 따라 단순 조립·적용하는 자는 제조자가 아니다.","explanation":"[3.10]"},{"id":"t31","cat":"객관식","type":"mc","clause":"3.11","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"제조자가 인간에 대해 의료 목적(질병·부상의 진단·예방·모니터링·치료·완화, 손상·장애의 보정, 해부·생리·병리 과정/상태의 검사·대체·변경·지원, 생명 유지, 임신 조절, 의료기기의 소독, 인체 시료의 체외 검사를 통한 정보 제공 등)으로 단독 또는 조합으로 사용하도록 의도한 기구·장치·기계·소프트웨어·재료 등. 단, 약리·면역·대사 수단으로 주된 작용을 달성하지 않는다(그 수단의 보조는 가능).\"","options":["위험관리","멸균 의료기기","의료기기","멸균방벽시스템"],"answerIndex":2,"answer":"의료기기","explanation":"[3.11] 의료기기 (medical device)"},{"id":"t32","cat":"단답형","type":"short","clause":"3.11","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"제조자가 인간에 대해 의료 목적(질병·부상의 진단·예방·모니터링·치료·완화, 손상·장애의 보정, 해부·생리·병리 과정/상태의 검사·대체·변경·지원, 생명 유지, 임신 조절, 의료기기의 소독, 인체 시료의 체외 검사를 통한 정보 제공 등)으로 단독 또는 조합으로 사용하도록 의도한 기구·장치·기계·소프트웨어·재료 등. 단, 약리·면역·대사 수단으로 주된 작용을 달성하지 않는다(그 수단의 보조는 가능).\"","options":[],"answerIndex":null,"answer":"의료기기 (medical device)","explanation":"[3.11] 핵심: 체외진단(IVD) 의료기기, 부속품을 포함할 수 있다."},{"id":"t33","cat":"서술형","type":"essay","clause":"3.11","question":"'의료기기 (medical device)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"제조자가 인간에 대해 의료 목적(질병·부상의 진단·예방·모니터링·치료·완화, 손상·장애의 보정, 해부·생리·병리 과정/상태의 검사·대체·변경·지원, 생명 유지, 임신 조절, 의료기기의 소독, 인체 시료의 체외 검사를 통한 정보 제공 등)으로 단독 또는 조합으로 사용하도록 의도한 기구·장치·기계·소프트웨어·재료 등. 단, 약리·면역·대사 수단으로 주된 작용을 달성하지 않는다(그 수단의 보조는 가능).\n[핵심] 체외진단(IVD) 의료기기, 부속품을 포함할 수 있다.","explanation":"[3.11]"},{"id":"t34","cat":"객관식","type":"mc","clause":"3.12","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"동일 조직이(또는 동일 조직을 위해) 제조하고, 안전·의도된 사용·기능에 관련된 동일한 기본 설계 및 성능 특성을 갖는 의료기기 그룹.\"","options":["위험관리","의료기기군","멸균 의료기기","멸균방벽시스템"],"answerIndex":1,"answer":"의료기기군","explanation":"[3.12] 의료기기군 (medical device family)"},{"id":"t35","cat":"단답형","type":"short","clause":"3.12","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"동일 조직이(또는 동일 조직을 위해) 제조하고, 안전·의도된 사용·기능에 관련된 동일한 기본 설계 및 성능 특성을 갖는 의료기기 그룹.\"","options":[],"answerIndex":null,"answer":"의료기기군 (medical device family)","explanation":"[3.12]"},{"id":"t36","cat":"서술형","type":"essay","clause":"3.12","question":"'의료기기군 (medical device family)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"동일 조직이(또는 동일 조직을 위해) 제조하고, 안전·의도된 사용·기능에 관련된 동일한 기본 설계 및 성능 특성을 갖는 의료기기 그룹.","explanation":"[3.12]"},{"id":"t37","cat":"객관식","type":"mc","clause":"3.13","question":"다음 설명에 해당하는 ISO 13485:2016 용어는?\n\n\"체외진단(IVD) 의료기기가 의도된 사용을 달성할 수 있는 능력을 수립하거나 검증하기 위한 데이터의 사정·분석.\"","options":["성능평가","위험관리","멸균 의료기기","멸균방벽시스템"],"answerIndex":0,"answer":"성능평가","explanation":"[3.13] 성능평가 (performance evaluation)"},{"id":"t38","cat":"단답형","type":"short","clause":"3.13","question":"다음 정의에 해당하는 용어를 국문과 영문으로 쓰시오.\n\n\"체외진단(IVD) 의료기기가 의도된 사용을 달성할 수 있는 능력을 수립하거나 evice)","explanation":"[3.20]"},{"id":"t60","cat":"서술형","type":"essay","clause":"3.20","question":"'멸균 의료기기 (sterile medical device)'의 정의를 서술하시오.","options":[],"answerIndex":null,"answer":"멸균에 대한 요구사항을 충족하도록 의도된 의료기기.","explanation":"[3.20]"}];
let order=[], idx=0, score=0, answered=0, revealed=false, sel=null;
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function pool(){ const ty=document.getElementById('fType').value; return SEED.filter(q=>ty==='all'||q.type===ty); }
function updateCount(){ document.getElementById('fCount').textContent='선택: '+pool().length+'문 / 전체 '+SEED.length+'문'; }
document.getElementById('fType').addEventListener('change',updateCount);
function startQuiz(){
  order=pool().slice(); if(!order.length){alert('문항이 없습니다');return;}
  if(document.getElementById('fOrder').value==='rand') order.sort(()=>Math.random()-0.5);
  idx=0;score=0;answered=0;
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQ();
}
function renderQ(){
  const q=order[idx]; revealed=false; sel=null;
  document.getElementById('qCat').textContent=q.cat;
  document.getElementById('qClause').textContent='조항 '+q.clause;
  document.getElementById('qPos').textContent=(idx+1)+' / '+order.length;
  document.getElementById('qBar').style.width=(idx/order.length*100)+'%';
  document.getElementById('qScore').textContent='객관식 점수: '+score+(answered?(' / '+answered+'문 시도'):'');
  document.getElementById('qText').textContent=q.question;
  const ans=document.getElementById('qAns'); ans.classList.add('hidden'); ans.innerHTML='';
  const opts=document.getElementById('qOpts'); opts.innerHTML='';
  const mk=['①','②','③','④','⑤'];
  if(q.type==='mc'){
    document.getElementById('btnReveal').classList.add('hidden');
    q.options.forEach((o,i)=>{ const b=document.createElement('button'); b.className='opt'; b.innerHTML='<span class="mk">'+mk[i]+'</span>'+esc(o);
      b.onclick=()=>{ if(revealed)return; sel=i; [...opts.children].forEach(c=>c.classList.remove('sel')); b.classList.add('sel'); reveal(); };
      opts.appendChild(b); });
  } else {
    const wrap=document.createElement('div');
    wrap.innerHTML='<div class="inlabel">✍ 직접 답을 입력한 뒤 아래 [정답/모범답안 보기] 버튼을 누르세요 (안 적어도 됩니다).</div>'+
      (q.type==='short'?'<input id="userIn" class="answin" type="text" autocomplete="off" placeholder="용어를 국문/영문으로 입력">':'<textarea id="userIn" class="answin ta" placeholder="답안을 작성"></textarea>');
    opts.appendChild(wrap);
    document.getElementById('btnReveal').classList.remove('hidden');
    document.getElementById('btnReveal').textContent=(q.type==='short'?'정답 보기':'모범답안 보기');
  }
  document.getElementById('btnPrev').disabled=idx===0;
  document.getElementById('btnNext').textContent=idx===order.length-1?'결과 보기 ▶':'다음 ▶';
}
function reveal(){
  const q=order[idx], ans=document.getElementById('qAns'), opts=document.getElementById('qOpts');
  if(q.type==='mc'){
    if(sel===null){alert('보기를 선택하세요');return;}
    if(!revealed){answered++; if(sel===q.answerIndex)score++;}
    [...opts.children].forEach((c,i)=>{c.classList.remove('sel'); if(i===q.answerIndex)c.classList.add('correct'); else if(i===sel)c.classList.add('wrong');});
    ans.innerHTML='<span class="lbl">정답: '+['①','②','③','④','⑤'][q.answerIndex]+' '+esc(q.options[q.answerIndex])+'</span>'+(q.explanation?('<br>'+esc(q.explanation)):'');
  } else {
    const ui=document.getElementById('userIn'); const mine=ui?ui.value.trim():'';
    ans.innerHTML=(mine?('<span class="lbl">내 답안</span><br>'+esc(mine)+'<hr style="border:none;border-top:1px dashed #cbd5e1;margin:10px 0;">'):'')+
      '<span class="lbl">'+(q.type==='short'?'정답':'모범답안')+'</span><br>'+esc(q.answer)+(q.explanation?('<br><span class="hint">'+esc(q.explanation)+'</span>'):'');
  }
  ans.innerHTML+='<div class="ansacts"><button class="abtn" onclick="copyKeyword()">📋 정답 복사</button><button class="abtn gem" onclick="askGemini()">✨ Gemini에 물어보기</button><span class="hint">복사 후 Gemini에 붙여넣기(Ctrl·⌘+V)</span></div>';
  ans.classList.remove('hidden');
  document.getElementById('qScore').textContent='객관식 점수: '+score+(answered?(' / '+answered+'문 시도'):'');
  revealed=true;
}
function curKeyword(){ const q=order[idx]; return q.type==='mc'?q.options[q.answerIndex]:q.answer; }
function curPrompt(){ const q=order[idx]; return 'ISO 13485 용어 질문(조항 '+q.clause+'). 아래를 의료기기 품질경영 관점에서 쉽게 설명해줘.\n\n[문제]\n'+q.question+'\n\n[정답·핵심]\n'+curKeyword(); }
function fallbackCopy(s){try{const ta=document.createElement('textarea');ta.value=s;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);}catch(e){}}
function copyText(s){ if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(s).catch(()=>fallbackCopy(s));}else fallbackCopy(s); }
let tt; function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('show'),2400);}
function copyKeyword(){ copyText(curKeyword()); toast('정답을 복사했어요.'); }
function askGemini(){ copyText(curPrompt()); toast('질문을 복사했어요. Gemini에서 붙여넣기(Ctrl·⌘+V).'); window.open('https://gemini.google.com/app','_blank'); }
function nextQ(){ if(idx===order.length-1){showResult();return;} idx++; renderQ(); }
function prevQ(){ if(idx>0){idx--; renderQ();} }
function showResult(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('rScore').textContent=answered?(score+' / '+answered):(order.length+'문 완료');
  document.getElementById('rText').textContent=answered?('객관식 정답률 '+Math.round(score/answered*100)+'% · 총 '+order.length+'문'):'단답형·서술형은 모범답안으로 자가 채점하세요.';
}
function endQuiz(){ document.getElementById('quiz').classList.add('hidden'); document.getElementById('result').classList.add('hidden'); document.getElementById('setup').classList.remove('hidden'); updateCount(); }
document.addEventListener('keydown',e=>{ if(document.getElementById('quiz').classList.contains('hidden'))return;
  const tag=(e.target&&e.target.tagName)||''; if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.key==='ArrowRight')nextQ(); else if(e.key==='ArrowLeft')prevQ(); else if(e.key==='Enter')reveal();
  else if(['1','2','3','4'].includes(e.key)){const b=document.getElementById('qOpts').children[+e.key-1]; if(b&&b.classList.contains('opt'))b.click();} });
updateCount();
</script>
</body>
