합 진술: 특수공정 및 소프트웨어 밸리데이션이 수행되지 않아 7.5.6을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 검증 불가 공정의 일관성 보증 실패.","explanation":""},{"id":"q269","cat":"조항7-8 시나리오","type":"scenario","clause":"7.5.7","question":"[7.5.7 멸균 및 멸균차단시스템을 위한 프로세스의 유효성 확인] (시나리오) 멸균 의료기기를 출하하고 있으나 멸균공정 유효성 확인(밸리데이션)이 수행되지 않았고, 멸균차단시스템(멸균포장)에 대한 밸리데이션 및 제품·공정 변경 시 재밸리데이션 절차가 마련되어 있지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 7.5.7 (멸균 및 멸균차단시스템 프로세스의 유효성 확인 특별 요구사항)\n■ 요구사항: 조직은 멸균 및 멸균차단시스템에 대한 공정 밸리데이션 절차와, 적절한 경우 제품·공정 변경에 따른 재밸리데이션 절차를 문서화하고 관련 기록을 유지하여야 한다(ISO 11607 참조).\n■ 객관적 증거: 멸균공정 유효성 확인 및 멸균차단시스템 밸리데이션·재밸리데이션 절차가 부재함.\n■ 부적합 진술: 멸균공정 및 포장 밸리데이션이 누락되어 7.5.7을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 무균성·멸균 유지의 핵심 유효성 확인 누락.\n■ 작성 포인트: 문제에서 흔히 제시되는 \"멸균 유효성 검증 누락\"의 정확한 매칭 조항은 7.5.7이다.","explanation":""},{"id":"q270","cat":"조항7-8 시나리오","type":"scenario","clause":"7.5.8","question":"[7.5.8 식별] (시나리오) 생산 라인에서 합격품과 불합격품의 검사 상태가 명확히 식별되지 않았고, 반품된 제품이 적합 제품과 구별 없이 보관되어 있었으며, 규제가 요구하는 고유기기식별(UDI) 시스템이 적용되지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 7.5.8 (식별)\n■ 요구사항: 제품은 실현 전반에 걸쳐 적절히 식별되고 모니터링·측정 요구사항에 대한 적합성 상태가 식별·유지되어야 하며, 규제 적용 시 UDI 시스템을 구축하고 반품 제품을 적합 제품과 구별하여야 한다.\n■ 객관적 증거: 검사 상태 식별 미흡, 반품 제품 미구별, UDI 미적용이 확인됨.\n■ 부적합 진술: 제품 식별 및 상태 식별이 미흡하여 7.5.8을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 부적합품 혼입 위험 및 규제(UDI) 미준수.","explanation":""},{"id":"q271","cat":"조항7-8 시나리오","type":"scenario","clause":"7.5.9","question":"[7.5.9 추적성] (시나리오) 이식형 의료기기를 제조하면서, 안전·성능에 영향을 줄 수 있는 부품·자재 및 작업환경 조건이 기록되지 않았고, 유통 단계의 수하인(이름·주소) 기록이 유지되지 않아 추적이 불가하였다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 7.5.9 (추적성)\n■ 요구사항: 조직은 적용 규제에 따른 추적성 절차를 수립하고, 이식형 의료기기의 경우 안전·성능에 영향을 줄 수 있는 부품·자재·작업환경 조건과 유통 수하인 기록을 유지하여 추적을 가능하게 하여야 한다.\n■ 객관적 증거: 이식형 기기의 부품·자재·유통 수하인 추적성 기록이 누락됨.\n■ 부적합 진술: 이식형 의료기기 추적성 기록이 유지되지 않아 7.5.9를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 이식형 기기 추적성 결여는 회수·환자 안전에 직결.","explanation":""},{"id":"q272","cat":"조항7-8 시나리오","type":"scenario","clause":"7.5.10","question":"[7.5.10 고객자산] (시나리오) 고객이 제공한 금형 및 고객 소유 설계 데이터를 사용하고 있으나, 이를 식별·검증·보호하는 관리가 이루어지지 않았고, 일부 데이터가 손상되었음에도 고객과의 의사소통 기록이 없었다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 7.5.10 (고객자산)\n■ 요구사항: 조직의 관리 하에 있는 고객자산은 식별·검증·보호·보호조치되어야 하며, 분실·손상·부적합 판명 시 고객에게 보고하고 기록을 유지하여야 한다.\n■ 객관적 증거: 고객 제공 금형·데이터의 식별·보호 관리가 없고 손상 시 고객 통보 기록이 부재함.\n■ 부적합 진술: 고객자산 관리 및 손상 보고가 이루어지지 않아 7.5.10을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 고객자산 관리 절차의 이행이 미흡.","explanation":""},{"id":"q273","cat":"조항7-8 시나리오","type":"scenario","clause":"7.5.11","question":"[7.5.11 제품의 보존] (시나리오) 온도에 민감한 진단시약을 취급하면서, 보관·운송 중 요구되는 특수 조건(콜드체인)을 관리·모니터링하고 기록하는 활동이 이루어지지 않아 변질 위험이 통제되지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 7.5.11 (제품의 보존)\n■ 요구사항: 조직은 가공·보관·취급·유통 중 제품의 적합성을 보존하기 위해 적합한 포장·운송 용기를 사용하고, 포장만으로 부족한 경우 관리 및 기록을 포함한 특수 조건 요구사항을 문서화·실행하여야 한다.\n■ 객관적 증거: 온도민감 제품의 콜드체인 특수 조건 관리·모니터링·기록이 수행되지 않음.\n■ 부적합 진술: 특수 보존 조건이 관리·기록되지 않아 7.5.11을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 변질 위험 미통제는 제품 유효성에 직접 영향.","explanation":""},{"id":"q274","cat":"조항7-8 시나리오","type":"scenario","clause":"7.6","question":"[7.6 모니터링 및 측정장비의 관리] (시나리오) 제품 합부 판정에 사용되는 측정장비의 교정 주기가 경과한 채로 사용되고 있었고, 일부 장비는 국가·국제 측정표준에 대한 소급성이 확인되지 않았다. 또한 한 장비가 부적합 판명되었음에도 이전 측정 결과의 유효성에 대한 평가가 수행되지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 7.6 (모니터링 및 측정장비의 관리)\n■ 요구사항: 측정장비는 최초 사용 전과 규정 주기로 국제·국가 측정표준에 소급 가능하게 교정·검증되어야 하며, 부적합 판명 시 이전 측정 결과의 유효성을 평가·기록하고 영향받은 장비·제품에 적절한 조치를 하여야 한다.\n■ 객관적 증거: 교정 주기 경과 장비 사용, 소급성 미확인, 부적합 장비의 이전 결과 영향평가 미실시가 확인됨.\n■ 부적합 진술: 측정장비의 교정·소급성 및 부적합 시 영향평가가 미흡하여 7.6을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 측정 신뢰성 결여는 다수 제품의 합부 판정에 영향.","explanation":""},{"id":"q275","cat":"조항7-8 시나리오","type":"scenario","clause":"8.1","question":"[8.1 일반사항] (시나리오) 제품 적합성·QMS 적합성·QMS 효과성을 입증하기 위한 모니터링·측정·분석·개선 프로세스가 운영되고 있으나, 통계적 기법을 포함한 적절한 방법과 그 사용 범위가 결정·문서화되어 있지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.1 (일반사항)\n■ 요구사항: 조직은 제품 적합성 입증, QMS 적합성 보장, QMS 효과성 유지를 위한 모니터링·측정·분석·개선 프로세스를 계획·실행하고, 통계적 기법을 포함한 적절한 방법과 적용 범위를 결정하여야 한다.\n■ 객관적 증거: 통계적 기법을 포함한 분석 방법 및 적용 범위가 결정·문서화되어 있지 않음.\n■ 부적합 진술: 적절한 방법·적용 범위가 결정되지 않아 8.1을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 활동은 이루어지나 방법론의 결정·문서화가 미흡.","explanation":""},{"id":"q276","cat":"조항7-8 시나리오","type":"overview","clause":"8.2","question":"[8.2 모니터링 및 측정] (조항 개요) 조항 8.2(모니터링 및 측정)의 하위 활동을 개괄하시오.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.2 (모니터링 및 측정)\n■ 요구사항 개요: 피드백(8.2.1, 생산·생산 후, 위험관리 환류), 불만처리(8.2.2), 규제당국 보고(8.2.3), 내부심사(8.2.4, 독립성), 프로세스 모니터링(8.2.5), 제품 모니터링·출하 통제(8.2.6)로 구성된다.","explanation":""},{"id":"q277","cat":"조항7-8 시나리오","type":"scenario","clause":"8.2.1","question":"[8.2.1 피드백] (시나리오) 시판 후 정보를 수집하는 피드백 활동이 운영되고 있으나, 생산 후 단계의 정보만 수집하고 있어 생산 단계 정보가 누락되었으며, 수집된 피드백이 위험관리 프로세스의 입력으로 연계되지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.2.1 (피드백)\n■ 요구사항: 조직은 생산 및 생산 후 활동의 데이터에 기반한 피드백 프로세스를 수립하고, 피드백 정보를 위험관리 프로세스의 입력으로 사용하여야 한다.\n■ 객관적 증거: 피드백이 생산 후 단계에만 한정되고 위험관리 입력으로 연계되지 않음.\n■ 부적합 진술: 피드백 수집 범위 및 위험관리 연계가 미흡하여 8.2.1을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 피드백은 운영되나 범위·연계가 미흡.","explanation":""},{"id":"q278","cat":"조항7-8 시나리오","type":"scenario","clause":"8.2.2","question":"[8.2.2 불만처리] (시나리오) 접수된 고객 불만 중 일부가 평가·조사 없이 종결되었고, 조사를 하지 않은 건에 대한 정당성이 기록되지 않았다. 또한 규제당국 보고 대상 여부에 대한 검토가 이루어지지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.2.2 (불만처리)\n■ 요구사항: 조직은 적용 규제에 따라 불만을 적시 처리하는 문서화된 절차를 수립하고, 불만의 접수·기록·평가·조사, 규제당국 보고, 수정·시정조치 착수를 정의하여야 하며, 불만을 조사하지 않는 경우 그 정당성을 기록하여야 한다.\n■ 객관적 증거: 불만 일부가 평가·조사 없이 종결되었고 미조사 정당성·규제보고 검토 기록이 없음.\n■ 부적합 진술: 불만의 평가·조사 및 미조사 정당성 기록이 누락되어 8.2.2를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 불만처리·규제보고 누락은 환자 안전·규제 준수에 직결.","explanation":""},{"id":"q279","cat":"조항7-8 시나리오","type":"scenario","clause":"8.2.3","question":"[8.2.3 규제기관에 대한 보고] (시나리오) 특정 이상사례 및 권고문(리콜) 발행에 대해 규제당국에 보고하여야 하는 기준과 절차가 수립되어 있지 않았고, 해당 보고를 수행한 기록도 확인되지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.2.3 (규제기관에 대한 보고)\n■ 요구사항: 조직은 불만의 통보(보고)에 관한 적용 규제 요구사항을 식별하고, 규제당국에 보고할 때 따르는 문서화된 절차를 수립하며, 보고 기록을 유지하여야 한다.\n■ 객관적 증거: 규제당국 보고 기준·절차가 수립되지 않았고 보고 기록이 부재함.\n■ 부적합 진술: 규제기관 보고 절차·기록이 없어 8.2.3을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 규제 보고 의무 미이행.","explanation":""},{"id":"q280","cat":"조항7-8 시나리오","type":"scenario","clause":"8.2.4","question":"[8.2.4 내부심사] (시나리오) 내부심사에서 품질관리 부서의 심사를 해당 부서 담당자 본인이 수행하였고, 계획된 심사 주기가 준수되지 않았으며, 도출된 부적합에 대한 후속 조치의 검증이 이루어지지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.2.4 (내부심사)\n■ 요구사항: 내부심사는 계획된 주기로 수행되어야 하며, 심사원은 객관성·공정성을 위해 자신의 업무를 심사할 수 없고, 도출된 부적합은 지체 없이 수정·시정조치되고 후속 조치(취해진 조치의 검증·보고)가 이루어져야 한다.\n■ 객관적 증거: 심사원이 자신의 업무를 심사하였고 심사 주기 미준수 및 후속 검증 미실시가 확인됨.\n■ 부적합 진술: 심사 독립성 위반 및 후속 검증 누락으로 8.2.4를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 심사 객관성 훼손은 QMS 자가검증 신뢰성에 직결.","explanation":""},{"id":"q281","cat":"조항7-8 시나리오","type":"scenario","clause":"8.2.5","question":"[8.2.5 프로세스의 모니터링 및 측정] (시나리오) 공정 모니터링 결과 핵심 공정능력 지표가 설정 목표에 지속적으로 미달하고 있음에도, 수정 및 시정조치가 실행되지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.2.5 (프로세스의 모니터링 및 측정)\n■ 요구사항: 조직은 QMS 프로세스가 계획된 결과를 달성하는 능력을 입증하는 모니터링·측정 방법을 적용하고, 계획된 결과가 달성되지 않으면 적절히 수정 및 시정조치를 실행하여야 한다.\n■ 객관적 증거: 공정 지표가 목표에 미달함에도 수정·시정조치가 실행되지 않음.\n■ 부적합 진술: 목표 미달 시 시정조치가 이루어지지 않아 8.2.5를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 모니터링은 수행되나 후속 조치가 미흡.","explanation":""},{"id":"q282","cat":"조항7-8 시나리오","type":"scenario","clause":"8.2.6","question":"[8.2.6 제품의 모니터링 및 측정] (시나리오) 출하 검사 항목 중 일부가 완료되지 않은 상태에서 제품이 출하되었고, 이식형 의료기기의 검사·시험을 수행한 인원의 신원이 기록되지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.2.6 (제품의 모니터링 및 측정)\n■ 요구사항: 제품 특성은 적절한 단계에서 측정·모니터링되어야 하고, 계획·문서화된 모든 활동이 성공적으로 완료될 때까지 출하·인도를 진행해서는 안 되며, 이식형 의료기기는 검사·시험 수행 인원의 신원을 기록하여야 한다.\n■ 객관적 증거: 출하 검사 미완료 상태에서 출하되었고 이식형 기기 검사자 신원 기록이 부재함.\n■ 부적합 진술: 검사 미완료 출하 및 검사자 신원 미기록으로 8.2.6을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 미검증 제품 출하는 환자 안전에 직결.","explanation":""},{"id":"q283","cat":"조항7-8 시나리오","type":"overview","clause":"8.3","question":"[8.3 부적합 제품의 관리] (조항 개요) 조항 8.3(부적합 제품의 관리)의 요구사항을 개괄하시오.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.3 (부적합 제품의 관리)\n■ 요구사항 개요: 부적합품의 식별·격리·평가·처리와 책임·권한 정의(8.3.1), 인도 전 대응(8.3.2: 제거·사용방지·특채), 인도 후 대응(8.3.3: 영향 평가·권고문), 재작업(8.3.4: 절차 검토·승인·재검증)을 포함한다.","explanation":""},{"id":"q284","cat":"조항7-8 시나리오","type":"scenario","clause":"8.3.1","question":"[8.3.1 일반사항] (시나리오) 부적합 제품의 식별·문서화·격리·평가·처리(disposition)에 대한 관리와 관련 책임·권한을 정의한 문서화된 절차가 수립되어 있지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.3.1 (일반사항)\n■ 요구사항: 조직은 부적합 제품이 의도되지 않게 사용·인도되지 않도록 식별·관리하여야 하며, 그 식별·문서화·격리·평가·처리에 대한 관리와 책임·권한을 정의한 문서화된 절차를 수립하여야 한다.\n■ 객관적 증거: 부적합 제품 관리 절차 및 책임·권한 정의가 부재함.\n■ 부적합 진술: 부적합 제품 관리 절차가 수립되지 않아 8.3.1을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 부적합품 혼입 방지 체계의 부재.","explanation":""},{"id":"q285","cat":"조항7-8 시나리오","type":"scenario","clause":"8.3.2","question":"[8.3.2 운송 이전에 검출된 부적합 제품에 대한 대응조치] (시나리오) 인도(출하) 전에 발견된 부적합 제품을 특채(concession)로 출하하면서, 정당성 제시·승인 및 적용 규제 요구사항 충족 확인 없이 출하하였고 특채 승인자의 식별 기록도 남기지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.3.2 (운송 이전에 검출된 부적합 제품에 대한 대응조치)\n■ 요구사항: 인도 전 부적합 발견 시 부적합 제거, 원래 의도된 사용·적용 방지, 또는 정당성이 제시·승인되고 규제 요구사항이 충족되는 경우에 한해 특채에 따른 사용·출하·수락을 승인할 수 있으며, 특채 기록은 승인자의 식별을 포함하여 유지하여야 한다.\n■ 객관적 증거: 부적합 제품을 정당성·승인·규제 충족 확인 및 승인자 기록 없이 특채 출하함.\n■ 부적합 진술: 특채 요건을 충족하지 않고 출하하여 8.3.2를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 통제되지 않은 특채 출하.","explanation":""},{"id":"q286","cat":"조항7-8 시나리오","type":"scenario","clause":"8.3.3","question":"[8.3.3 운송 이후에 검출된 부적합 제품에 대한 대응조치] (시나리오) 시판(인도) 후 제품에서 부적합이 발견되었으나, 부적합의 영향 또는 잠재적 영향에 근거한 조치가 취해지지 않았고 권고문(advisory notice) 발행에 관한 문서화된 절차가 마련되어 있지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.3.3 (운송 이후에 검출된 부적합 제품에 대한 대응조치)\n■ 요구사항: 인도·사용 개시 후 부적합 발견 시 조직은 부적합의 영향 또는 잠재적 영향에 근거하여 적절한 조치를 취하여야 하며, 규제가 명하는 경우 권고문 발행에 관한 문서화된 절차를 따르고 취해진 조치의 기록을 유지하여야 한다.\n■ 객관적 증거: 시판 후 부적합에 대한 영향 평가·조치 및 권고문 절차가 부재함.\n■ 부적합 진술: 시판 후 부적합 대응 및 권고문 절차가 미흡하여 8.3.3을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 시판 후 안전 조치(회수·권고) 체계 결여.","explanation":""},{"id":"q287","cat":"조항7-8 시나리오","type":"scenario","clause":"8.3.4","question":"[8.3.4 재작업] (시나리오) 부적합 제품을 재작업하면서, 재작업이 제품에 미치는 잠재적 부정적 영향을 고려하지 않았고, 재작업 절차가 원래 절차와 동일하게 검토·승인되지 않았으며, 재작업 후 합격 판정 기준 충족에 대한 검증이 누락되었다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.3.4 (재작업)\n■ 요구사항: 조직은 재작업의 잠재적 부정적 영향을 고려하여 문서화된 절차에 따라 재작업을 수행하여야 하며, 재작업 절차는 원래 절차와 동일하게 검토·승인되고, 재작업 제품은 합격 판정 기준·규제 요구사항 충족이 검증되어야 한다.\n■ 객관적 증거: 재작업 절차의 검토·승인 및 재작업 후 검증이 누락됨.\n■ 부적합 진술: 재작업의 검토·승인·검증이 이루어지지 않아 8.3.4를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 재작업은 수행되나 통제 요건의 이행이 미흡.","explanation":""},{"id":"q288","cat":"조항7-8 시나리오","type":"scenario","clause":"8.4","question":"[8.4 데이터 분석] (시나리오) QMS의 적절성·충분성·효과성을 입증하기 위한 데이터 분석이 체계적으로 이루어지지 않았다. 피드백, 공급자 데이터, 심사 데이터, 서비스 보고서 등 다양한 출처의 데이터를 결정·수집·분석하는 문서화된 절차와 통계적 기법이 정의되어 있지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.4 (데이터 분석)\n■ 요구사항: 조직은 QMS의 적절성·충분성·효과성을 입증하기 위해 데이터를 결정·수집·분석하는 문서화된 절차를 수립하고(통계적 기법 포함), 피드백·제품 적합성·프로세스 및 제품 경향·공급자·심사·서비스 데이터를 분석하며 기록을 유지하여야 한다.\n■ 객관적 증거: 데이터 분석 절차 및 통계적 기법이 정의되어 있지 않고 다출처 데이터 분석이 미흡함.\n■ 부적합 진술: 데이터 분석 절차·기법이 수립되지 않아 8.4를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 일부 데이터는 검토되나 체계적 분석 절차가 미흡.","explanation":""},{"id":"q289","cat":"조항7-8 시나리오","type":"overview","clause":"8.5","question":"[8.5 개선] (조항 개요) 조항 8.5(개선)의 구성 활동을 서술하시오.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.5 (개선)\n■ 요구사항 개요: 지속적 개선(8.5.1: 방침·목표·심사·PMS·데이터분석·CAPA·경영검토 통한 변경), 시정조치(8.5.2: 발생 부적합 원인 제거·재발 방지·효과성 검토), 예방조치(8.5.3: 잠재 부적합 원인 제거·발생 방지)로 구성된다.","explanation":""},{"id":"q290","cat":"조항7-8 시나리오","type":"scenario","clause":"8.5.1","question":"[8.5.1 일반사항] (시나리오) QMS의 지속적 적절성·충분성·효과성과 의료기기의 안전·성능 유지를 위해, 품질방침·목표·심사·시판 후 감시·데이터 분석·CAPA·경영검토를 통해 필요한 변경을 식별·실행하는 개선 활동이 체계적으로 운영되지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.5.1 (일반사항)\n■ 요구사항: 조직은 품질방침·목표, 심사 결과, 시판 후 감시, 데이터 분석, 시정·예방조치, 경영검토를 통해 QMS의 적절성·충분성·효과성과 의료기기 안전·성능 유지를 위한 변경을 식별·실행하여야 한다.\n■ 객관적 증거: 개선 메커니즘(심사·PMS·데이터분석·CAPA·경영검토 연계)을 통한 변경 식별·실행이 체계적으로 운영되지 않음.\n■ 부적합 진술: 지속적 개선을 위한 변경 식별·실행 체계가 미흡하여 8.5.1을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 개선 활동의 체계적 연계가 미흡.","explanation":""},{"id":"q291","cat":"조항7-8 시나리오","type":"scenario","clause":"8.5.2","question":"[8.5.2 시정조치] (시나리오) 동일 유형의 부적합(밀봉 불량)이 반복 발생하였음에도 근본 원인 분석 없이 해당 제품을 폐기하는 임시 조치만 반복되었고, 시정조치의 효과성 검토가 수행되지 않았으며 조치가 부당하게 지연되었다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.5.2 (시정조치)\n■ 요구사항: 조직은 부적합의 원인을 제거하고 재발을 방지하기 위해 부당한 지연 없이 영향에 비례한 시정조치를 실행하여야 하며, 부적합·불만 검토, 근본 원인 결정, 조치 필요성 평가, 계획·실행, 규제·안전 영향 없음 검증, 효과성 검토를 수행하고 기록하여야 한다.\n■ 객관적 증거: 반복 부적합에 대해 근본 원인 분석·효과성 검토 없이 임시 조치만 반복되고 조치가 지연됨.\n■ 부적합 진술: 근본 원인 분석 및 효과성 검토 없이 시정조치가 이루어져 8.5.2를 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 중(Major) — 근본 원인 미제거로 부적합이 재발.\n■ 작성 포인트: 수정(correction, 즉각 조치)과 시정조치(corrective action, 원인 제거)를 구별하여 서술하면 가점.","explanation":""},{"id":"q292","cat":"조항7-8 시나리오","type":"scenario","clause":"8.5.3","question":"[8.5.3 예방조치] (시나리오) 경향 데이터 분석에서 특정 공정의 부적합 발생 가능성이 증가하는 신호가 관찰되었음에도, 잠재적 부적합의 원인을 제거하여 발생을 방지하기 위한 예방조치 절차나 실행 기록이 존재하지 않았다.","options":[],"answerIndex":null,"answer":"■ 관련 규격 조항: ISO 13485:2016 8.5.3 (예방조치)\n■ 요구사항: 조직은 잠재적 부적합의 원인을 제거하여 발생을 방지하기 위한, 영향에 비례한 예방조치를 실행하여야 하며, 잠재적 부적합·원인 결정, 조치 필요성 평가, 계획·실행, 규제·안전 영향 없음 검증, 효과성 검토를 수행하고 기록하여야 한다.\n■ 객관적 증거: 잠재적 부적합 신호가 식별되었음에도 예방조치 절차·실행 기록이 부재함.\n■ 부적합 진술: 잠재적 부적합에 대한 예방조치가 수행되지 않아 8.5.3을 충족하지 못하므로 부적합이다.\n■ 부적합 등급: 경(Minor) — 예방조치 체계의 이행이 미흡.\n■ 작성 포인트: 시정조치(8.5.2)는 발생한 부적합, 예방조치(8.5.3)는 잠재적 부적합 대상임을 명확히 구별한다.","explanation":""}];
const KEY = 'iso13485_quiz_bank_v2';
let BANK = load();
let order = [], idx = 0, score = 0, answered = 0, revealed = false, sel = null, answeredIds = new Set();
const PKEY = 'iso13485_quiz_progress_v1';
const WKEY = 'iso13485_quiz_wrong_v1';
let WRONG = loadW_init();
let wrongNoteMode = false;
function loadW_init(){ try{ var s=localStorage.getItem('iso13485_quiz_wrong_v1'); return s?JSON.parse(s):[]; }catch(e){return[];} }
function saveW(){ try{ localStorage.setItem(WKEY,JSON.stringify(WRONG)); }catch(e){} }
function addWrong(id){ var now=Date.now(); var ex=WRONG.findIndex(function(w){return w.id===id;}); if(ex>=0) WRONG[ex].ts=now; else WRONG.push({id:id,ts:now}); saveW(); }
function removeWrong(id){ WRONG=WRONG.filter(function(w){return w.id!==id;}); saveW(); }
const RKEY = 'iso13485_quiz_reports_v1';
let REPORTS = loadR();
function loadR(){ try{ const s=localStorage.getItem(RKEY); if(s) return JSON.parse(s); }catch(e){} return []; }
function saveR(){ try{ localStorage.setItem(RKEY, JSON.stringify(REPORTS)); }catch(e){} }

function load(){ try{ const s=localStorage.getItem(KEY); if(s) return JSON.parse(s); }catch(e){} return JSON.parse(JSON.stringify(SEED)); }
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(BANK)); }catch(e){ alert('저장 실패: 브라우저 저장소를 사용할 수 없습니다.'); } }
function uid(){ return 'u'+Date.now()+Math.floor(Math.random()*1000); }
function esc(s){ return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function showTab(t){
  document.getElementById('front').classList.toggle('hidden', t!=='front');
  document.getElementById('back').classList.toggle('hidden', t!=='back');
  document.getElementById('tabFront').classList.toggle('active', t==='front');
  document.getElementById('tabBack').classList.toggle('active', t==='back');
  if(t==='back') renderList();
  if(t==='front') updateCount();
}

/* ---------- FRONT ---------- */
function chapterOf(c){ if(!c) return '0'; const m=String(c).match(/(\d+)/); const n=m?m[1]:'0'; return ['4','5','6','7','8'].includes(n)?n:'0'; }
function pool(){
  const cat=document.getElementById('fCat').value, chap=document.getElementById('fChap').value, onlyMC=document.getElementById('fOnlyMC').checked;
  return BANK.filter(q=>{
    if(cat!=='all' && q.cat!==cat) return false;
    if(chap!=='all' && chapterOf(q.clause)!==chap) return false;
    if(onlyMC && q.type!=='mc') return false;
    return true;
  });
}
function updateCount(){ document.getElementById('fCount').textContent = '선택된 문제: '+pool().length+'개 / 전체 '+BANK.length+'개'; }
['fCat','fChap','fOnlyMC'].forEach(id=>document.addEventListener('input',e=>{if(e.target.id===id)updateCount();}));
updateSetupProgress();

function updateScore(){
  var mc={t:0,d:0}, ess={t:0,d:0}, scn={t:0,d:0};
  order.forEach(function(q){
    var done=answeredIds.has(q.id);
    if(q.type==='mc'||q.type==='short'){ mc.t++; if(done)mc.d++; }
    else if(q.type==='essay'){ ess.t++; if(done)ess.d++; }
    else { scn.t++; if(done)scn.d++; }
  });
  var parts=[];
  if(mc.t){
    var left=mc.t-mc.d;
    parts.push('<b>객관식·단답형</b> 정답&nbsp;'+score+'/'+mc.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+left+'문</span>');
  }
  if(ess.t){
    var left2=ess.t-ess.d;
    parts.push('<b>서술형·논술형</b> 완료&nbsp;'+ess.d+'/'+ess.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+left2+'문</span>');
  }
  if(scn.t){
    var left3=scn.t-scn.d;
    parts.push('<b>시나리오</b> 완료&nbsp;'+scn.d+'/'+scn.t+'문&nbsp;<span style="color:var(--ng);">남은&nbsp;'+left3+'문</span>');
  }
  document.getElementById('qScore').innerHTML=parts.join('&ensp;|&ensp;');
}
function startQuiz(){
  wrongNoteMode=false;
  const prog = loadProgress();
  if(prog){
    const bankMap = new Map(BANK.map(q=>[q.id,q]));
    order = prog.orderIds.map(function(id){return bankMap.get(id);}).filter(Boolean);
    if(!order.length){ clearProgress(); startQuiz(); return; }
    answeredIds = new Set(prog.answeredIds||[]);
    score = prog.score||0; answered = prog.answered||0;
    var resume = order.findIndex(function(q){return !answeredIds.has(q.id);});
    idx = resume >= 0 ? resume : order.length-1;
  } else {
    order = pool().slice();
    if(order.length===0){ alert('선택된 문제가 없습니다.'); return; }
    if(document.getElementById('fOrder').value==='rand') order.sort(function(){return Math.random()-.5;});
    idx=0; score=0; answered=0; answeredIds=new Set();
  }
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQ();
}
function restartQuiz(){
  wrongNoteMode=false;
  clearProgress();
  order = pool().slice();
  if(order.length===0){ alert('선택된 문제가 없습니다.'); return; }
  if(document.getElementById('fOrder').value==='rand') order.sort(function(){return Math.random()-.5;});
  idx=0; score=0; answered=0; answeredIds=new Set();
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  renderQ();
}
function saveProgress(){
  try{ localStorage.setItem(PKEY, JSON.stringify({orderIds:order.map(function(q){return q.id;}),answeredIds:[...answeredIds],score:score,answered:answered})); }catch(e){}
}
function loadProgress(){
  try{
    var s=localStorage.getItem(PKEY); if(!s) return null;
    var p=JSON.parse(s); if(!p||!p.orderIds||!p.orderIds.length) return null;
    var bids=new Set(BANK.map(function(q){return q.id;}));
    if(!p.orderIds.every(function(id){return bids.has(id);})) return null;
    return p;
  }catch(e){return null;}
}
function clearProgress(){ try{localStorage.removeItem(PKEY);}catch(e){} }

function updateWrongModeBadge(){
  var badge=document.getElementById('wrongModeBadge');
  if(badge) badge.style.display=wrongNoteMode?'':'none';
}
function startWrongNote(){
  if(!WRONG.length){ toast('아직 틀린 문제가 없습니다.'); return; }
  var bankMap=new Map(BANK.map(function(q){return [q.id,q];}));
  var sorted=[...WRONG].sort(function(a,b){return a.ts-b.ts;});
  order=sorted.map(function(w){return bankMap.get(w.id);}).filter(Boolean);
  if(!order.length){ toast('오답 문제를 찾을 수 없습니다.'); return; }
  wrongNoteMode=true;
  idx=0; score=0; answered=0; answeredIds=new Set();
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('quiz').classList.remove('hidden');
  updateWrongModeBadge();
  renderQ();
}
function updateSetupProgress(){
  var prog=loadProgress();
  var btn=document.getElementById('btnRestart');
  var info=document.getElementById('progressInfo');
  var startBtn=document.getElementById('btnStart');
  if(prog&&prog.orderIds){
    var done=(prog.answeredIds||[]).length;
    var total=prog.orderIds.length;
    var left=total-done;
    if(btn) btn.style.display='';
    if(info) info.textContent='이전 기록: '+done+' / '+total+' 완료';
    if(startBtn) startBtn.textContent='▶ 이어서 풀기 ('+left+'문 남음)';
  } else {
    if(btn) btn.style.display='none';
    if(info) info.textContent='';
    if(startBtn) startBtn.textContent='퀴즈 시작 ▶';
  }
  var wBtn=document.getElementById('btnWrong');
  var wCount=document.getElementById('wrongCount');
  if(wBtn){
    if(WRONG.length){ wBtn.style.display=''; if(wCount) wCount.textContent=WRONG.length; }
    else { wBtn.style.display='none'; }
  }
}
function renderQ(){
  const q=order[idx]; revealed=false; sel=null;
  document.getElementById('qCat').textContent=q.cat;
  document.getElementById('qClause').textContent=q.clause?('조항 '+q.clause):'';
  document.getElementById('qJumpInput').value=idx+1;
  document.getElementById('qPosTotal').textContent=' / '+order.length;
  document.getElementById('qBar').style.width=((idx)/order.length*100)+'%';
  document.getElementById('qType').textContent={mc:'객관식',short:'단답형',essay:'서술형',scenario:'시나리오',overview:'조항 개요'}[q.type]||'';
  updateScore();
  document.getElementById('qText').textContent=q.question;
  const ans=document.getElementById('qAns'); ans.classList.add('hidden'); ans.innerHTML='';
  const opts=document.getElementById('qOpts'); opts.innerHTML='';
  const mk=['①','②','③','④','⑤'];
  if(q.type==='mc'){
    document.getElementById('btnReveal').classList.add('hidden');
    q.options.forEach((o,i)=>{
      const b=document.createElement('button'); b.className='opt'; b.innerHTML='<span class="mk">'+mk[i]+'</span>'+esc(o);
      b.onclick=()=>{ if(revealed)return; sel=i; [...opts.children].forEach(c=>c.classList.remove('sel')); b.classList.add('sel'); reveal(); };
      opts.appendChild(b);
    });
  } else {
    const wrap=document.createElement('div');
    wrap.innerHTML='<div class="inlabel">✍ 직접 답을 입력한 뒤 아래 [정답/모범답안 보기] 버튼을 누르세요 (안 적어도 됩니다).</div>'+
      (q.type==='short'?'<input id="userIn" class="answin" type="text" autocomplete="off" placeholder="답을 입력">':'<textarea id="userIn" class="answin ta" placeholder="답안을 작성"></textarea>');
    opts.appendChild(wrap);
    document.getElementById('btnReveal').classList.remove('hidden');
    document.getElementById('btnReveal').textContent=(q.type==='short'?'정답 보기':'모범답안 보기');
  }
  document.getElementById('btnPrev').disabled = idx===0;
  document.getElementById('btnNext').textContent = idx===order.length-1?'결과 보기 ▶':'다음 ▶';
}
function reveal(){
  const q=order[idx]; const ans=document.getElementById('qAns'); const opts=document.getElementById('qOpts');
  if(q.type==='mc'){
    if(sel===null){ alert('보기를 먼저 선택하세요.'); return; }
    if(!revealed){ answered++; if(sel===q.answerIndex){ score++; removeWrong(q.id); q._correct=true; } else { addWrong(q.id); q._correct=false; } answeredIds.add(q.id); saveProgress(); }
    [...opts.children].forEach((c,i)=>{ c.classList.remove('sel'); if(i===q.answerIndex)c.classList.add('correct'); else if(i===sel)c.classList.add('wrong'); });
    ans.innerHTML='<span class="lbl">정답: '+['①','②','③','④','⑤'][q.answerIndex]+' '+esc(q.options[q.answerIndex])+'</span>'+(q.explanation?('<br>'+esc(q.explanation)):'');
  } else {
    const ui=document.getElementById('userIn'); const mine=ui?ui.value.trim():'';
    ans.innerHTML=(mine?('<span class="lbl">내 답안</span><br>'+esc(mine)+'<hr style="border:none;border-top:1px dashed #cfd9e6;margin:10px 0;">'):'')+
      '<span class="lbl">'+(q.type==='short'?'정답':'모범답안')+'</span><br>'+esc(q.answer)+(q.explanation?('<br><span class="note">'+esc(q.explanation)+'</span>'):'');
  }
  ans.innerHTML += '<div class="ansacts"><button class="abtn" onclick="copyKeyword()">📋 정답 키워드 복사</button><button class="abtn gem" onclick="askGemini()">✨ Gemini에 물어보기</button><span class="hint">키워드/질문을 복사해 Gemini에 붙여넣기(Ctrl·⌘+V)</span></div>';
  ans.classList.remove('hidden');
  updateScore();
  answeredIds.add(order[idx].id); saveProgress();
  revealed=true;
}
function curKeyword(){ const q=order[idx]; return q.type==='mc' ? q.options[q.answerIndex] : q.answer; }
function curPrompt(){ const q=order[idx]; const kw=curKeyword();
  return 'ISO 13485 ' + (q.clause?('('+q.clause+') '):'') + '관련 질문입니다. 아래 내용을 의료기기 품질경영 관점에서 쉽게 설명해 주세요.\n\n[문제]\n' + q.question + '\n\n[정답·핵심]\n' + kw;
}
function fallbackCopy(s){ try{ const ta=document.createElement('textarea'); ta.value=s; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); return true; }catch(e){ return false; } }
function copyText(s){ if(navigator.clipboard && window.isSecureContext){ navigator.clipboard.writeText(s).catch(()=>fallbackCopy(s)); } else { fallbackCopy(s); } }
let toastTimer=null;
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2600); }
function copyKeyword(){ copyText(curKeyword()); toast('정답 키워드를 복사했어요.'); }
function askGemini(){ copyText(curPrompt()); toast('질문을 복사했어요. Gemini 탭에서 붙여넣기(Ctrl·⌘+V) 하세요.'); window.open('https://gemini.google.com/app','_blank'); }
function nextQ(){
  saveProgress();
  if(wrongNoteMode && order[idx] && order[idx]._correct){
    order.splice(idx,1);
    updateWrongModeBadge();
    if(!order.length){ toast('오답 노트 완료! 모든 문제를 맞혔습니다 🎉'); endQuiz(); return; }
    if(idx>=order.length) idx=order.length-1;
    renderQ(); return;
  }
  if(idx===order.length-1){ showResult(); return; }
  idx++; renderQ();
}
function prevQ(){ if(idx>0){ idx--; renderQ(); } }
function showResult(){
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.remove('hidden');
  document.getElementById('qBar').style.width='100%';
  document.getElementById('rScore').textContent = answered? (score+' / '+answered) : (order.length+'문 완료');
  document.getElementById('rText').textContent = answered? ('객관식 정답률 '+Math.round(score/answered*100)+'% · 총 '+order.length+'문 풀이') : '서술형/시나리오는 모범답안으로 자가 채점하세요.';
  clearProgress();
  updateSetupProgress();
}
function endQuiz(){
  saveProgress();
  wrongNoteMode=false;
  document.getElementById('wrongModeBadge').style.display='none';
  document.getElementById('quiz').classList.add('hidden');
  document.getElementById('result').classList.add('hidden');
  document.getElementById('setup').classList.remove('hidden');
  updateSetupProgress();
  updateCount();
}
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').classList.contains('hidden'))return;
  const tag=(e.target&&e.target.tagName)||''; if(tag==='INPUT'||tag==='TEXTAREA')return;
  if(e.key==='ArrowRight')nextQ(); else if(e.key==='ArrowLeft')prevQ();
  else if(e.key==='Enter')reveal();
  else if(['1','2','3','4','5'].includes(e.key)){ const b=document.getElementById('qOpts').children[+e.key-1]; if(b&&b.classList.contains('opt'))b.click(); }
});

/* ---------- BACK ---------- */
function toggleType(){
  const t=document.getElementById('eType').value;
  document.getElementById('mcFields').style.display = t==='mc'?'block':'none';
  document.getElementById('txtFields').style.display = t==='mc'?'none':'block';
  const catSel=document.getElementById('eCat');
  if(t==='mc'||t==='short') catSel.value='객관식·단답형';
  else if(t==='essay') catSel.value='서술형·논술형';
  else if(t==='scenario') catSel.value='조항7-8 시나리오';
}
function resetForm(){
  document.getElementById('eId').value=''; document.getElementById('eQ').value='';
  document.getElementById('eOpts').value=''; document.getElementById('eAnsIdx').value='';
  document.getElementById('eExpl').value=''; document.getElementById('eAns').value=''; document.getElementById('eClause').value='';
  document.getElementById('saveMsg').textContent=''; toggleType();
}
function saveQ(){
  const t=document.getElementById('eType').value;
  const q=document.getElementById('eQ').value.trim();
  if(!q){ alert('문제를 입력하세요.'); return; }
  const obj={ id:document.getElementById('eId').value||uid(), cat:document.getElementById('eCat').value, type:t, clause:document.getElementById('eClause').value.trim(), question:q, options:[], answerIndex:null, answer:'', explanation:'' };
  if(t==='mc'){
    const opts=document.getElementById('eOpts').value.split('\n').map(s=>s.trim()).filter(Boolean);
    if(opts.length<2){ alert('보기를 2개 이상 입력하세요.'); return; }
    const ai=parseInt(document.getElementById('eAnsIdx').value,10);
    if(!(ai>=1&&ai<=opts.length)){ alert('정답 번호가 보기 범위를 벗어났습니다.'); return; }
    obj.options=opts; obj.answerIndex=ai-1; obj.answer=opts[ai-1]; obj.explanation=document.getElementById('eExpl').value.trim();
  } else {
    const a=document.getElementById('eAns').value.trim();
    if(!a){ alert('정답/모범답안을 입력하세요.'); return; }
    obj.answer=a;
  }
  const ix=BANK.findIndex(x=>x.id===obj.id);
  if(ix>=0) BANK[ix]=obj; else BANK.unshift(obj);
  save(); renderList(); resetForm();
  document.getElementById('saveMsg').textContent='저장되었습니다 ('+BANK.length+'문).';
}
function editQ(id){
  const q=BANK.find(x=>x.id===id); if(!q)return;
  document.getElementById('eId').value=q.id; document.getElementById('eType').value=q.type; toggleType();
  document.getElementById('eCat').value=q.cat; document.getElementById('eClause').value=q.clause||'';
  document.getElementById('eQ').value=q.question;
  if(q.type==='mc'){ document.getElementById('eOpts').value=(q.options||[]).join('\n'); document.getElementById('eAnsIdx').value=(q.answerIndex!=null?q.answerIndex+1:''); document.getElementById('eExpl').value=q.explanation||''; }
  else { document.getElementById('eAns').value=q.answer||''; }
  window.scrollTo({top:0,behavior:'smooth'});
}
function delQ(id){ if(!confirm('이 문제를 삭제할까요?'))return; BANK=BANK.filter(x=>x.id!==id); save(); renderList(); }
function renderList(){
  document.getElementById('bCount').textContent=BANK.length;
  const rCountEl=document.getElementById('rCount'); if(rCountEl) rCountEl.textContent=REPORTS.length;
  const f=document.getElementById('bFilter').value, kw=document.getElementById('bSearch').value.trim();
  const list=document.getElementById('bList'); list.innerHTML='';
  const tn={mc:'객관식',short:'단답형',essay:'서술형',scenario:'시나리오',overview:'개요'};
  BANK.filter(q=>(f==='all'||q.cat===f)&&(!kw||(q.question+(q.clause||'')).includes(kw))).forEach(q=>{
    const d=document.createElement('div'); d.className='qitem';
    d.innerHTML='<div class="body"><div class="qq">'+esc(q.question.slice(0,90))+(q.question.length>90?'…':'')+'</div><div class="small"><span class="badge">'+(tn[q.type]||q.type)+'</span> '+(q.clause?('조항 '+esc(q.clause)+' · '):'')+esc(q.cat)+'</div></div>'+
      (()=>{ const rc=REPORTS.filter(r=>r.qid===q.id).length; return '<div class="acts">'+(rc?'<button class="rpt-badge" onclick="showReportDetail(\''+q.id+'\')">🚨 신고 '+rc+'건</button>':'')+'<button class="iconbtn" onclick="editQ(\''+q.id+'\')">수정</button><button class="iconbtn del" onclick="delQ(\''+q.id+'\')">삭제</button></div>'; })();
    list.appendChild(d);
  });
  if(!list.children.length) list.innerHTML='<p class="note">(문제가 없습니다)</p>';
}

// ── 문제 번호 이동 기능 ─────────────────────────────────────────
function jumpGo(){
  var n=parseInt(document.getElementById('qJumpInput').value);
  if(isNaN(n)||n<1||n>order.length){
    jumpReset();
    toast('1 ~ '+order.length+' 사이의 번호를 입력하세요');
    return;
  }
  idx=n-1;
  renderQ();
}
function jumpReset(){
  var inp=document.getElementById('qJumpInput');
  if(inp) inp.value=idx+1;
}

// ── 신고 기능 ─────────────────────────────────────────────────────
function openReport(){
  const q=order[idx];
  document.getElementById('rptQText').textContent=q.question.slice(0,120)+(q.question.length>120?'…':'');
  document.getElementById('rptQId').value=q.id;
  document.getElementById('rptContent').value='';
  document.getElementById('rptModal').classList.remove('hidden');
  setTimeout(()=>document.getElementById('rptContent').focus(),60);
}
function closeReport(){
  document.getElementById('rptModal').classList.add('hidden');
}
function saveReport(){
  const qid=document.getElementById('rptQId').value;
  const text=document.getElementById('rptContent').value.trim();
  if(!text){ toast('신고 내용을 입력해주세요.'); return; }
  const now=new Date().toLocaleString('ko-KR');
  REPORTS.push({id:uid(),qid:qid,text:text,createdAt:now});
  saveR();
  closeReport();
  toast('신고가 접수되었습니다.');
}
function showReportDetail(qid){
  const rs=REPORTS.filter(r=>r.qid===qid);
  if(!rs.length) return;
  const q=BANK.find(x=>x.id===qid);
  document.getElementById('rptDetailTitle').textContent=(q?q.question.slice(0,80)+(q.question.length>80?'…':''):'');
  document.getElementById('rptDetailBody').innerHTML=[...rs].reverse().map((r,i)=>`
    <div class="rpt-item">
      <div class="rpt-meta">#${i+1} &nbsp;·&nbsp; ${r.createdAt}
        <button onclick="deleteReport('${r.id}','${qid}')" style="float:right;font-size:11px;color:var(--ng);background:none;border:none;cursor:pointer;padding:0;">🗑 삭제</button>
      </div>
      <div class="rpt-body">${esc(r.text)}</div>
    </div>`).join('');
  document.getElementById('rptDetailModal').classList.remove('hidden');
}
function closeReportDetail(){
  document.getElementById('rptDetailModal').classList.add('hidden');
}
function deleteReport(rid,qid){
  if(!confirm('이 신고를 삭제할까요?')) return;
  REPORTS=REPORTS.filter(r=>r.id!==rid);
  saveR();
  const remaining=REPORTS.filter(r=>r.qid===qid);
  if(remaining.length){ showReportDetail(qid); }
  else { closeReportDetail(); }
  renderList();
  renderReportList();
}

function switchTab(tab){
  const qPanel=document.getElementById('qPanel');
  const rPanel=document.getElementById('rPanel');
  const qActions=document.getElementById('qActions');
  const tabQ=document.getElementById('tabQBtn');
  const tabR=document.getElementById('tabRBtn');
  if(tab==='q'){
    qPanel.style.display='';
    rPanel.style.display='none';
    qActions.style.display='';
    tabQ.classList.add('active');
    tabR.classList.remove('active');
  } else {
    qPanel.style.display='none';
    rPanel.style.display='';
    qActions.style.display='none';
    tabQ.classList.remove('active');
    tabR.classList.add('active');
    renderReportList();
  }
}

function renderReportList(){
  const el=document.getElementById('rptList');
  if(!el) return;
  const rCountEl=document.getElementById('rCount');
  if(rCountEl) rCountEl.textContent=REPORTS.length;
  if(!REPORTS.length){
    el.innerHTML='<p class="note" style="text-align:center;padding:24px 0;">신고된 문제가 없습니다.</p>';
    return;
  }
  const sorted=[...REPORTS].reverse();
  el.innerHTML=sorted.map(function(r){
    const q=BANK.find(function(x){return x.id===r.qid;});
    const qtxt=q?(q.question.slice(0,80)+(q.question.length>80?'\u2026':'')):'(삭제된 문제)';
    return '<div class="rpl-item">'+
      '<div class="rpl-q">'+esc(qtxt)+'</div>'+
      '<div class="rpl-body">'+esc(r.text)+'</div>'+
      '<div class="rpl-meta">'+
        '<span class="rpl-date">'+r.createdAt+'</span>'+
        '<div style="display:flex;gap:6px;">'+
          '<button class="iconbtn" onclick="editQ(\''+r.qid+'\');switchTab(\'q\')" style="font-size:12px;">문제 보기</button>'+
          '<button class="iconbtn del" onclick="deleteReportFromList(\''+r.id+'\',\''+r.qid+'\')" style="font-size:12px;">🗑 삭제</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function deleteReportFromList(rid,qid){
  if(!confirm('이 신고를 삭제할까요?')) return;
  REPORTS=REPORTS.filter(r=>r.id!==rid);
  saveR();
  renderReportList();
  renderList();
}

</script>

<!-- ── 신고 작성 모달 ── -->
<div id="rptModal" class="rpt-overlay hidden" onclick="if(event.target===this)closeReport()">
  <div class="rpt-box">
    <h3><span style="color:var(--ng);">🚨</span> 문제 신고하기</h3>
    <div class="rpt-qtxt" id="rptQText"></div>
    <input type="hidden" id="rptQId">
    <div style="margin-bottom:12px;">
      <label style="display:block;font-size:13px;font-weight:600;margin-bottom:6px;">신고 내용 <span style="color:var(--ng);">*</span></label>
      <textarea id="rptContent" style="width:100%;min-height:100px;resize:vertical;font-family:inherit;font-size:14px;padding:10px 12px;border:1.5px solid var(--line);border-radius:8px;box-sizing:border-box;" placeholder="오류 내용, 오타, 정답 이의, 수정 제안 등을 입력하세요"></textarea>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px;">
      <button class="btn ghost" onclick="closeReport()">취소</button>
      <button class="btn" style="background:#c0392b;" onclick="saveReport()">신고 접수</button>
    </div>
  </div>
</div>

<!-- ── 신고 내역 확인 모달 ── -->
<div id="rptDetailModal" class="rpt-overlay hidden" onclick="if(event.target===this)closeReportDetail()">
  <div class="rpt-box" style="max-width:540px;">
    <h3><span style="color:var(--ng);">📋</span> 신고 내역</h3>
    <div class="rpt-qtxt" id="rptDetailTitle"></div>
    <div id="rptDetailBody" style="max-height:360px;overflow-y:auto;"></div>
    <div style="text-align:right;margin-top:14px;">
      <button class="btn ghost" onclick="closeReportDetail()">닫기</button>
    </div>
  </div>
</div>
</body>
</html>
